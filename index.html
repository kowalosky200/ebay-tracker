<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General-007 | eBay Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=Syne:wght@600;700;800&family=Black+Ops+One&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b0e;--surface:#111318;--surface2:#181b23;--border:#22262f;--border2:#2d3140;
  --accent:#f0b429;--green:#2dd4a0;--red:#f56565;--blue:#63b3ed;--purple:#b794f4;
  --text:#edf2f7;--muted:#4a5568;--muted2:#718096;--warn:#f6ad55;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--fn:'Bebas Neue',sans-serif;--fb:'Black Ops One',cursive;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fm);font-size:13px;min-height:100vh;}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(10,11,14,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;height:60px;}
.brand{display:flex;align-items:center;gap:0;cursor:pointer;user-select:none;}
.brand:hover{opacity:0.88;}
.brand-general{font-family:var(--fb);font-size:20px;color:#fff;letter-spacing:1px;text-shadow:2px 2px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000;}
.brand-007{font-family:var(--fb);font-size:20px;color:var(--accent);letter-spacing:1px;text-shadow:2px 2px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000;}
.brand-line{display:block;height:3px;background:linear-gradient(90deg,#e63232 60%,transparent);border-radius:2px;margin-top:1px;}
.tabs{display:flex;gap:3px;}
.tab{padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-family:var(--fh);font-size:14px;font-weight:700;background:transparent;color:var(--muted2);transition:all 0.15s;}
.tab:hover{color:var(--text);background:var(--surface2);}
.tab.on{background:var(--accent);color:#000;}
.nav-right{display:flex;align-items:center;justify-content:flex-end;gap:10px;}
.nav-year{font-size:11px;color:var(--muted);font-family:var(--fm);}

/* SEARCH BAR */
.search-wrap{position:relative;width:200px;}
.search-wrap input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:6px 10px 6px 30px;color:var(--text);font-family:var(--fm);font-size:12px;width:100%;transition:all 0.15s;}
.search-wrap input:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none;}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;display:none;line-height:1;padding:0;}
.search-clear.show{display:block;}

/* QUICK-ADD FAB */
.fab{position:fixed;bottom:24px;right:24px;z-index:300;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#000;border:none;cursor:pointer;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(240,180,41,0.4);transition:all 0.15s;line-height:1;}
.fab:hover{transform:scale(1.08);}

/* SLIDE-IN PANEL */
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;}
.panel-overlay.on{display:block;}
.slide-panel{position:fixed;top:0;right:-420px;width:420px;max-width:95vw;height:100vh;background:var(--surface);border-left:1px solid var(--border2);z-index:401;transition:right 0.25s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;padding:24px;}
.slide-panel.on{right:0;}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.panel-title{font-family:var(--fh);font-weight:800;font-size:18px;color:var(--accent);}
.panel-close{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--muted2);font-size:18px;cursor:pointer;padding:2px 8px;line-height:1;}
.panel-close:hover{border-color:var(--accent);color:var(--accent);}
.panel-section{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;font-weight:500;}

/* PAGES */
.page{display:none;max-width:1140px;margin:0 auto;padding:28px 20px 100px;}
.page.on{display:block;}

/* KPI CARDS */
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px;margin-bottom:28px;}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 16px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.15s;}
.kcard:hover{border-color:var(--accent);transform:translateY(-1px);}
.kcard.active-filter{border-color:var(--accent);background:var(--surface2);}
.kcard.active-filter::before{content:'▾';position:absolute;bottom:6px;right:10px;font-size:14px;color:var(--accent);opacity:0.7;}
.kcard::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
.kcard.g::after{background:var(--green);}.kcard.r::after{background:var(--red);}
.kcard.b::after{background:var(--blue);}.kcard.p::after{background:var(--purple);}
.klabel{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px;font-weight:500;}
.kval{font-family:var(--fn);font-size:28px;font-weight:400;line-height:1;white-space:nowrap;letter-spacing:1px;}
.ksub{font-size:11px;color:var(--muted2);margin-top:5px;}

/* INSIGHTS STRIP */
.insights{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:28px;}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.insight-icon{font-size:18px;flex-shrink:0;}
.insight-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;}
.insight-val{font-family:var(--fn);font-size:18px;letter-spacing:0.5px;}
.insight-sub{font-size:11px;color:var(--muted2);}

/* STALE ALERT */
.stale-alert{background:rgba(246,173,85,0.1);border:1px solid rgba(246,173,85,0.35);border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.stale-dot{width:8px;height:8px;border-radius:50%;background:var(--warn);flex-shrink:0;}
.stale-text{font-size:13px;color:var(--warn);}
.stale-items{font-size:12px;color:var(--muted2);margin-top:4px;}

/* SECTION LABEL */
.sl{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.2px;margin:24px 0 14px;display:flex;align-items:center;gap:10px;font-weight:500;}
.sl::after{content:'';flex:1;height:1px;background:var(--border);}

/* MONTH GRID */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:28px;}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all 0.15s;}
.mcard:hover{border-color:var(--accent);transform:translateY(-1px);}
.mname{font-family:var(--fh);font-weight:700;font-size:13px;margin-bottom:6px;}
.mval{font-family:var(--fn);font-size:20px;letter-spacing:0.5px;}.mval.pos{color:var(--green);}.mval.nil{color:var(--muted);}
.msub{font-size:10px;color:var(--muted2);margin-top:3px;}

/* CHART */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 28px 20px;margin-bottom:28px;}
.chart-title{font-family:var(--fh);font-size:12px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:56px;display:flex;align-items:center;gap:16px;}
.chart-legend{display:flex;gap:14px;margin-left:auto;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2);}
.leg-dot{width:8px;height:8px;border-radius:2px;}
.bars-wrap{display:flex;align-items:flex-end;gap:8px;height:200px;padding-bottom:32px;position:relative;}
.bars-wrap::after{content:'';position:absolute;bottom:32px;left:0;right:0;height:1px;background:var(--border);}
.bar-group{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;}
.bar-pair{display:flex;align-items:flex-end;gap:2px;width:100%;height:168px;}
.bar-rev{background:var(--blue);border-radius:3px 3px 0 0;width:55%;transition:opacity 0.15s;min-height:2px;}
.bar-rev:hover{opacity:0.8;}
.bar-prof{background:var(--green);border-radius:3px 3px 0 0;width:45%;min-height:0;}
.bar-label{font-size:9px;color:var(--muted);text-align:center;margin-top:5px;font-family:var(--fm);}
.bar-zero .bar-rev{opacity:0.15;}

/* TABLE */
.twrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead{background:var(--surface2);}
th{padding:9px 12px;text-align:left;color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:0.8px;white-space:nowrap;border-bottom:1px solid var(--border);font-weight:500;}
td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}
.pos{color:var(--green);font-weight:500;}.neg{color:var(--red);}.dim{color:var(--muted2);}

/* MOBILE TABLE — hide cols on small screens */
@media(max-width:800px){
  .col-hide{display:none !important;}
  col.col-hide{display:none !important;}
  td,th{padding:7px 8px;}
}
.row-detail{display:none;background:var(--surface2);}
.row-detail.on{display:table-row;}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;}
.sold-b{background:rgba(45,212,160,0.15);color:var(--green);}
.listed-b{background:rgba(240,180,41,0.15);color:var(--accent);}
.stale-b{background:rgba(246,173,85,0.15);color:var(--warn);}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;font-weight:500;}
.fg input,.fg select{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--fm);font-size:12px;transition:border-color 0.15s;width:100%;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent);}
.fg input::placeholder{color:var(--muted);}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
.fbtns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn{padding:8px 20px;border-radius:7px;border:none;cursor:pointer;font-family:var(--fh);font-size:13px;font-weight:700;transition:all 0.15s;}
.btn-p{background:var(--accent);color:#000;}.btn-p:hover{opacity:0.88;}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}.btn-s:hover{border-color:var(--accent);color:var(--accent);}

/* MONTH HEADER */
.mhdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
.mtitle{font-family:var(--fn);font-size:38px;letter-spacing:1px;}
.mstats{display:flex;gap:10px;flex-wrap:wrap;}
.mstat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 14px;text-align:center;}
.msv{font-family:var(--fn);font-size:20px;letter-spacing:0.5px;}
.msl{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-weight:500;}

/* PROGRESS */
.pbar-wrap{margin-bottom:22px;}
.pbar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-bottom:5px;}
.pbar{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden;}
.pbar-fill{height:100%;background:var(--green);border-radius:3px;}

/* MONTH FOOTER */
.sfooter{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:14px;}
.sfgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
.sflabel{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;font-weight:500;}
.sfval{font-family:var(--fn);font-size:20px;letter-spacing:0.5px;}

/* INLINE EDIT */
.edit-icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 4px;border-radius:4px;transition:color 0.15s;line-height:1;}
.edit-icon-btn:hover,.edit-icon-btn.active{color:var(--accent);}
.editrow-inner{padding:12px 14px;}
.editrow-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:8px;margin-bottom:10px;}

/* TABLE BUTTONS */
.tbtn{padding:3px 8px;border-radius:4px;font-size:10px;font-family:var(--fh);font-weight:700;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted2);transition:all 0.12s;white-space:nowrap;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn.del{border-color:rgba(245,101,101,0.3);color:var(--red);}.tbtn.del:hover{background:rgba(245,101,101,0.1);}

/* DRILL DOWN */
.drill-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;}
.drill-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.drill-title{font-family:var(--fn);font-size:26px;color:var(--accent);letter-spacing:1px;}
.drill-close{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--muted2);font-family:var(--fh);font-size:12px;font-weight:700;padding:4px 10px;cursor:pointer;}
.drill-close:hover{border-color:var(--accent);color:var(--accent);}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.fbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:var(--fh);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.12s;}
.fbtn:hover,.fbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(240,180,41,0.07);}

/* SELROW */
.selrow{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.selrow select{background:var(--surface);border:1px solid var(--border2);border-radius:7px;padding:7px 11px;color:var(--text);font-family:var(--fh);font-size:13px;font-weight:700;}
.backbtn{background:none;border:none;color:var(--muted2);font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer;padding:0;}
.backbtn:hover{color:var(--accent);}

/* SA PAGE */
.sa-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:640px){.sa-grid{grid-template-columns:1fr;}}
.sacard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:0;}
.sacard-title{font-family:var(--fh);font-weight:700;font-size:13px;color:var(--accent);margin-bottom:14px;}
.sarow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.sarow:last-child{border-bottom:none;font-size:13px;font-weight:600;}
.notice{background:rgba(240,180,41,0.07);border:1px solid rgba(240,180,41,0.3);border-radius:8px;padding:11px 14px;font-size:12px;color:var(--accent);margin-bottom:20px;line-height:1.5;}
.sabox{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:11px;color:var(--muted2);line-height:1.9;white-space:pre-wrap;margin-bottom:12px;font-family:var(--fm);}

/* SEARCH HIGHLIGHT */
.hl{background:rgba(240,180,41,0.3);border-radius:2px;}

/* NO RESULTS */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:12px;}
.page-title{font-family:var(--fn);font-size:36px;letter-spacing:1px;margin-bottom:5px;}
.page-sub{color:var(--muted2);font-size:12px;margin-bottom:22px;}

/* TOAST */
#toast{position:fixed;bottom:84px;right:24px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:10px 18px;border-radius:8px;font-size:12px;z-index:9999;opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none;font-family:var(--fh);font-weight:700;}
#toast.on{opacity:1;transform:translateY(0);}#toast.err{border-color:var(--red);color:var(--red);}

/* MARK SOLD MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;align-items:center;justify-content:center;}
#modal-overlay.on{display:flex;}
#modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;width:90%;max-width:360px;}
#modal h3{font-family:var(--fh);font-weight:800;font-size:16px;margin-bottom:14px;}
#modal input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--fm);font-size:12px;margin-bottom:14px;}
#modal input:focus{outline:none;border-color:var(--accent);}
#modal .mbtns{display:flex;gap:8px;justify-content:flex-end;}

@media(max-width:600px){
  nav{padding:0 12px;height:54px;}
  .brand-general,.brand-007{font-size:17px;}
  .tab{padding:5px 10px;font-size:13px;}
  .page{padding:16px 12px 100px;}
  .search-wrap{width:140px;}
}

.item-hero{display:flex;gap:24px;margin-bottom:28px;flex-wrap:wrap;}
.item-photo-area{width:200px;height:200px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;}
.item-photo-area img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.item-photo-placeholder{text-align:center;color:var(--muted2);}
.item-photo-placeholder .ph-icon{font-size:32px;margin-bottom:8px;}
.item-photo-placeholder .ph-text{font-size:11px;}
.photo-upload-input{display:none;}
.item-detail-grid{flex:1;min-width:240px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.idetail{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.idetail-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;font-weight:500;}
.idetail-val{font-family:var(--fn);font-size:20px;letter-spacing:0.5px;}
.idetail-val.pos{color:var(--green);}
.idetail-val.acc{color:var(--accent);}
.idetail-val.red{color:var(--red);}
.cost-breakdown{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;}
.cb-title{font-family:var(--fh);font-weight:700;font-size:13px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;}
.cb-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.cb-row:last-child{border-bottom:none;font-weight:600;font-size:13px;}
@media(max-width:600px){.item-photo-area{width:100%;height:180px;}.item-detail-grid{grid-template-columns:1fr 1fr;}}

.st-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:28px;cursor:pointer;transition:border-color 0.15s;user-select:none;}
.st-card:hover{border-color:var(--accent);}
.st-card.open{border-color:var(--accent);}
.st-header{display:flex;align-items:center;justify-content:space-between;gap:16px;}
.st-left{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.st-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.2px;font-weight:500;margin-bottom:4px;}
.st-val{font-family:var(--fn);font-size:32px;letter-spacing:1px;line-height:1;}
.st-sub{font-size:11px;color:var(--muted2);margin-top:3px;}
.st-chevron{font-size:14px;color:var(--accent);transition:transform 0.2s;flex-shrink:0;}
.st-card.open .st-chevron{transform:rotate(180deg);}
.st-body{display:none;margin-top:18px;padding-top:18px;border-top:1px solid var(--border);}
.st-card.open .st-body{display:block;}
.st-note{font-size:11px;color:var(--muted);margin-bottom:14px;}
.st-bars{display:flex;flex-direction:column;gap:8px;}
.st-row{display:flex;align-items:center;gap:10px;font-size:12px;}
.st-cat{width:150px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.st-bar-wrap{flex:1;background:var(--surface2);border-radius:3px;height:8px;overflow:hidden;}
.st-bar-fill{height:100%;border-radius:3px;}
.st-pct{width:36px;text-align:right;font-family:var(--fn);font-size:16px;flex-shrink:0;}
.st-count{width:55px;text-align:right;color:var(--muted2);font-size:11px;flex-shrink:0;}

.export-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.export-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:var(--fh);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.export-btn:hover{border-color:var(--accent);color:var(--accent);}
.export-btn.primary{border-color:var(--green);color:var(--green);}
.export-btn.primary:hover{background:rgba(45,212,160,0.08);}
.export-btn svg{width:13px;height:13px;flex-shrink:0;}

.cb-cell{width:32px;text-align:center;padding:6px 4px !important;}
.row-cb{
  width:14px;height:14px;cursor:pointer;
  appearance:none;-webkit-appearance:none;
  background:var(--surface2);
  border:1.5px solid var(--border2);
  border-radius:3px;
  position:relative;
  transition:all 0.12s;
  vertical-align:middle;
  flex-shrink:0;
}
.row-cb:hover{border-color:var(--accent);}
.row-cb:checked{background:var(--accent);border-color:var(--accent);}
.row-cb:checked::after{
  content:'';position:absolute;left:3px;top:1px;
  width:5px;height:8px;
  border:2px solid #000;border-top:none;border-left:none;
  transform:rotate(45deg);
}

tbody tr.selected td{background:rgba(240,180,41,0.05);}

/* Parts & Returns */
.parts-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
.parts-title{font-family:var(--fh);font-weight:700;font-size:12px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.parts-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.part-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:6px;padding:7px 10px;font-size:12px;}
.part-name{flex:1;color:var(--text);}
.part-cost{color:var(--red);font-weight:500;white-space:nowrap;}
.part-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0 2px;line-height:1;}
.part-del:hover{color:var(--red);}
.part-add-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.part-add-row input{background:var(--bg);border:1px solid var(--border2);border-radius:5px;padding:6px 8px;color:var(--text);font-family:var(--fm);font-size:12px;}
.part-add-row input:focus{outline:none;border-color:var(--accent);}
.parts-total{display:flex;justify-content:space-between;font-size:12px;font-weight:600;padding-top:8px;border-top:1px solid var(--border);margin-top:6px;}
.return-section{background:rgba(245,101,101,0.05);border:1px solid rgba(245,101,101,0.2);border-radius:10px;padding:16px;margin-bottom:16px;}
.return-title{font-family:var(--fh);font-weight:700;font-size:12px;color:var(--red);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;}
.return-type-btns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.rtype-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:var(--fh);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.rtype-btn.on{border-color:var(--red);color:var(--red);background:rgba(245,101,101,0.08);}
.return-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.return-log{background:rgba(245,101,101,0.08);border:1px solid rgba(245,101,101,0.2);border-radius:6px;padding:10px 12px;margin-top:8px;font-size:12px;}
.return-log-title{color:var(--red);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
/* Monthly table extra cols */
.col-parts{color:var(--warn);}
.col-return{color:var(--red);}

/* Table alignment */
.twrap table{table-layout:fixed;width:100%;}
.twrap th,.twrap td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;}
/* Fixed column widths for monthly table */
.col-w-cb{width:32px;}
.col-w-edit{width:28px;}
.col-w-status{width:62px;}
.col-w-item{width:auto;min-width:120px;}

.col-w-listed{width:84px;}
.col-w-price{width:72px;text-align:right;}
.col-w-cost{width:68px;text-align:right;}
.col-w-parts{width:60px;text-align:right;}
.col-w-return{width:68px;text-align:center;}
.col-w-profit{width:72px;text-align:right;}
.col-w-roi{width:50px;text-align:right;}
.col-w-acts{width:76px;text-align:right;}
/* Align td values to match th */
.twrap td.num{text-align:right;}
.twrap td.ctr{text-align:center;}
.twrap td.acts-td{text-align:right;}
/* Actions cell — no flex, use inline spacing */
.acts-wrap{display:flex;gap:2px;justify-content:flex-end;align-items:center;}

.ddwrap{position:relative;display:inline-block;}
.dd-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--muted2);font-family:var(--fh);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.dd-btn:hover,.ddwrap.open .dd-btn{border-color:var(--accent);color:var(--accent);}
.dd-btn svg{width:11px;height:11px;flex-shrink:0;transition:transform 0.15s;}
.ddwrap.open .dd-btn svg{transform:rotate(180deg);}
.dd-menu{display:none;position:absolute;right:0;top:calc(100% + 5px);background:var(--surface);border:1px solid var(--border2);border-radius:9px;min-width:190px;z-index:300;overflow:hidden;}
.ddwrap.open .dd-menu{display:block;}
.dd-item{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:12px;color:var(--muted2);cursor:pointer;transition:background 0.1s;font-family:var(--fh);font-weight:600;white-space:nowrap;border:none;background:none;width:100%;text-align:left;}

.dd-item.danger{color:var(--red);}

const EBAY_FEE_DEFAULT = 0.128; // standard rate fallback

function calcEbayFee(salePrice, postage, category){
  const total = (parseFloat(salePrice)||0) + (parseFloat(postage)||0);
  const rate = EBAY_FEE_RATES[category] || EBAY_FEE_DEFAULT;
  return +(total * rate).toFixed(2);
}

function ebayFeeLabel(category){
  const rate = EBAY_FEE_RATES[category] || EBAY_FEE_DEFAULT;
  return (rate*100).toFixed(2)+'%';
}

  const partsCost=(i.parts||[]).reduce((a,p)=>a+(p.cost||0),0);
  const tc=i.itemCost+i.shipping+i.ebayFee+pc+partsCost;
  const refundAmt=i.returnData?(i.returnData.type==='full'?i.totalRev||i.salePrice:i.returnData.refundAmount||0):0;
  const returnCost=(i.returnData&&i.returnData.returnPostage||0)+(i.returnData&&i.returnData.feesKept||0);
  const tr=i.salePrice+(i.postage||0)-refundAmt;
  i.promoCost=+pc.toFixed(4);
  i.partsCost=+partsCost.toFixed(4);
  i.totalCost=+(tc+returnCost).toFixed(4);
  i.totalRev=+tr.toFixed(4);
  i.grossProfit=ds?+(tr-tc-returnCost).toFixed(2):null;
  i.roi=i.itemCost>0?+((tr-tc-returnCost)/i.itemCost).toFixed(4):null;
  i.isReturned=!!(i.returnData&&i.returnData.loggedAt);
}
function isStale(i){return !i.dateSold&&i.dateListed&&daysAgo(i.dateListed)>=30;}
function staleItems(){return allItems().filter(isStale);}

// ── INSIGHTS ──────────────────────────────────────────────────────────
function getInsights(){
  const s=allSold();
  if(!s.length)return null;
  // Best ROI category
  const catMap={};
  s.forEach(i=>{const c=i.category||'Other';if(!catMap[c])catMap[c]={profit:0,count:0};catMap[c].profit+=i.grossProfit||0;catMap[c].count++;});
  const bestCat=Object.entries(catMap).sort((a,b)=>b[1].profit-a[1].profit)[0];
  // Avg days to sell
  const withDays=s.filter(i=>i.dateListed&&i.dateSold).map(i=>daysAgo(i.dateListed)-(daysAgo(i.dateSold)));
  // Actually compute days between listed and sold
  const daysSold=s.filter(i=>i.dateListed&&i.dateSold).map(i=>{
    const a=new Date(i.dateListed),b=new Date(i.dateSold);
    return Math.round((b-a)/86400000);
  });
  const avgDays=daysSold.length?Math.round(daysSold.reduce((a,b)=>a+b,0)/daysSold.length):null;
  // Sell-through rate — only items listed 7+ days
  const eligibleListed=MONTHS.flatMap(m=>(DB[m]||[])).filter(i=>i.dateListed&&daysAgo(i.dateListed)>=7);
  const eligibleSold=eligibleListed.filter(i=>i.dateSold);
  const sellThrough=eligibleListed.length>0?Math.round((eligibleSold.length/eligibleListed.length)*100):0;
  // Best source (buying origin)
  const srcMap={};
  s.filter(i=>i.source).forEach(i=>{const l=i.source;if(!srcMap[l])srcMap[l]={profit:0,count:0};srcMap[l].profit+=i.grossProfit||0;srcMap[l].count++;});
  const bestSrc=Object.keys(srcMap).length?Object.entries(srcMap).sort((a,b)=>b[1].profit-a[1].profit)[0]:null;
  // Avg ROI
  const avgROI=s.filter(i=>i.roi!=null).reduce((a,i)=>a+i.roi,0)/s.filter(i=>i.roi!=null).length;
    // Category sell-through
  const catST={};
  eligibleListed.forEach(i=>{
    const c=i.category||'Other';
    if(!catST[c])catST[c]={listed:0,sold:0};
    catST[c].listed++;
    if(i.dateSold)catST[c].sold++;
  });
  const catSTrates=Object.entries(catST).filter(([,v])=>v.listed>=2).map(([c,v])=>({cat:c,rate:Math.round(v.sold/v.listed*100),listed:v.listed,sold:v.sold})).sort((a,b)=>b.listed-a.listed);
  return{bestCat,avgDays,bestSrc,avgROI,sellThrough,catSTrates,eligibleListed,eligibleSold};
}

function saveInlineEdit(m,id){
  if(!m||!DB[m])return;
  const item=DB[m].find(i=>i.id===id);
  if(!item)return;
  item.item=document.getElementById('ei-name-'+id)?.value.trim()||item.item;
  item.location=document.getElementById('ei-loc-'+id)?.value.trim()||'';
  item.source=document.getElementById('ei-src-'+id)?.value.trim()||'';
  item.category=document.getElementById('ei-cat-'+id)?.value||'';
  item.dateListed=document.getElementById('ei-listed-'+id)?.value||item.dateListed;
  item.dateSold=document.getElementById('ei-sold-'+id)?.value||null;
  item.salePrice=parseFloat(document.getElementById('ei-price-'+id)?.value)||item.salePrice||0;
  item.itemCost=parseFloat(document.getElementById('ei-cost-'+id)?.value)||0;
  item.shipping=parseFloat(document.getElementById('ei-ship-'+id)?.value)||0;
  const ebayInput2=parseFloat(document.getElementById('ei-ebay-'+id)?.value);
  item.ebayFee=ebayInput2>0?ebayInput2:calcEbayFee(item.salePrice,item.postage||0,item.category);
  item.postage=parseFloat(document.getElementById('ei-post-'+id)?.value)||0;
  item.promoPercent=parseFloat(document.getElementById('ei-promo-'+id)?.value)||0;
  recalc(item,item.dateSold);
  saveDB();
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else if(cur==='p-summary')renderSummary();
  else if(cur==='p-search')renderSearch();
  else if(cur==='p-item'){if(_currentItem){_currentItem=DB[_currentItem.month].find(i=>i.id===_currentItem.id)||_currentItem;_currentItem.month=_currentItem.month||m;}renderItemPage();}
  toast('Saved');
}
function delItem(m,id){
  if(!confirm('Delete this item?'))return;
  DB[m]=DB[m].filter(i=>i.id!==id);
  saveDB();
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else if(cur==='p-summary')renderSummary();
  else renderSearch();
  toast('Deleted');
}

  if(!ds){toast('Pick a date','err');return;}
  const item=DB[_st.m].find(i=>i.id===_st.id);

  else if(cur==='p-stock')renderStock();

function openPanel(){
  // Set month to current active month if on monthly page
  const msel=document.getElementById('msel');
  const qamon=document.getElementById('qa-month');
  if(msel&&qamon)qamon.value=msel.value;
  document.getElementById('qa-listed').value=new Date().toISOString().split('T')[0];
  document.getElementById('panel-overlay').classList.add('on');
  document.getElementById('slide-panel').classList.add('on');
  document.getElementById('qa-name').focus();
}
function closePanel(){
  document.getElementById('panel-overlay').classList.remove('on');
  document.getElementById('slide-panel').classList.remove('on');
}
function qaAutoCalc(){
  const p=parseFloat(document.getElementById('qa-price')?.value)||0;
  const post=parseFloat(document.getElementById('qa-post-input')?.value)||0;
  const cat=document.getElementById('qa-cat')?.value||'';
  if(p>0){
    const fee=calcEbayFee(p,post,cat);
    document.getElementById('qa-ebay').value=fee.toFixed(2);
    // Show rate hint
    const hint=document.getElementById('qa-fee-hint');
    if(hint)hint.textContent=ebayFeeLabel(cat)+' FVF';
  }
}
function quickAddItem(){
  const name=document.getElementById('qa-name').value.trim();
  if(!name){toast('Enter an item name','err');return;}
  const m=document.getElementById('qa-month').value;
  const price=parseFloat(document.getElementById('qa-price').value)||0;
  const cost=parseFloat(document.getElementById('qa-cost').value)||0;
  const ship=parseFloat(document.getElementById('qa-ship').value)||0;
  const post=parseFloat(document.getElementById('qa-post-input')?.value)||0;
  const cat=document.getElementById('qa-cat')?.value||'';
  const ebayInput=parseFloat(document.getElementById('qa-ebay').value);
  const ebay=ebayInput||calcEbayFee(price,post,cat);
  const pp=parseFloat(document.getElementById('qa-promo').value)||0.05;
  const ds=document.getElementById('qa-sold').value||null;
  const src=document.getElementById('qa-source')?.value.trim()||'';
  const item={id:Date.now().toString(),dateListed:document.getElementById('qa-listed').value,item:name,location:document.getElementById('qa-loc').value.trim(),category:cat,source:src,dateSold:ds,salePrice:price,postage:0,itemCost:cost,shipping:ship,ebayFee:+ebay.toFixed(2),promoPercent:pp};
  recalc(item,ds);
  if(!DB[m])DB[m]=[];
  // Assign next G007 ID
  let maxId=0;
  MONTHS.forEach(mo=>(DB[mo]||[]).forEach(i=>{const n=parseInt((i.gid||'').replace('G007-',''))||0;if(n>maxId)maxId=n;}));
  item.gid='G007-'+String(maxId+1).padStart(4,'0');
  DB[m].push(item);
  saveDB();
  // Reset form
  ['qa-name','qa-loc','qa-source','qa-price','qa-cost','qa-ship','qa-ebay','qa-promo','qa-sold'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('qa-cat').value='';
  closePanel();
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly'&&document.getElementById('msel')?.value===m)renderMonth();
  else if(cur==='p-summary')renderSummary();
  else if(cur==='p-stock')renderStock();
  toast('Added: '+name);
}

function addTrip(){
  const source=document.getElementById('trip-source').value.trim();
  const spend=parseFloat(document.getElementById('trip-spend').value)||0;
  const travel=parseFloat(document.getElementById('trip-travel').value)||0;
  const items=parseInt(document.getElementById('trip-items').value)||0;
  if(!source||spend<=0){toast('Enter source and spend','err');return;}
  const db=getTripsDB();
  const trip={id:Date.now().toString(),date:document.getElementById('trip-date').value,source,totalSpend:spend,travel,itemCount:items,notes:document.getElementById('trip-notes').value.trim()};
  db.trips.push(trip);
  saveTripsDB(db);
  ['trip-source','trip-spend','trip-travel','trip-items','trip-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderTrips();toast('Trip logged: '+source);
}
function deleteTrip(id){const db=getTripsDB();db.trips=db.trips.filter(t=>t.id!==id);saveTripsDB(db);renderTrips();toast('Trip deleted');}

function addExpense(){
  const amount=parseFloat(document.getElementById('exp-amount').value)||0;
  const desc=document.getElementById('exp-desc').value.trim();
  if(amount<=0){toast('Enter an amount','err');return;}
  const db=getTripsDB();
  db.expenses.push({id:Date.now().toString(),date:document.getElementById('exp-date').value,category:document.getElementById('exp-cat').value,amount,description:desc});
  saveTripsDB(db);
  ['exp-amount','exp-desc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderTrips();toast('Expense logged');
}
function deleteExpense(id){const db=getTripsDB();db.expenses=db.expenses.filter(e=>e.id!==id);saveTripsDB(db);renderTrips();toast('Expense deleted');}

function addPackaging(){
  const item=document.getElementById('pkg-item').value.trim();
  const cost=parseFloat(document.getElementById('pkg-cost').value)||0;
  const uses=parseInt(document.getElementById('pkg-uses').value)||1;
  if(!item||cost<=0){toast('Enter item and cost','err');return;}
  const db=getTripsDB();
  db.packaging.items.push({id:Date.now().toString(),date:document.getElementById('pkg-date').value,item,cost,uses});
  // Recalculate per-item cost
  const totalCost=db.packaging.items.reduce((a,p)=>a+(p.cost||0),0);
  const totalUses=db.packaging.items.reduce((a,p)=>a+(p.uses||1),0);
  db.packaging.perItemCost=totalUses>0?+(totalCost/totalUses).toFixed(4):0;
  saveTripsDB(db);
  ['pkg-item','pkg-cost','pkg-uses'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderTrips();toast('Packaging logged');
}
function deletePkg(id){
  const db=getTripsDB();
  db.packaging.items=db.packaging.items.filter(p=>p.id!==id);
  const totalCost=db.packaging.items.reduce((a,p)=>a+(p.cost||0),0);
  const totalUses=db.packaging.items.reduce((a,p)=>a+(p.uses||1),0);
  db.packaging.perItemCost=totalUses>0?+(totalCost/totalUses).toFixed(4):0;
  saveTripsDB(db);renderTrips();toast('Deleted');
}

function toggleItemEdit(m, id) {
  const box = document.getElementById('editrow-'+id);
  if(!box) return;
  const open = box.style.display !== 'none' && box.style.display !== '';
  box.style.display = open ? 'none' : 'block';
  if(!open) {
    const inner = document.getElementById('editrow-inner-'+id);
    if(inner) inner.innerHTML = editRowInner({..._currentItem, month: m});
    box.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}
function uploadPhoto(id, input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try { localStorage.setItem('photo_'+id, e.target.result); } catch(err) { toast('Photo too large for storage','err'); return; }
    const img = document.getElementById('item-photo-img');
    if(img) { img.src = e.target.result; }
    else {
      const area = document.querySelector('.item-photo-area');
      if(area) area.innerHTML = `<img src="${e.target.result}" id="item-photo-img" alt="item"><input type="file" class="photo-upload-input" id="photo-upload-${id}" accept="image/*" onchange="uploadPhoto('${id}',this)">`;
    }
    toast('Photo saved');
  };
  reader.readAsDataURL(file);
}

// ── EXPORT & BACKUP ───────────────────────────────────────────────────
function dlFile(content, filename, mime){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime}));
  a.download=filename;a.click();
  URL.revokeObjectURL(a.href);
}

function backupAll(){
  const tripsDB=getTripsDB();
  const backup={version:'1.0',exported:new Date().toISOString(),items:DB,trips:tripsDB};
  dlFile(JSON.stringify(backup,null,2),'general007-backup-'+new Date().toISOString().split('T')[0]+'.json','application/json');
  toast('Backup downloaded');
}

function restoreBackup(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.items){DB=data.items;saveDB();}
        if(data.trips){localStorage.setItem('g007trips',JSON.stringify(data.trips));}
        renderSummary();
        toast('Backup restored successfully');
      }catch(err){toast('Invalid backup file','err');}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── IMPORT FROM EXCEL ─────────────────────────────────────────────────
function importExcel(){
  const input=document.createElement('input');
  input.type='file';input.accept='.xlsx,.xls';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
        let added=0,updated=0,unchanged=0,feeCorrections=0;
        const sheetToMonth={
          'JAN-26':'JAN','FEB-26':'FEB','MAR-26':'MAR','APR-26':'APR',
          'MAY-26':'MAY','JUN-26':'JUN','JUL-26':'JUL','AUG-26':'AUG',
          'SEP-26':'SEP','OCT-26':'OCT','NOV-26':'NOV','DEC-26':'DEC'
        };
        const newData=JSON.parse(JSON.stringify(DB));
        const changes=[];

        wb.SheetNames.forEach(sheetName=>{
          const m=sheetToMonth[sheetName];
          if(!m)return;
          const ws=wb.Sheets[sheetName];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

          // Find header row
          let headerRow=-1;
          for(let i=0;i<rows.length;i++){
            if(rows[i]&&rows[i].some(c=>String(c||'').includes('Item Name'))){headerRow=i;break;}
          }
          if(headerRow<0)return;

          const headers=rows[headerRow].map(h=>String(h||'').trim().toLowerCase());
          const col=name=>headers.findIndex(h=>h.includes(name));
          const iName=col('item name');
          const iListed=col('date listed');
          const iSold=col('date sold');
          const iSaleP=col('sale price');
          const iCost=col('item cost');
          const iShip=col('shipping cost');
          const iEbay=col('ebay fee');
          const iPost=col('postage fee');
          const iPromoP=col('promotion %');
          const iLoc=col('location');
          if(iName<0)return;

          if(!newData[m])newData[m]=[];

          // Parse date helper
          const parseDate=v=>{
            if(!v)return null;
            if(v instanceof Date)return v.toISOString().split('T')[0];
            if(typeof v==='string'&&v.match(/\d{4}-\d{2}-\d{2}/))return v.split('T')[0];
            if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000));return d.toISOString().split('T')[0];}
            return null;
          };

          for(let r=headerRow+1;r<rows.length;r++){
            const row=rows[r];
            if(!row||!row[iName])continue;
            const name=String(row[iName]||'').trim();
            if(!name||name==='MONTH END')continue;

            const dateListed=parseDate(row[iListed]);
            const dateSold=parseDate(row[iSold]);
            const salePrice=parseFloat(row[iSaleP])||0;
            const itemCost=parseFloat(row[iCost])||0;
            const shipping=parseFloat(row[iShip])||0;
            const ebayFeeRaw=parseFloat(row[iEbay])||0;
            // Use spreadsheet fee if present, otherwise calculate from category
            const ebayFee=ebayFeeRaw>0?ebayFeeRaw:calcEbayFee(salePrice,postage,category);
            const postage=parseFloat(row[iPost])||0;
            const promoPercent=parseFloat(row[iPromoP])||0;
            const location=iLoc>=0?String(row[iLoc]||'').trim():'';
            const promoCost=+(salePrice*promoPercent).toFixed(4);
            const totalCost=+(itemCost+shipping+ebayFee+promoCost).toFixed(4);
            const totalRev=+(salePrice+postage).toFixed(4);
            const grossProfit=dateSold?+(totalRev-totalCost).toFixed(2):null;
            const roi=itemCost>0?+((totalRev-totalCost)/itemCost).toFixed(4):null;
            // Auto-categorise: exact match first, then keyword fallback
            let category=CAT_MAP[name]||'';
            if(!category){
              const nl=name.toLowerCase();
              if(/phone|nokia|samsung.*mobile|iphone|motorol|blackberry|sony ericsson|htc/.test(nl))category='Mobile Phones';
              else if(/camera|canon|nikon|fuji|olympus|dslr|lens/.test(nl))category='Cameras';
              else if(/laptop|macbook|computer|pc |imac|chromebook|acer|dell|hp |lenovo|asus|msi|keyboard|mouse|touchpad|monitor/.test(nl))category='Computers';
              else if(/playstation|xbox|nintendo|ps[1-5]|game |gaming|joystick|controller|wii|sega|gameboy/.test(nl))category='Video Games';
              else if(/dvd|blu.?ray|vhs|series|season|movie|film/.test(nl))category='DVD & Blu-ray';
              else if(/book|novel|encyclopedia|manual|guide/.test(nl))category='Books';
              else if(/speaker|headphone|amplifier|hifi|hi-fi|turntable|record|docking|walkman|stereo|tv |television|radio/.test(nl))category='TV & Audio';
              else if(/phone|landline|bt\d|dect|cordless/.test(nl))category='Home Phones';
              else if(/nest|alexa|echo|smart.*plug|smart.*bulb|ring|hive|thermostat/.test(nl))category='Smart Home';
              else if(/toy|lego|game|puzzle|board game|chess|monopoly|playmobil|barbie|action figure|duplo/.test(nl))category='Toys & Games';
              else if(/clothing|shoes|jacket|shirt|dress|bag|watch|jewel|glasses|sunglasses/.test(nl))category='Clothing & Accessories';
              else if(/guitar|piano|keyboard.*music|violin|drum|amplifier.*music|musical/.test(nl))category='Music';
              else if(/garden|tool|drill|vacuum|iron|kettle|toaster|blender|hoover/.test(nl))category='Home & Garden';
              else if(/tyre|car |van |wheel|exhaust|brake|motorbike/.test(nl))category='Vehicle Parts';
              else if(/baby|nappy|pram|pushchair|cot|highchair|feeding/.test(nl))category='Baby';
              else category='Other';
            }

            // Match: same name + same dateListed in same month (handles duplicates)
            const existing=newData[m].find(i=>
              i.item===name &&
              (i.dateListed===dateListed || (!i.dateListed&&!dateListed))
            );

            if(existing){
              // Check if anything has actually changed
              const diff=[];
              if(existing.salePrice!==salePrice){diff.push(`price ${existing.salePrice}->${salePrice}`);}
              if(existing.itemCost!==itemCost){diff.push(`cost ${existing.itemCost}->${itemCost}`);}
              if(existing.dateSold!==dateSold){diff.push(`sold date ${existing.dateSold||'none'}->${dateSold||'none'}`);}
              if(existing.shipping!==shipping){diff.push(`shipping ${existing.shipping}->${shipping}`);}
              // Check fee against correctly calculated value
              if(Math.abs((existing.ebayFee||0)-ebayFeeCalc)>0.01){diff.push(`eBay fee corrected: was ${fmt(existing.ebayFee||0)} (${fmt(ebayFeeRaw)} in sheet), now ${fmt(ebayFeeCalc)} (${ebayFeeLabel(category)})`);}
              if(existing.location!==location&&location){diff.push(`location ${existing.location}->${location}`);}

              if(diff.length>0){
                // Update the item — preserve app-only fields (source, category if set, notes)
                const preserve={
                  id:existing.id,
                  source:existing.source||'',
                  category:existing.category&&existing.category!=='Other'?existing.category:category,
                };
                Object.assign(existing,{
                  ...preserve,
                  item:name,location:location||existing.location,
                  dateListed,dateSold,salePrice,postage,
                  itemCost,shipping,ebayFee,promoPercent,promoCost,
                  totalCost,totalRev,grossProfit,roi
                });
                changes.push({action:'updated',month:MN[m],item:name,changes:diff.join(', ')});
                updated++;
              } else {
                unchanged++;
              }
            } else {
              // New item — add it
              // Get next available ID
              let xlMax=0;
              MONTHS.forEach(mo=>(newData[mo]||[]).forEach(i=>{const n=parseInt((i.gid||'').replace('G007-',''))||0;if(n>xlMax)xlMax=n;}));
              newData[m].push({
                id:'xl_'+Date.now()+'_'+r+'_'+Math.random().toString(36).slice(2,6),
                gid:'G007-'+String(xlMax+1).padStart(4,'0'),
                item:name,category,location,source:'',
                dateListed,dateSold,salePrice,postage,
                itemCost,shipping,ebayFee,promoPercent,promoCost,
                totalCost,totalRev,grossProfit,roi
              });
              const feeNote=feeDiscrepancy?` (fee corrected: sheet had ${fmt(ebayFeeRaw)}, using ${fmt(ebayFeeCalc)} at ${ebayFeeLabel(category)})`:'';
              changes.push({action:'added',month:MN[m],item:name,changes:'new item'+feeNote,feeFixed:feeDiscrepancy,ebayFeeRaw,ebayFeeCalc,category});
              if(feeDiscrepancy)feeCorrections++;
              added++;
            }
          }
        });

        DB=newData;
        saveDB();
        renderSummary();

        // Show detailed results
        let msg=``;
        if(added)msg+=`${added} added`;
        if(updated)msg+=`${msg?', ':''}${updated} updated`;
        if(unchanged)msg+=`${msg?', ':''}${unchanged} unchanged`;
        if(feeCorrections)msg+=` · ${feeCorrections} fee${feeCorrections!==1?'s':''} corrected`;
        if(!added&&!updated){msg='All items up to date'+(feeCorrections?` · ${feeCorrections} fees corrected`:'');}
        toast(msg||'Import complete');

        // Show change log if there were updates
        if(changes.length>0){
          showImportLog(changes);
        }
      }catch(err){
        console.error(err);
        toast('Error reading file','err');
      }
    };
    reader.readAsArrayBuffer(file);
  };
  input.click();
}

  // Build a simple modal showing what changed
  const existing=document.getElementById('import-log-modal');
  if(existing)existing.remove();

  const added=changes.filter(c=>c.action==='added');
  const updated=changes.filter(c=>c.action==='updated');
  const feeFixed=changes.filter(c=>c.feeFixed||(c.changes&&c.changes.includes('eBay fee corrected')));

  const modal=document.createElement('div');
  modal.id='import-log-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML=`

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <div style="font-family:var(--fh);font-weight:800;font-size:17px;">Import complete</div>
        <button onclick="document.getElementById('import-log-modal').remove()" style="background:none;border:1px solid var(--border2);border-radius:6px;color:var(--muted2);font-size:16px;cursor:pointer;padding:2px 8px;">&#x2715;</button>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;">
        <div style="background:rgba(45,212,160,0.1);border:1px solid rgba(45,212,160,0.3);border-radius:8px;padding:10px 16px;text-align:center;">
          <div style="font-family:var(--fn);font-size:28px;color:var(--green)">${added.length}</div>

// ── BULK SELECT ───────────────────────────────────────────────────────
let _selected=new Set();

function toggleSelect(id,cb){
  if(cb.checked)_selected.add(id);
  else _selected.delete(id);
  const row=document.getElementById('row-'+id);
  if(row)row.classList.toggle('selected',cb.checked);
  updateBulkBar();
}

function toggleSelectAll(masterCb,m){
  const items=DB[m]||[];
  const cbs=document.querySelectorAll('.row-cb');
  cbs.forEach(cb=>{
    cb.checked=masterCb.checked;
    const id=cb.dataset.id;
    if(id){
      if(masterCb.checked)_selected.add(id);
      else _selected.delete(id);
      const row=document.getElementById('row-'+id);
      if(row)row.classList.toggle('selected',masterCb.checked);
    }
  });
  updateBulkBar();
}

function updateBulkBar(){
  const delBtn=document.getElementById('bulk-del-btn');
  const sep=document.getElementById('bulk-sep');
  const lbl=document.getElementById('bulk-del-label');
  if(delBtn){
    const show=_selected.size>0;
    delBtn.style.display=show?'flex':'none';
    if(sep)sep.style.display=show?'block':'none';
    if(lbl)lbl.textContent='Delete selected ('+_selected.size+')';
  }
  // Also update btn label if dropdown open
  const ddBtn=document.querySelector('#dd-monthly .dd-btn');
  if(ddBtn&&_selected.size>0){
    ddBtn.style.borderColor='var(--warn)';ddBtn.style.color='var(--warn)';
  } else if(ddBtn){
    ddBtn.style.borderColor='';ddBtn.style.color='';
  }
}

function bulkDelete(m){
  if(!_selected.size)return;
  if(!confirm(`Delete ${_selected.size} item${_selected.size!==1?'s':''}?`))return;
  DB[m]=(DB[m]||[]).filter(i=>!_selected.has(i.id));
  _selected.clear();
  saveDB();
  renderMonth();
  toast(`Deleted`);
}

function clearSelection(){
  _selected.clear();
  document.querySelectorAll('.row-cb').forEach(cb=>cb.checked=false);
  document.querySelectorAll('tbody tr.selected').forEach(r=>r.classList.remove('selected'));
  const master=document.getElementById('master-cb');
  if(master)master.checked=false;
  updateBulkBar();
}


// ── PARTS & ADDITIONAL COSTS ──────────────────────────────────────────
function addPart(m,id){
  const nameEl=document.getElementById('part-name-input');
  const costEl=document.getElementById('part-cost-input');
  if(!nameEl||!costEl)return;
  const name=nameEl.value.trim();
  const cost=parseFloat(costEl.value)||0;
  if(!name||cost<=0){toast('Enter description and cost','err');return;}
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  if(!item.parts)item.parts=[];
  item.parts.push({id:Date.now().toString(),name,cost});
  recalc(item,item.dateSold);
  saveDB();
  nameEl.value='';costEl.value='';
  _currentItem={...item,month:m};
  renderItemPage();
  toast('Added: '+name);
}

function deletePart(m,id,partId){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  item.parts=(item.parts||[]).filter(p=>p.id!==partId);
  recalc(item,item.dateSold);
  saveDB();
  _currentItem={...item,month:m};
  renderItemPage();
  toast('Removed');
}

// ── RETURNS ───────────────────────────────────────────────────────────
let _returnType='full';
function setReturnType(type,btn){
  _returnType=type;
  document.querySelectorAll('.rtype-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('partial-fields').style.display=type==='partial'?'contents':'none';
  document.getElementById('full-fields').style.display=type==='full'?'contents':'none';
}

function logReturn(m,id){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  const returnPostage=parseFloat(document.getElementById('return-postage')?.value)||0;
  const feesKept=parseFloat(document.getElementById('return-fees-kept')?.value)||0;
  const notes=(document.getElementById('return-notes')?.value||'').trim();
  let refundAmount=0;
  let newSoldStatus=item.dateSold;

  if(_returnType==='full'){
    refundAmount=item.totalRev||item.salePrice||0;
    newSoldStatus=null; // back to listed
    item.returnData={
      type:'full',refundAmount,returnPostage,feesKept,notes,
      originalSoldDate:item.dateSold,loggedAt:new Date().toISOString().split('T')[0]
    };
    item.dateSold=null;
    toast('Full return logged — item back in stock');
  } else {
    refundAmount=parseFloat(document.getElementById('partial-refund-amt')?.value)||0;
    const reason=(document.getElementById('partial-reason')?.value||'').trim();
    item.returnData={
      type:'partial',refundAmount,returnPostage,feesKept,notes,reason,
      loggedAt:new Date().toISOString().split('T')[0]
    };
    toast('Partial refund of '+fmt(refundAmount)+' logged');
  }
  recalc(item,item.dateSold);
  saveDB();
  _currentItem={...item,month:m};
  renderItemPage();
}

function clearReturn(m,id){
  if(!confirm('Remove return record and restore original sale?'))return;
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  if(item.returnData?.originalSoldDate)item.dateSold=item.returnData.originalSoldDate;
  delete item.returnData;
  recalc(item,item.dateSold);
  saveDB();
  _currentItem={...item,month:m};
  renderItemPage();
  toast('Return record cleared');
}

  const parts=i.parts||[];

  return`<div class="parts-section">

// ── DROPDOWN ──────────────────────────────────────────────────────────
function toggleDD(id){
  const el=document.getElementById(id);
  if(!el)return;
  const isOpen=el.classList.contains('open');
  // Close all open dropdowns first
  document.querySelectorAll('.ddwrap.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen)el.classList.add('open');
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.ddwrap'))document.querySelectorAll('.ddwrap.open').forEach(d=>d.classList.remove('open'));
});


// ── DUPLICATE ITEM ────────────────────────────────────────────────────
function duplicateItem(m,id){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  // Get next G007 ID
  let maxId=0;
  MONTHS.forEach(mo=>(DB[mo]||[]).forEach(i=>{const n=parseInt((i.gid||'').replace('G007-',''))||0;if(n>maxId)maxId=n;}));
  const copy=JSON.parse(JSON.stringify(item));
  copy.id='dup_'+Date.now();
  copy.gid='G007-'+String(maxId+1).padStart(4,'0');
  copy.dateSold=null;
  copy.grossProfit=null;
  copy.isReturned=false;
  delete copy.returnData;
  copy.item=item.item+' (copy)';
  DB[m].push(copy);
  saveDB();
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  toast('Duplicated: '+item.item);
}

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg,type=''){
  const el=document.getElementById('toast');el.textContent=msg;el.className=type==='err'?'on err':'on';
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on','err'),2800);
}

// ── INIT ──────────────────────────────────────────────────────────────
initDB();
renderSummary();
// Set qa-month default to March since that's the active month
document.getElementById('qa-month').value='MAR';
