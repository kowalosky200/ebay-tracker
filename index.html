            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">⚠️ ${esc(r.item)}<span style="color:var(--muted);margin-left:6px">${r.m} · ${r.dateListed||'—'}</span></span>
            <div style="display:flex;gap:4px;flex-shrink:0">
              <button id="dupe-replace-${i}" onclick="_importToggleDupe(${i},'replace')"
                style="padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all 0.1s">
                Replace
              </button>

                style="padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--accent);background:rgba(245,158,11,0.12);color:var(--accent);cursor:pointer;transition:all 0.1s">
                Skip ✓
              </button>
            </div>
          </div>`).join('');
        return bulk+rows;
      }

      const nothingToShow = !newItems.length && !dupeItems.length;

      const html=`
        ${isMob ? `<div style="text-align:center;margin-bottom:12px;color:var(--text-secondary);font-size:12px;">
          <span style="display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M8 13l-3-3M8 13l3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Scroll down to confirm
          </span>
        </div>` : ''}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
          <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:12px;text-align:center">

        </div>

        ${nothingToShow ? `<div style="padding:20px 0;text-align:center;color:var(--muted);font-size:13px">Everything in this file is already up to date in your database.</div>` : ''}

        ${newItems.length ? `
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">

        ${dupeItems.length ? `
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">
            Duplicates — choose action (${dupeItems.length})
          </div>
          <div style="margin-bottom:80px">${dupeRows()}</div>` : '<div style="margin-bottom:80px"></div>'}

        <div style="position:sticky;bottom:0;background:var(--surface);padding:12px 0 4px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
          <button class="btn btn-s" onclick="closePanel()">Cancel</button>
          <button class="btn btn-p" onclick="_confirmJSONImport()">Confirm import</button>
        </div>`;

      openPanel('Review Import', html);
    }catch(err){
      toast('Import failed: Invalid JSON file','err');
    }
  };
  reader.readAsText(file);
}

// Toggle a single duplicate row between Replace and Skip
function _importToggleDupe(idx, action){
  if(!window._pendingImport) return;
  window._pendingImport.dupeItems[idx].replace = (action === 'replace');
  const replBtn = document.getElementById(`dupe-replace-${idx}`);
  const skipBtn = document.getElementById(`dupe-skip-${idx}`);
  if(!replBtn || !skipBtn) return;
  if(action === 'replace'){
    replBtn.style.cssText = 'padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--blue);background:rgba(59,130,246,0.12);color:var(--blue);cursor:pointer;transition:all 0.1s';
    skipBtn.style.cssText  = 'padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all 0.1s';
  } else {
    skipBtn.style.cssText  = 'padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--accent);background:rgba(245,158,11,0.12);color:var(--accent);cursor:pointer;transition:all 0.1s';
    replBtn.style.cssText  = 'padding:3px 8px;font-size:11px;font-weight:700;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all 0.1s';
  }
}

// Bulk set all duplicates to replace or skip
function _importBulkDupe(action){
  if(!window._pendingImport) return;
  window._pendingImport.dupeItems.forEach((_,i) => _importToggleDupe(i, action));
}

async function _confirmJSONImport(){
  const pending = window._pendingImport;
  if(!pending){ toast('No pending import','err'); return; }

  const { imported, newItems, dupeItems } = pending;

  // ── APPLY NEW ITEMS ─────────────────────────────────────────────────────────
  // Add each new item into DB — strip user_id, auto-categorise
  newItems.forEach(({m, data}) => {
    delete data.user_id;
    (data.parts||[]).forEach(p=>delete p.user_id);
    (data.returnHistory||[]).forEach(r=>delete r.user_id);
    data.category = autoCategory(data.item);
    if(!DB[m]) DB[m] = [];
    // Guard: don't add if somehow already present
    if(!DB[m].find(x=>x.id===data.id)) DB[m].push(data);
  });

  // ── APPLY CHOSEN REPLACEMENTS ───────────────────────────────────────────────
  dupeItems.filter(d=>d.replace).forEach(({m, incoming, existing}) => {
    delete incoming.user_id;
    (incoming.parts||[]).forEach(p=>delete p.user_id);
    (incoming.returnHistory||[]).forEach(r=>delete r.user_id);
    incoming.category = autoCategory(incoming.item);
    const idx = (DB[m]||[]).findIndex(x=>x.id===existing.id);
    if(idx > -1) DB[m][idx] = incoming;
  });

  DB._userOwned = true;
  window._pendingImport = null;
  closePanel();

  const replacedCount = dupeItems.filter(d=>d.replace).length;
  const skippedCount  = dupeItems.filter(d=>!d.replace).length;
  let msg = `Added ${newItems.length} item${newItems.length!==1?'s':''}`;
  if(replacedCount) msg += `, replaced ${replacedCount}`;
  if(skippedCount)  msg += `, skipped ${skippedCount} duplicate${skippedCount!==1?'s':''}`;
  toast(msg);

  goToTab('summary', document.querySelector('[data-tab="summary"]'));
  renderSummary();
  saveDB();
}

function importExcel(e){
  const file=e.target.files[0];
  if(!file)return;
  if(!window.XLSX){
    const script=document.createElement('script');
    script.src='https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
    script.onload=function(){processExcelFile(file);};
    script.onerror=function(){toast('Failed to load Excel library','err');};
    document.head.appendChild(script);
  }else{
    processExcelFile(file);
  }
}

function processExcelFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const workbook=XLSX.read(data,{type:'array',cellDates:true,raw:true});
      // Per-month results for summary
      const monthResults={};
      const addedItems=[],updatedItems=[],skippedItems=[];

      function safeFloat(val){
        if(val===null||val===undefined||val==='')return 0;
        if(typeof val==='number')return val;
        if(typeof val==='string'&&val.startsWith('#'))return 0;
        try{return parseFloat(String(val).replace(/[^0-9.-]/g,''))||0;}catch{return 0;}
      }
      function toDateStr(val){
        if(!val)return null;
        if(val instanceof Date){
          if(isNaN(val.getTime()))return null;
          const y=val.getFullYear(),m=String(val.getMonth()+1).padStart(2,'0'),d=String(val.getDate()).padStart(2,'0');
          return `${y}-${m}-${d}`;
        }
        if(typeof val==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(val))return val;
        const serial=parseFloat(val);
        if(!isNaN(serial)&&serial>40000){
          const d=new Date(Math.round((serial-25569)*86400*1000));
          return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
        }
        return null;
      }

      const sheetMonthKeys=[];
      workbook.SheetNames.forEach(function(sn){
        const parts=sn.split('-');
        if(parts.length===2&&MONTHS.includes(parts[0]))sheetMonthKeys.push(sn);
      });
      sheetMonthKeys.forEach(month=>{
        const sheetName=month;
        if(!workbook.SheetNames.includes(sheetName))return;
        const worksheet=workbook.Sheets[sheetName];
        const jsonData=XLSX.utils.sheet_to_json(worksheet,{header:1,raw:true,defval:''});
        const headerRow=jsonData[2]||[];
        const dataRows=jsonData.slice(3);
        const colMap={};
        headerRow.forEach((h,i)=>{if(h)colMap[String(h).trim()]=i;});
        if(!colMap['Item Name']&&!colMap['Date Listed'])return;

        monthResults[month]={added:0,updated:0,skipped:0};
        if(!DB[month])DB[month]=[];

        dataRows.forEach(row=>{
          if(!row||row.length===0)return;
          const itemName=String(row[colMap['Item Name']]||'').trim();
          const dateListedRaw=row[colMap['Date Listed']];
          if(!itemName||itemName.toUpperCase()==='MONTH END'||!dateListedRaw)return;
          const dateListed=toDateStr(dateListedRaw);
          if(!dateListed)return;

          const incoming={
            dateListed,item:itemName,
            location:String(row[colMap['Location']]||'').trim(),
            costPrice:safeFloat(row[colMap['Item Cost']]),
            salePrice:safeFloat(row[colMap['Sale Price']]),
            postage:safeFloat(row[colMap['Postage Fee']]),
            shippingCost:safeFloat(row[colMap['Shipping Cost']]),
            packagingCost:safeFloat(row[colMap['Packeging Cost']]),
            promoPercent:safeFloat(row[colMap['Promotion %']]),
            dateSold:toDateStr(row[colMap['Date Sold']])||null,
          };

          // Dedup: match on item name + dateListed (best available key from Excel)
          // Also guard against exact duplicates already seen this import session
          const existIdx=DB[month].findIndex(i=>
            i.item===itemName&&i.dateListed===dateListed
          );

          if(existIdx>=0){
            const ex=DB[month][existIdx];
            // Check if anything actually changed
            const FIELDS=['salePrice','costPrice','dateSold','shippingCost','postage','packagingCost','promoPercent','location'];
            const changed=FIELDS.some(f=>String(ex[f]??'')!==String(incoming[f]??''));
            if(!changed){
              monthResults[month].skipped++;
              skippedItems.push({m:month,item:itemName});
              return;
            }
            // Update financial/date fields only — never touch returns, notes, resale, parts
            ex.costPrice=incoming.costPrice;
            ex.salePrice=incoming.salePrice;
            ex.postage=incoming.postage;
            ex.shippingCost=incoming.shippingCost;
            ex.packagingCost=incoming.packagingCost;
            ex.promoPercent=incoming.promoPercent;
            ex.dateSold=incoming.dateSold;
            if(incoming.location)ex.location=incoming.location;
            ex.category=autoCategory(ex.item);
            monthResults[month].updated++;
            updatedItems.push({m:month,item:itemName,dateListed});
          }else{
            // Truly new item — assign ID and GID
            DB[month].push({
              id:'xl_'+Date.now()+'_'+Math.random().toString(36).substr(2,6),
              gid:'G007-'+String(getNextGID()).padStart(4,'0'),
              source:'',category:autoCategory(itemName),notes:'',parts:[],
              returnData:null,returnHistory:[],isReturned:false,
              ...incoming
            });
            monthResults[month].added++;
            addedItems.push({m:month,item:itemName,dateListed});
          }
        });
      });

      DB._userOwned=true;
      saveDB();

      // Build summary panel
      const totalAdded=addedItems.length,totalUpdated=updatedItems.length,totalSkipped=skippedItems.length;
      function rows(items,icon){
        if(!items.length)return'<div style="font-size:12px;color:var(--muted);padding:6px 0">None</div>';
        return items.slice(0,25).map(r=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${icon} ${esc(r.item)}</span><span style="color:var(--muted);flex-shrink:0;margin-left:8px">${r.m}</span></div>`).join('')+(items.length>25?`<div style="font-size:11px;color:var(--muted);padding:5px 0">…and ${items.length-25} more</div>`:'');
      }
      const monthSummaryRows=Object.entries(monthResults).filter(([,v])=>v.added||v.updated||v.skipped).map(([m,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="font-weight:600">${m}</span><span style="color:var(--muted)">${v.added} new · ${v.updated} updated · ${v.skipped} unchanged</span></div>`).join('');

      const html=`
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
          <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--green)">${totalAdded}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">New items</div>
          </div>
          <div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--blue)">${totalUpdated}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Updated</div>
          </div>

async function clearAllData(){

function savePanelQuickEdit(m,id,silent){
  const item=(DB[m]||[]).find(i=>i.id===id);

  // Only read fields that are currently in the DOM (panel may have changed)
  const fListed=document.getElementById('pd-date-listed');
  const fLocation=document.getElementById('pd-location');
  const fSource=document.getElementById('pd-source');
  const fCat=document.getElementById('pd-category');
  const fCost=document.getElementById('pd-cost');

  if(!fLocation)return;
  if(fListed)item.dateListed=fListed.value||new Date().toISOString().split('T')[0];
  if(fLocation)item.location=fLocation.value.trim();
  if(fSource&&fSource.value)item.source=fSource.value;
  if(fCat&&fCat.value)item.category=fCat.value;
  // Only overwrite numeric fields if the value is a valid non-empty number
  if(fCost&&fCost.value!==''){const v=parseFloat(fCost.value);if(!isNaN(v))item.costPrice=v;}
  if(fPrice&&fPrice.value!==''){const v=parseFloat(fPrice.value);if(!isNaN(v))item.salePrice=v;}
  if(item.dateSold)item.grossProfit=calcGrossProfit(item);

  const panel=document.getElementById('slide-panel');

    openItemDetail(m,id,true);

    PANEL_STACK.forEach(entry=>{

      }

function markSold(m,id){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  const hasFullReturn=(item.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
  const today=new Date().toISOString().split('T')[0];

  if(hasFullReturn){
    // Resale flow — price/shipping/promo already set during relist, just need date
    MODAL_CALLBACK=function(date,price){
      item.resaleDateSold=date;
      item.resaleSalePrice=price||item.salePrice||0;
      item.resaleShippingCost=item.shippingCost||0;
      item.resalePromoPercent=item.promoPercent||0;
      item.isReturned=false;
      item.grossProfit=calcGrossProfit(item);
      saveDB();
      toast('Re-sold logged');
      const cur=document.querySelector('.page.on').id;
      if(cur==='p-item'){renderItemPage(m,id);return;}
      if(cur==='p-monthly')renderMonth();
      else if(cur==='p-stock')renderStock();
      if(document.getElementById('slide-panel').classList.contains('on')){openItemDetail(m,id);}
    };
    document.getElementById('resale-date').value=today;
    document.getElementById('resale-price').value=(item.salePrice||'').toString();
    document.getElementById('resale-modal-sub').textContent='Shipping & promo carried over from relist';
    document.getElementById('resale-modal').style.display='flex';
  } else {
    // Standard first sale
    MODAL_CALLBACK=function(date,price){
      item.dateSold=date;
      if(price&&price>0)item.salePrice=+price.toFixed(2);
      item.isReturned=false;
      item.grossProfit=calcGrossProfit(item);
      saveDB();
      toast('Marked as sold');
      const cur=document.querySelector('.page.on').id;
      if(cur==='p-item'){renderItemPage(m,id);return;}
      if(cur==='p-monthly')renderMonth();
      else if(cur==='p-stock')renderStock();
      if(document.getElementById('slide-panel').classList.contains('on')){openItemDetail(m,id);}
    };
    document.getElementById('modal-date').value=today;
    document.getElementById('modal-price').value=(item.salePrice||'').toString();
    document.getElementById('modal-price-row').style.display='block';
    document.getElementById('sold-modal').style.display='flex';
  }
}

function duplicateItem(m,id,context){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  const copy=JSON.parse(JSON.stringify(item));
  copy.id='dup_'+Date.now();
  copy.gid='G007-'+String(getNextGID()).padStart(4,'0');
  copy.dateListed=new Date().toISOString().split('T')[0];
  copy.dateSold=null;copy.grossProfit=null;copy.isReturned=false;
  copy.returnHistory=[];delete copy.returnData;
  const stripSuffix=function(name){
    const m2=(name||'').match(/^(.+?) - (\d+)$/);
    return m2?m2[1]:(name||'');
  };
  const rootId=item.parentId||item.id;
  const rootItem=(DB[m]||[]).find(x=>x.id===rootId);
  const baseName=item.baseName||(rootItem&&rootItem.baseName)||stripSuffix((rootItem&&rootItem.item)||item.item);
  let maxSeq=1;
  (DB[m]||[]).forEach(function(x){
    const belongsToRoot=x.id===rootId||x.parentId===rootId;
    if(!belongsToRoot)return;
    const seq=(typeof x.copySeq==='number'&&x.copySeq>0)
      ?x.copySeq
      :(x.id===rootId?1:(function(){
        const match=(x.item||'').match(new RegExp('^'+baseName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+' - (\\d+)$'));
        return match?parseInt(match[1],10):1;
      })());
    if(seq>maxSeq)maxSeq=seq;
  });
  const nextNum=maxSeq+1;
  copy.parentId=rootId;
  copy.baseName=baseName;
  copy.copySeq=nextNum;
  copy.item=baseName+' - '+nextNum;
  DB[m].push(copy);saveDB();
  toast('Duplicated');
  if(context==='panel'){
    openItemDetail(m,copy.id);
    return;
  }
  SELECTED_MONTH=m;MONTH_SORT='date-listed';MONTH_FILTER='all';
  openItemPage(m,copy.id,'p-monthly');
}

function confirmRelist(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const price=parseFloat(document.getElementById('relist-price').value)||i.salePrice||0;
  const promoInput=parseFloat(document.getElementById('relist-promo').value)||0;
  const condition=window._relistCondition||'working';
  const postMode=window._relistPostMode||'simple';
  // Apply postage settings
  i._postageMode=postMode;
  if(postMode==='simple'){
    const sdIdx=parseInt(document.getElementById('relist-sd-rate').value)||0;
    const buyerPays=document.getElementById('relist-sd-buyer-pays').checked;
    const rate=SIMPLE_DELIVERY_RATES[sdIdx]||SIMPLE_DELIVERY_RATES[0];
    i._sdRateIdx=sdIdx;
    i._sdBuyerPays=buyerPays;
    i.shippingCost=rate.cost;
    i.postage=buyerPays?rate.cost:0;
  } else {
    i.shippingCost=parseFloat(document.getElementById('relist-shipping-cost').value)||0;
    i.postage=parseFloat(document.getElementById('relist-postage').value)||0;
  }
  // Restore to active stock
  i.isReturned=false;
  i.dateSold=null;
  i.salePrice=price;
  i.promoPercent=promoInput/100;
  i.condition=condition==='working'?undefined:'spares';
  i.grossProfit=null;
  // Log relist in returnHistory for audit trail
  if(i.returnHistory&&i.returnHistory.length){
    const relistDate=document.getElementById('relist-date').value||new Date().toISOString().split('T')[0];
    i.returnHistory[i.returnHistory.length-1]._relistedAt=relistDate;
    i.returnHistory[i.returnHistory.length-1]._relistCondition=condition;
  }
  saveDB();
  window._relistCondition=null;
  window._relistPostMode=null;
  closePanel();
  toast('Relisted as '+(condition==='spares'?'Spares / Repairs':'Working'));
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-item')renderItemPage(m,id);
  else if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else renderSummary();
}

function openReturn(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const today=new Date().toISOString().split('T')[0];
  const html=`
    <div class="item-full-section" style="margin-bottom:16px">
      <div class="item-full-section-title">Item</div>
      <div style="font-weight:600;font-size:15px">${esc(i.item)}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">Sale: ${fmt(i.salePrice)} · Sold ${i.dateSold||'—'}</div>
    </div>
    <div class="fg">
      <label>Return type</label>
      <select id="rtn-type">
        <option value="full_seller">Full refund — seller handled</option>
        <option value="full_ebay">Full refund — eBay stepped in</option>
        <option value="partial_seller">Partial refund — seller agreed</option>
        <option value="partial_ebay">Partial refund — eBay decided</option>
      </select>
    </div>
    <div class="rtn-grid">
      <div class="fg">
        <label>Refund amount (£)</label>
        <input type="number" id="rtn-refund" step="0.01" value="${(i.salePrice||0).toFixed(2)}">
      </div>
      <div class="fg">
        <label>Return date</label>
        <input type="date" id="rtn-date" value="${today}">
      </div>
    </div>
    <div class="fg">
      <label>Return postage (£)</label>
      <input type="number" id="rtn-postage" step="0.01" value="0" placeholder="0.00">
    </div>
    <div class="fg">
      <label>Notes (optional)</label>
      <input type="text" id="rtn-notes" placeholder="e.g. buyer claimed not as described">
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-p" style="flex:1" onclick="saveReturn('${m}','${id}')">Log Return</button>
      <button class="btn btn-s" onclick="closePanel()">Cancel</button>
    </div>
  `;
  openPanel('Log Return', html);
}

function saveReturn(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const type=document.getElementById('rtn-type').value;
  const refundAmount=parseFloat(document.getElementById('rtn-refund').value)||0;
  const returnDate=document.getElementById('rtn-date').value;
  const returnPostage=parseFloat(document.getElementById('rtn-postage').value)||0;
  const notes=document.getElementById('rtn-notes').value.trim();

  const entry={
    loggedAt:returnDate,
    type:type,
    refundAmount:refundAmount,
    returnPostage:returnPostage,
    notes:notes,
    _salePriceAtReturn:i.salePrice||0  // snapshot: used to get correct BPF refund in calcGrossProfit
  };

  if(!i.returnHistory)i.returnHistory=[];

  // If logging a full return, remove any existing partial entries — they're superseded
  if(type==='full_seller'||type==='full_ebay'){
    i.returnHistory=i.returnHistory.filter(r=>r.type==='full_seller'||r.type==='full_ebay');
  }

  i.returnHistory.push(entry);

  // Mark as fully returned only for full refund types
  if(type==='full_seller'||type==='full_ebay'){
    i.isReturned=true;
    i.dateSold=null; // remove from sold — back to stock
  }
  saveDB();
  toast('Return logged');
  closePanel();
  // Always navigate to the item page so user can see the updated P&L/timeline
  openItemPage(m,id,document.querySelector('.page.on')?document.querySelector('.page.on').id:'p-summary');
}


// ── Undo timeline events ───────────────────────────────────────────────────
function panelDeleteReturn(m,id,rtnIdx){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i||!i.returnHistory)return;
  i.returnHistory.splice(rtnIdx,1);
  const stillFullyReturned=i.returnHistory.some(r=>r.type==='full_seller'||r.type==='full_ebay');
  if(!stillFullyReturned&&i.isReturned){
    i.isReturned=false;
    i.dateSold=i.dateSold||new Date().toISOString().split('T')[0];
  }
  saveDB();
  toast('Return removed');
  const _pg=document.querySelector('.page.on');
  if(_pg&&_pg.id==='p-item')renderItemPage(m,id);
  openItemDetail(m,id);
}

function undoReturnEntry(m,id,rtnIdx){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i||!i.returnHistory)return;
  const r=i.returnHistory[rtnIdx];
  if(!r)return;
  i.returnHistory.splice(rtnIdx,1);
  // If this was a full return and there are no more full returns, restore sold status
  const stillFullyReturned=i.returnHistory.some(function(r2){return r2.type==='full_seller'||r2.type==='full_ebay';});
  if(!stillFullyReturned&&i.isReturned){
    i.isReturned=false;
    // Restore dateSold from the entry we just removed (best guess)
    i.dateSold=r.loggedAt||null;
  }
  saveDB();
  renderItemPage(m,id);
  toast('Return entry removed');
}

function undoSale(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  i.dateSold=null;
  i.isReturned=false;
  i.returnHistory=[];
  saveDB();
  renderItemPage(m,id);
  toast('Sale undone — item back to Listed');
}

function undoResale(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  delete i.resaleSalePrice;
  delete i.resaleDateSold;
  delete i.resaleShippingCost;
  i.isReturned=true;
  i.grossProfit=calcGrossProfit(i);
  saveDB();
  renderItemPage(m,id);
  toast('Re-sale undone — item back to Returned');
}

function undoRelist(m,id,rtnIdx){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i||!i.returnHistory)return;
  const r=i.returnHistory[rtnIdx];
  if(!r||!r._relistedAt)return;
  // Remove relist markers from this return entry
  delete r._relistedAt;
  delete r._relistCondition;
  // Restore returned state
  i.isReturned=true;
  i.dateSold=null;
  i.condition=undefined;
  i.grossProfit=calcGrossProfit(i);
  saveDB();
  renderItemPage(m,id);
  toast('Relist undone — item back to Returned');
}

// ── Returned items panel (opened from KPI card) ────────────────────────────
function showReturnedItems(){
  const items=[];
  allDBKeys().forEach(function(k){
    (DB[k]||[]).forEach(function(i){
      if(i.isReturned||(i.returnHistory&&i.returnHistory.length>0)){
        // Filter by most recent return date
        const lastReturn=i.returnHistory&&i.returnHistory.length?i.returnHistory[i.returnHistory.length-1]:null;
        const returnDate=lastReturn?lastReturn.loggedAt:i.dateSold||'';
        if(!_inSummaryPeriod(returnDate))return;
        items.push(Object.assign({},i,{month:k}));
      }
    });
  });

  const totalRefundedAll=items.reduce(function(s,i){
    return s+(i.returnHistory||[]).reduce(function(s2,r){return s2+(r.refundAmount||0);},0);
  },0);
  const fullyReturned=items.filter(function(i){
    return (i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
  }).length;
  const partialOnly=items.filter(function(i){
    const hasFull=(i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
    return !hasFull&&(i.returnHistory||[]).some(r=>r.type==='partial_seller'||r.type==='partial_ebay');
  }).length;

  // Sort by most recent return event
  items.sort(function(a,b){
    const aDate=(a.returnHistory&&a.returnHistory.length?a.returnHistory[a.returnHistory.length-1].loggedAt:'') || '';
    const bDate=(b.returnHistory&&b.returnHistory.length?b.returnHistory[b.returnHistory.length-1].loggedAt:'') || '';
    return bDate.localeCompare(aDate);
  });

  const rows=items.map(function(i){
    const hasFull=(i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
    const isResold=!!i.resaleSalePrice;
    const lastReturn=i.returnHistory&&i.returnHistory.length>0?i.returnHistory[i.returnHistory.length-1]:null;
    const refundTotal=(i.returnHistory||[]).reduce(function(s,r){return s+(r.refundAmount||0);},0);
    const profit=calcGrossProfit(i);
    const borderCol=hasFull?'var(--red)':'var(--warn)';
    const refundCol=hasFull?'var(--red)':'var(--warn)';
    const resoldBadge=isResold?'<span style="font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;background:rgba(139,92,246,0.15);color:var(--purple);margin-left:6px">resold</span>':'';
    return '<div style="padding:12px;background:var(--surface2);border-radius:8px;margin-bottom:8px;cursor:pointer;border-left:3px solid '+borderCol+'" onclick="openItemDetail(\''+i.month+'\',\''+i.id+'\')">'      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'      +'<div style="flex:1;font-weight:600;font-size:14px">'+esc(i.item)+resoldBadge+'</div>'      +'<div style="font-size:16px;font-weight:700;color:'+refundCol+'">'+fmt(refundTotal)+'</div>'      +'</div>'      +'<div style="display:flex;gap:16px;font-size:12px;color:var(--text-secondary)">'      +'<span>Sale: <strong>'+fmt(i.salePrice)+'</strong></span>'      +'<span>Net P\u0026L: <strong style="color:'+(profit>=0?'var(--green)':'var(--red)')+'">'+fmt(profit)+'</strong></span>'      +(i.gid?'<span style="color:var(--muted);font-family:monospace">'+esc(i.gid)+'</span>':'')      +'<span style="color:var(--muted)">'+i.month+(lastReturn?' · '+lastReturn.loggedAt:'')+'</span>'      +'</div>'      +'</div>';
  }).join('');

  const summary='<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:10px;padding:14px">'
    +'<div style="font-size:28px;font-weight:700;color:var(--red)">'+fmt(totalRefundedAll)+'</div>'
    +'<div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Total Refunded</div><div style="font-size:13px;color:var(--text-secondary);margin-top:2px">'+items.length+' item'+(items.length!==1?'s':'')+' · '+fullyReturned+' full · '+partialOnly+' partial</div></div>'
    +'</div>';

  const content=items.length>0
    ? summary+rows
    : '<div style="padding:30px;text-align:center;color:var(--muted)">No returns logged yet</div>';

  openPanel('Refunds — '+items.length+' item'+(items.length!==1?'s':''),content);
}

// ── TAX / SA103 ──────────────────────────────────────────────────────────────
function renderTax(){
  const now=new Date();
  const currentTaxYear=(now.getMonth()>3||(now.getMonth()===3&&now.getDate()>=6))?now.getFullYear():now.getFullYear()-1;
  const selectedYear=DB._taxYear||currentTaxYear;
  const yearOptions=[];
  for(let y=currentTaxYear;y>=currentTaxYear-2;y--){
    yearOptions.push('<option value="'+y+'" '+(y===selectedYear?'selected':'')+'>'+y+'/'+(y+1).toString().slice(2)+' (6 Apr '+y+' \u2013 5 Apr '+(y+1)+')</option>');
  }
  const taxYearStart=new Date(selectedYear,3,6);
  const taxYearEnd=new Date(selectedYear+1,3,5,23,59,59);
  function inTaxYear(ds){if(!ds)return false;const d=new Date(ds);return d>=taxYearStart&&d<=taxYearEnd;}
  const soldItems=[];
  allDBKeys().forEach(function(k){(DB[k]||[]).forEach(function(i){
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    if((i.dateSold||i.resaleSalePrice)&&!i.isReturned&&inTaxYear(i.dateSold||i.resaleDateSold))soldItems.push(i);
  });});
  const totalIncome=soldItems.reduce(function(s,i){return s+(i.salePrice||0)+(i.resaleSalePrice||0);},0);
  const saleCount=soldItems.length;
  const totalBPF=soldItems.reduce(function(s,i){return s+calcEbayBPF(i.salePrice||0)+(i.resaleSalePrice?calcEbayBPF(i.resaleSalePrice):0);},0);
  const totalPromo=soldItems.reduce(function(s,i){var bpf=calcEbayBPF(i.salePrice||0);return s+((i.salePrice||0)-bpf)*(i.promoPercent||0)*1.20;},0);
  const totalPostage=soldItems.reduce(function(s,i){return s+(i.shippingCost||0)+(i.resaleShippingCost||0);},0);
  const totalPackaging=soldItems.reduce(function(s,i){return s+(i.packagingCost||0);},0);
  const totalStockCost=soldItems.reduce(function(s,i){return s+(i.costPrice||0);},0);
  const totalParts=soldItems.reduce(function(s,i){return s+calcPartsCost(i);},0);
  const tripsInYear=(DB.trips||[]).filter(function(t){return inTaxYear(t.date);});
  const totalMiles=tripsInYear.reduce(function(s,t){return s+(t.mileage||0);},0);
  const totalMileage=+(totalMiles*0.45).toFixed(2);
  const expensesInYear=(DB.expenses||[]).filter(function(e){return inTaxYear(e.date);});
  const totalOtherExpenses=expensesInYear.reduce(function(s,e){return s+(e.amount||0);},0);
  const totalActualExpenses=+(totalBPF+totalPromo+totalPostage+totalPackaging+totalStockCost+totalMileage+totalOtherExpenses+totalParts).toFixed(2);
  const TRADING_ALLOWANCE=1000;
  const taxableTA=Math.max(0,+(totalIncome-TRADING_ALLOWANCE).toFixed(2));
  const taxableActual=Math.max(0,+(totalIncome-totalActualExpenses).toFixed(2));
  const taWins=taxableTA<=taxableActual;
  const belowThreshold=totalIncome<TRADING_ALLOWANCE;

  // Method selection — user can override, defaults to whichever gives lower tax
  const autoMethod=taWins?'ta':'actual';
  if(!DB._taxMethod)DB._taxMethod=autoMethod;
  const chosenMethod=DB._taxMethod;
  const usingTA=chosenMethod==='ta';

  const box15=+totalIncome.toFixed(2);
  const box16=usingTA?+Math.min(TRADING_ALLOWANCE,totalIncome).toFixed(2):totalActualExpenses;
  const box23=usingTA?taxableTA:taxableActual;

  var expRows=[
    ['eBay fees (BPF)',totalBPF],
    ['Promo fees (inc. VAT)',totalPromo],
    ['Postage paid',totalPostage],
    ['Packaging costs',totalPackaging],
    ['Stock cost (sold items)',totalStockCost],
    ['Parts & item expenses',totalParts]
  ].map(function(row){
    var label=row[0],val=row[1];
    return '<div class="tax-exp-row" style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px">'
      +'<span style="color:var(--text-secondary)">'+label+'</span>'
      +'<span style="font-family:\'JetBrains Mono\',monospace;font-weight:600;color:'+(val>0?'var(--red)':'var(--muted)')+'">'+( val>0?'\u2212'+fmt(val):'--')+'</span>'
      +'</div>';
  }).join('');

  // Method card helper — now clickable, selected state drives border + checkmark
  function methodCard(method,title,income,deductLabel,deductVal,taxable,note){
    const selected=chosenMethod===method;
    const isAuto=autoMethod===method;
    return '<div class="tax-method-card" onclick="DB._taxMethod=\''+method+'\';saveDB();renderTax()" style="background:var(--surface);border:2px solid '+(selected?'var(--green)':'var(--border)')+';border-radius:12px;padding:18px;position:relative;box-shadow:0 1px 3px var(--shadow);cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s" onmouseenter="this.style.boxShadow=\'0 4px 16px var(--shadow-md)\'" onmouseleave="this.style.boxShadow=\'0 1px 3px var(--shadow)\'">'
      +(selected?'<div style="position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:3px 12px;border-radius:0 0 8px 8px;letter-spacing:0.5px;white-space:nowrap">\u2713 SELECTED</div>'
        :isAuto?'<div style="position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:700;padding:3px 12px;border-radius:0 0 8px 8px;letter-spacing:0.5px;white-space:nowrap">Recommended</div>':'')
      +'<div style="font-weight:700;font-size:14px;margin-bottom:14px;padding-top:'+((selected||isAuto)?'10px':'0')+'">' +title+'</div>'
      +'<div class="tax-row" style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text-secondary)">Gross income</span><span style="font-weight:600">'+fmt(income)+'</span></div>'
      +'<div class="tax-row" style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text-secondary)">'+deductLabel+'</span><span style="color:var(--red)">\u2212'+fmt(deductVal)+'</span></div>'
      +'<div class="tax-row" style="display:flex;justify-content:space-between;padding:9px 0;font-size:15px;font-weight:700"><span>Taxable profit</span><span style="color:'+(selected?'var(--green)':taxable===0?'var(--green)':'var(--text)')+'">'+fmt(taxable)+'</span></div>'
      +'<div style="margin-top:10px;font-size:11px;color:var(--muted);line-height:1.5">'+note+'</div>'
      +'</div>';
  }

  var html=''
    // Header
    +'<div style="margin-bottom:20px">'
    +'<h1 style="font-size:22px;font-weight:700;margin-bottom:4px">Tax / SA103</h1>'
    +'<div style="color:var(--text-secondary);font-size:13px">Self Assessment \u2014 Self-employment income</div>'
    +'</div>'

    // Tax year selector — full width on mobile
    +'<div style="margin-bottom:20px">'
    +'<label style="display:block;font-weight:600;font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Tax Year</label>'
    +'<select class="tax-year-select" style="padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;width:100%;max-width:360px" onchange="DB._taxYear=parseInt(this.value);DB._taxMethod=null;saveDB();renderTax()">'+yearOptions.join('')+'</select>'
    +'</div>';

  // Below threshold banner
  if(belowThreshold){
    html+='<div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px">'
      +'<div style="font-size:20px;flex-shrink:0">\u2705</div>'
      +'<div><div style="font-weight:700;font-size:14px;color:var(--green);margin-bottom:3px">Below Trading Allowance \u2014 Nothing to report</div>'
      +'<div style="font-size:12px;color:var(--text-secondary);line-height:1.5">Gross income of <strong style="color:var(--text)">'+fmt(totalIncome)+'</strong> is below the \u00a31,000 allowance.</div>'
      +'</div></div>';
  } else {
    html+='<div style="background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:12px;color:var(--blue);line-height:1.6">'
      +'Income of <strong>'+fmt(totalIncome)+'</strong> exceeds the \u00a31,000 trading allowance. Tap a method to select it \u2014 the SA103 boxes update automatically.'
      +'</div>';
  }

  // Method comparison — clickable cards, stacks to 1 col on mobile
  html+='<div class="sl">Method Comparison</div>'
    +'<div class="tax-method-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px">'
    +methodCard('ta','Trading Allowance',totalIncome,'Trading allowance',Math.min(TRADING_ALLOWANCE,totalIncome),taxableTA,'Flat \u00a31,000 deduction. No receipts needed.')
    +methodCard('actual','Actual Expenses',totalIncome,'Total expenses',totalActualExpenses,taxableActual,'Deduct real costs. Better if expenses exceed \u00a31,000.')
    +'</div>'

    // Income summary
    +'<div class="sl">Income</div>'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px">'
    +'<div class="tax-exp-row" style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text-secondary)">Gross receipts (eBay sales)</span><span style="font-weight:700;color:var(--green)">'+fmt(totalIncome)+'</span></div>'
    +'<div class="tax-exp-row" style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;font-size:13px"><span style="color:var(--text-secondary)">Sales in tax year</span><span style="font-weight:600">'+saleCount+' item'+(saleCount!==1?'s':'')+'</span></div>'
    +'</div>'

    // Expenses breakdown — label changes to reflect chosen method
    +'<div class="sl">Expenses \u2014 '+(usingTA?'Trading Allowance Method':'Actual Method')+'</div>'
    +'<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px">'
    +(usingTA
      // Trading allowance — single flat deduction row
      ?'<div class="tax-exp-row" style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text-secondary)">Trading allowance (flat deduction)</span><span style="font-family:\'JetBrains Mono\',monospace;font-weight:600;color:var(--red)">\u2212'+fmt(Math.min(TRADING_ALLOWANCE,totalIncome))+'</span></div>'
      // Actual — full breakdown
      :expRows
        +'<div class="tax-exp-row" style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text-secondary)">Mileage ('+totalMiles.toFixed(1)+' mi @ 45p)</span><span style="font-family:\'JetBrains Mono\',monospace;font-weight:600;color:'+(totalMileage>0?'var(--red)':'var(--muted)')+'">'+( totalMileage>0?'\u2212'+fmt(totalMileage):'--')+'</span></div>'
        +'<div class="tax-exp-row" style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text-secondary)">Other business expenses</span><span style="font-family:\'JetBrains Mono\',monospace;font-weight:600;color:'+(totalOtherExpenses>0?'var(--red)':'var(--muted)')+'">'+( totalOtherExpenses>0?'\u2212'+fmt(totalOtherExpenses):'--')+'</span></div>'
    )
    +'<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;font-size:14px;font-weight:700;background:var(--surface2)">'
    +'<span>Total deduction</span><span style="color:var(--red)">\u2212'+fmt(box16)+'</span>'

// STATS
function _periodDateRange(period){
  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];
  function daysAgo(n){const d=new Date(today);d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];}
  if(period==='7d')  return{from:daysAgo(7),  to:todayStr};
  if(period==='30d') return{from:daysAgo(30), to:todayStr};
  if(period==='60d') return{from:daysAgo(60), to:todayStr};
  if(period==='90d') return{from:daysAgo(90), to:todayStr};
  if(period==='current_fy'||!period){
    const fy=_currentFYStart();
    return{from:fy+'-04-01',to:(fy+1)+'-03-31'};
  }
  if(period==='prev_fy'){
    const fy=_currentFYStart()-1;
    return{from:fy+'-04-01',to:(fy+1)+'-03-31'};
  }
  return{from:null,to:null}; // all time
}

function calcYearlyStats(period){
  const range=_periodDateRange(period||SUMMARY_PERIOD);
  function inRange(dateStr){
    if(!range.from)return true;
    if(!dateStr)return false;
    return dateStr>=range.from&&dateStr<=range.to;
  }
  let totalRev=0,realisedProfit=0,unrealisedProfit=0,stockValue=0;
  let soldCount=0,listedCount=0,totalItems=0,returnCount=0;
  let soldItems=[],stale=[];
  let saleTransactions=[];
  allDBKeys().forEach(k=>{
    (DB[k]||[]).forEach(i=>{
      if((i.item||"").trim().toUpperCase()==="MONTH END")return;
      const saleDate=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
      const soldInRange=inRange(saleDate);
      totalItems++;
      if(soldInRange&&(i.dateSold||i.resaleSalePrice)&&!i.isReturned&&i.condition!=='spares')saleTransactions.push(i.salePrice||0);
      if(soldInRange&&i.resaleSalePrice&&i.condition!=='spares')saleTransactions.push(i.resaleSalePrice||0);
      // Count as a return if item has any full return in history (even if since relisted)
      const hadFullReturn=(i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
      if(soldInRange&&(i.isReturned||hadFullReturn)){
        returnCount++;
      }
      if(soldInRange&&(i.dateSold||i.resaleSalePrice) && !i.isReturned){
        soldCount++;
        const prof=calcGrossProfit(i);
        totalRev+=(i.totalRev||i.salePrice||0);
        if(i.resaleSalePrice)totalRev+=i.resaleSalePrice;
        realisedProfit+=prof;
        soldItems.push({...i,profit:prof});
      }else if(!i.isReturned&&!i.resaleSalePrice){
        listedCount++;
        stockValue+=i.salePrice||0;
        unrealisedProfit+=calcGrossProfit(i)||0;
        const days=daysBetween(i.dateListed,new Date().toISOString().split('T')[0]);
        // Only flag stale if the item was listed within the selected period window
        if(days>=30&&i.dateListed&&i.dateListed>=range.from&&i.dateListed<=range.to)stale.push(i);
      }
    });
  });
  const avgROI=soldItems.length?soldItems.reduce((s,i)=>s+calcROI(i),0)/soldItems.length:0;
  const avgSale=saleTransactions.length?saleTransactions.reduce((s,v)=>s+v,0)/saleTransactions.length:0;
  const avgProfit=soldItems.length?realisedProfit/soldItems.length:0;
  const sellThrough=totalItems?soldCount/totalItems*100:0;
  // 14-day sell-through: items that sold within 14 days of listing
  const eligible14=[];
  allDBKeys().forEach(k=>{(DB[k]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    if(i.isReturned)return;
    const saleDate14=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
    if(!inRange(saleDate14||i.dateListed))return;
    const today=new Date().toISOString().split('T')[0];
    const daysOnSale=daysBetween(i.dateListed,today);
    if(i.dateSold||i.resaleDateSold){
      const d=calcDaysToSell(i);
      if(d!==null)eligible14.push({sold14:d<=14});
    }else if(daysOnSale>=14){
      eligible14.push({sold14:false});
    }
  });});
  const sold14Count=eligible14.filter(x=>x.sold14).length;
  const sellThrough14=eligible14.length?sold14Count/eligible14.length*100:0;
  const soldWithDate=soldItems.filter(i=>calcDaysToSell(i)!==null);
  const avgDays=soldWithDate.length?Math.round(soldWithDate.reduce((s,i)=>s+calcDaysToSell(i),0)/soldWithDate.length):0;
  // Avg buy price: scoped to period for sold items, all time for unsold stock
  const avgCostPrice=soldItems.length?soldItems.reduce((s,i)=>s+(i.costPrice||0),0)/soldItems.length:0;
  // Build category sell-through data — avg days and stale per category
  const catMap={};
  const today3=new Date().toISOString().split('T')[0];
  allDBKeys().forEach(k=>{
    (DB[k]||[]).forEach(i=>{
      if((i.item||"").trim().toUpperCase()==="MONTH END")return;
      const sdCat=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
      if(!inRange(sdCat||i.dateListed))return;
      const cat=i.category||'Uncategorised';
      if(!catMap[cat])catMap[cat]={sold:0,total:0,daysSum:0,stale:0,fast:0,avgS:0,slow:0};
      catMap[cat].total++;
      if((i.dateSold||i.resaleSalePrice)&&!i.isReturned){
        catMap[cat].sold++;
        const d=calcDaysToSell(i);
        if(d!==null){
          catMap[cat].daysSum+=d;
          if(d<=14)catMap[cat].fast++;
          else if(d<=30)catMap[cat].avgS++;
          else catMap[cat].slow++;
        }
      } else if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice){
        const d=daysBetween(i.dateListed,today3);
        if(d>=30)catMap[cat].stale++;
      }
    });
  });
  const byCat=Object.entries(catMap).map(([cat,v])=>({
    cat,sold:v.sold,total:v.total,
    pct:v.total?Math.round(v.sold/v.total*100):0,
    avgDays:v.sold?Math.round(v.daysSum/v.sold):null,
    fast:v.fast,avgS:v.avgS,slow:v.slow,stale:v.stale
  })).sort((a,b)=>(a.avgDays===null?999:a.avgDays)-(b.avgDays===null?999:b.avgDays));
  const returnRate=(soldCount+returnCount)>0?returnCount/(soldCount+returnCount)*100:0;
  // Partial refund stats
  let partialRefundCount=0;
  allDBKeys().forEach(k=>{(DB[k]||[]).forEach(i=>{
    const sdPR=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
    if(!inRange(sdPR))return;
    if(i.returnHistory&&i.returnHistory.some(r=>r.type==='partial_seller'||r.type==='partial_ebay'))partialRefundCount++;
  });});
  const partialRefundRate=(soldCount+returnCount)>0?partialRefundCount/(soldCount+returnCount)*100:0;
  const totalStaleCount=byCat.reduce((s,c)=>s+(c.stale||0),0);
  return{totalRev,realisedProfit,unrealisedProfit,stockValue,soldCount,listedCount,totalItems,returnCount,returnRate,partialRefundCount,partialRefundRate,avgROI,avgSale,avgProfit,avgCostPrice,sellThrough,sellThrough14,sold14Count,eligible14Count:eligible14.length,avgDays,stale,byCat,totalStaleCount};
}

function calcMonthStats(m){
  let totalRev=0,realisedProfit=0,unrealisedProfit=0,stockValue=0;
  let soldCount=0,listedCount=0,daysSum=0;
  (DB[m]||[]).forEach(i=>{
    if((i.item||"").trim().toUpperCase()==="MONTH END")return;
    if((i.dateSold||i.resaleSalePrice)&&!i.isReturned){
      soldCount++;
      totalRev+=(i.salePrice||0);
      if(i.resaleSalePrice)totalRev+=i.resaleSalePrice;
      realisedProfit+=calcGrossProfit(i);
      const _d=calcDaysToSell(i);
      if(_d!==null)daysSum+=_d;
    }else if(!i.isReturned&&!i.resaleSalePrice){
      listedCount++;
      stockValue+=i.salePrice||0;
      unrealisedProfit+=calcGrossProfit(i)||0;
    }
  });
  const avgDays=soldCount?Math.round(daysSum/soldCount):null;
  return{totalRev,realisedProfit,unrealisedProfit,stockValue,soldCount,listedCount,avgDays};
}

// eBay UK BPF: iterative solve matches spreadsheet values exactly
function calcEbayBPF(salePrice){
  if(!salePrice||salePrice<=0)return 0;
  function feeOnNet(net){
    let f=0.10;
    f+=0.07*Math.min(net,20);
    if(net>20)f+=0.04*Math.min(net-20,280);
    if(net>300)f+=0.02*Math.min(net-300,3700);
    return f;
  }
  let net=salePrice;
  for(let j=0;j<10;j++)net=salePrice-feeOnNet(net);
  return+feeOnNet(net).toFixed(2);
}

function calcPartsCost(i){
  return (i.parts||[]).reduce(function(s,p){return s+(p.cost||0);},0);
}
function calcGrossProfit(i){
  if(!i.salePrice)return null;
  const bpf=calcEbayBPF(i.salePrice);
  const grossInc=i.salePrice-bpf;
  const promoCost=grossInc*(i.promoPercent||0)*1.20;
  // Determine if this item has been relisted after a full return
  // (isReturned=false but returnHistory has a full return entry, and no dateSold / resaleSalePrice)
  // Full returns only: eBay refunds BPF back to seller (transaction fully reversed)
  // Partial returns: no BPF refund — eBay keeps the fee, buyer keeps the item
  const _wasRelisted = !i.isReturned && !i.dateSold && !i.resaleSalePrice &&
    (i.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
  // When relisted: Sale 1 was fully reversed — no net revenue yet. Rev=0 until item sells again.
  const rev=_wasRelisted ? 0 : i.salePrice+(i.postage||0)-bpf;
  const returnCost=(i.returnHistory||[]).reduce(function(s,r){
    const fullReturn=(r.type==='full_seller'||r.type==='full_ebay');
    if(fullReturn){
      if(_wasRelisted){
        // Sale 1 revenue already excluded (dateSold cleared on return).
        // Only the return postage is a real additional cost here.
        return s+(r.returnPostage||0);
      }
      // Standard path: item is returned and not yet relisted — charge refund net of BPF refund
      const origSalePrice=r._salePriceAtReturn||r.refundAmount||i.salePrice||0;
      const origBPF=calcEbayBPF(origSalePrice);
      const netRefund=Math.max(0,(r.refundAmount||0)-origBPF);
      return s+netRefund+(r.returnPostage||0);
    }
    return s+(r.refundAmount||0)+(r.returnPostage||0);
  },0);
  const partsCost=calcPartsCost(i);
  const cost=(i.costPrice||0)+(i.shippingCost||0)+(i.packagingCost||0)+promoCost+returnCost+partsCost;
  let profit=rev-cost;
  // Second sale (resold after return)
  if(i.resaleSalePrice){
    const rBPF=calcEbayBPF(i.resaleSalePrice);
    const rGrossInc=i.resaleSalePrice-rBPF;
    const rPromoCost=rGrossInc*(i.resalePromoPercent||0)*1.20;
    const rRev=i.resaleSalePrice-rBPF-(i.resaleShippingCost||0)-rPromoCost;
    profit+=rRev;
  }
  return+profit.toFixed(2);
}

function calcROI(i){
  if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice)return null;
  const bpf=calcEbayBPF(i.salePrice||0);
  const grossInc=(i.salePrice||0)-bpf;
  const promoCost=grossInc*(i.promoPercent||0)*1.20;
  let totalInvested=(i.costPrice||0)+(i.shippingCost||0)+(i.packagingCost||0)+bpf+promoCost;
  // For resold items: also invest Sale2 BPF, resale shipping and resale promo
  if(i.resaleSalePrice){
    const rBPF=calcEbayBPF(i.resaleSalePrice);
    const rGrossInc=i.resaleSalePrice-rBPF;
    const rPromoCost=rGrossInc*(i.resalePromoPercent||0)*1.20;
    totalInvested+=rBPF+(i.resaleShippingCost||0)+rPromoCost;
  }
  if(totalInvested<=0)return null;
  return+((calcGrossProfit(i)/totalInvested)*100).toFixed(1);
}

function daysBetween(d1,d2){
  const a=new Date(d1);
  const b=new Date(d2);
  const diff=Math.abs(b-a);
  return Math.floor(diff/(1000*60*60*24));
}

// Returns the average days-to-sell for an item, accounting for return+relist cycles.
// For a simple sale: days from dateListed to dateSold.
// For a resold item: average of (sale1 days) and (sale2 days).
//   sale1 days = dateListed → first returnHistory loggedAt (proxy for original sale date)
//   sale2 days = _relistedAt → resaleDateSold
// Returns null if the item hasn't sold or lacks the required dates.
function calcDaysToSell(i){
  const hasResale=!!i.resaleSalePrice&&!!i.resaleDateSold;
  const fullReturn=(i.returnHistory||[]).find(r=>r.type==='full_seller'||r.type==='full_ebay');

  if(hasResale&&fullReturn){
    // Two-sale lifecycle
    const sale1Date=fullReturn.loggedAt||i.dateSold||null; // date of original sale (return date ≈ sale date)
    const relistDate=fullReturn._relistedAt||null;
    const sale2Date=i.resaleDateSold;
    let total=0,count=0;
    if(i.dateListed&&sale1Date){total+=daysBetween(i.dateListed,sale1Date);count++;}
    if(relistDate&&sale2Date){total+=daysBetween(relistDate,sale2Date);count++;}
    return count>0?Math.round(total/count):null;
  }

  // Standard single sale
  if(i.dateSold&&i.dateListed)return daysBetween(i.dateListed,i.dateSold);
  return null;
}

function _recalcRelist(currentPL,salePrice,bpf,shipping,packaging,postage){
  const promoInput=parseFloat(document.getElementById('rl-promo-input').value)||0;
  const grossInc=salePrice-bpf;
  const promoCost=grossInc*(promoInput/100)*1.20;
  const rev=salePrice+postage-bpf;
  const cost=shipping+packaging+promoCost;
  const rlProfit=+(rev-cost).toFixed(2);
  const combinedP=+(currentPL+rlProfit).toFixed(2);
  const promoEl=document.getElementById('rl-promo-cost');
  const profitEl=document.getElementById('rl-profit');
  const lifetimeEl=document.getElementById('rl-lifetime');
  if(promoEl)promoEl.textContent='−'+fmt(promoCost);
  if(profitEl){profitEl.textContent=fmt(rlProfit);profitEl.style.color=rlProfit>=0?'var(--green)':'var(--red)';}
  if(lifetimeEl){lifetimeEl.textContent=fmt(combinedP);lifetimeEl.style.color=combinedP>=0?'var(--green)':'var(--red)';}
}

function fmt(n){
  if(n===null||n===undefined)return'£0.00';
  return'£'+Number(n).toFixed(2);
}

function fmtDate(ds){
  if(!ds)return'—';
  const d=new Date(ds+'T12:00:00');
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className=type==='err'?'on err':'on';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('on','err'),3000);
}




// ── Inline field saves on item full page ─────────────────────────────────────
function ipSave(m,id,field,val){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  i[field]=val;
  // Recalc profit when sale date changes
  if(field==='dateSold'){
    if(val){i.grossProfit=calcGrossProfit(i);}
    else{i.grossProfit=null;}
  }
  saveDB();
  // Re-render item page for fields that affect the P&L display
  if(field==='dateSold'||field==='dateListed'){
    const pg=document.querySelector('.page.on');
    if(pg&&pg.id==='p-item')renderItemPage(m,id);
  }
}
function ipSaveNum(m,id,field,val){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  i[field]=parseFloat(val)||0;
  if(i.dateSold||i.isReturned||i.resaleSalePrice)i.grossProfit=calcGrossProfit(i);
  saveDB();
  const s=_getSecStates();renderItemPage(m,id);_applySecStates(s);
}
function ipSavePromo(m,id,val){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  i.promoPercent=(parseFloat(val)||0)/100;
  if(i.dateSold||i.isReturned||i.resaleSalePrice)i.grossProfit=calcGrossProfit(i);
  saveDB();
  const s=_getSecStates();renderItemPage(m,id);_applySecStates(s);
}

function startTitleEdit(m,id){
  const titleEl=document.querySelector('.ip-title');
  if(!titleEl||titleEl.classList.contains('editing'))return;
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const inp=document.createElement('input');
  inp.className='ip-title-input';
  inp.value=i.item||'';
  titleEl.replaceWith(inp);
  inp.focus();inp.select();
  let committed=false;
  function commit(save){
    if(committed)return;
    committed=true;
    if(save){const val=inp.value.trim();if(val){i.item=val;saveDB();}}
    const s=_getSecStates();renderItemPage(m,id);_applySecStates(s);
  }
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();commit(true);}
    if(e.key==='Escape'){commit(false);}
  });
  inp.addEventListener('blur',function(){commit(true);});
}

// ── Inline editing on item full page ─────────────────────────────────────────
function startInlineEdit(m,id,field,currentVal){
  const el=document.getElementById('ip-'+{'salePrice':'sale','costPrice':'cost'}[field]+'-'+id);
  if(!el||el.querySelector('input'))return; // already editing
  const input=document.createElement('input');
  input.type='number';
  input.step='0.01';
  input.value=currentVal||0;
  input.className='inline-input';
  el.innerHTML='';
  el.appendChild(input);
  input.focus();
  input.select();
  function commit(){
    const newVal=parseFloat(input.value)||0;
    const i=(DB[m]||[]).find(x=>x.id===id);
    if(i){
      i[field]=newVal;
      if(i.dateSold)i.grossProfit=calcGrossProfit(i);
      saveDB();
      toast(field==='salePrice'?'Price updated':'Cost updated');
    }
    renderItemPage(m,id);
  }
  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();commit();}
    if(e.key==='Escape'){renderItemPage(m,id);}
  });
  input.addEventListener('blur',commit);
}

// ── Parts / item expenses ─────────────────────────────────────────────────────
function partsHTML(m,id,context){
  // context: 'panel' or 'page' — affects button onclick targets
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return'';
  const parts=i.parts||[];
  const total=calcPartsCost(i);
  const today=new Date().toISOString().split('T')[0];

  const rows=parts.map(function(p,idx){
    const delFn=context==='page'
      ?'deletePart(\''+m+'\',\''+id+'\','+idx+')'
      :'deletePart(\''+m+'\',\''+id+'\','+idx+',\'panel\')';
    return'<div class="part-row">'
      +'<span class="part-desc">'+esc(p.description)+'</span>'
      +(p.date?'<span class="part-date">'+p.date+'</span>':'')
      +'<span class="part-cost">−'+fmt(p.cost)+'</span>'
      +'<button class="part-del" onclick="event.stopPropagation();'+delFn+'" title="Remove">×</button>'
      +'</div>';
  }).join('');

  const totalRow=parts.length>0
    ?'<div class="parts-total"><span>Parts total</span><span style="color:var(--red)">−'+fmt(total)+'</span></div>'
    :'';

  const addFn=context==='page'
    ?'addPart(\''+m+'\',\''+id+'\',\'page\')'
    :'addPart(\''+m+'\',\''+id+'\',\'panel\')';

  const addForm='<div class="add-part-row">'
    +'<div class="fg" style="margin-bottom:0"><input type="text" id="part-desc-'+context+'" placeholder="e.g. Charging cable, battery…"></div>'
    +'<div class="fg" style="margin-bottom:0"><input type="number" id="part-cost-'+context+'" step="0.01" placeholder="£0.00" style="width:90px"></div>'
    +'<button class="btn btn-s" style="padding:9px 12px;font-size:13px" onclick="'+addFn+'">+ Add</button>'
    +'</div>';

  return'<div class="parts-list">'+rows+totalRow+'</div>'+addForm;
}

function addPart(m,id,context){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const desc=document.getElementById('part-desc-'+context);
  const cost=document.getElementById('part-cost-'+context);
  if(!desc||!cost||!desc.value.trim())return;
  if(!i.parts)i.parts=[];
  i.parts.push({
    description:desc.value.trim(),
    cost:parseFloat(cost.value)||0,
    date:new Date().toISOString().split('T')[0]
  });
  saveDB();
  toast('Part added');
  if(context==='page'){renderItemPage(m,id);}
  else{refreshPanelParts(m,id);}
}

function deletePart(m,id,idx,context){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i||!i.parts)return;
  i.parts.splice(idx,1);
  saveDB();
  toast('Part removed');
  if(context==='panel'){refreshPanelParts(m,id);}
  else{renderItemPage(m,id);}
}

function refreshPanelParts(m,id){
  const el=document.getElementById('panel-parts-'+id);
  if(el)el.innerHTML=partsHTML(m,id,'panel');
}

// ── BOOT: auth-gated ─────────────────────────────────────────────────────────
// Show auth overlay while we check session. If already signed in, boot straight
// into the app. If not, show the sign-in form.

(async function boot(){
  const overlay = document.getElementById('auth-overlay');



  function showApp(){
    overlay.style.display = 'none';
    // Top nav — desktop only; bottom nav — mobile only
    if(window.innerWidth > 600){
      document.getElementById('nav').style.display = '';
      document.getElementById('bottom-nav').style.display = 'none';
    } else {
      document.getElementById('nav').style.display = 'none';
      document.getElementById('bottom-nav').style.display = 'flex';
    }
    document.getElementById('main-content').style.display = '';
    document.getElementById('fab').style.display = '';
    // Sync theme label on show
    const _t = document.documentElement.getAttribute('data-theme')||'light';
    const _ul = document.getElementById('user-menu-theme-label');
    if(_ul) _ul.textContent = _t==='dark'?'Light mode':'Dark mode';
  }

  function showLogin(){
    document.getElementById('nav').style.display = 'none';
    document.getElementById('bottom-nav').style.display = 'none';
    document.getElementById('main-content').style.display = 'none';
    const fab = document.getElementById('fab');
    if(fab) fab.style.display = 'none';
    overlay.style.display = 'flex';
    // Always reset sign-in button — it may be hidden from a previous successful
    // sign-in (doSignIn hides it but never restores on success path)
    const authBtn = document.getElementById('auth-btn');
    const authLd  = document.getElementById('auth-loading');
    const authErr = document.getElementById('auth-error');
    if(authBtn) authBtn.style.display = 'block';
    if(authLd)  authLd.style.display  = 'none';
    if(authErr) authErr.style.display = 'none';
  }

  // Check session directly — avoids onAuthStateChange deadlock
  let session = null;
  try{
    const {data} = await Promise.race([
      _sb.auth.getSession(),
      new Promise((_,reject) => setTimeout(() => reject(new Error('timeout')), 5000))
    ]);
    session = data?.session || null;
  }catch(e){
    console.warn('Session check failed:', e.message);
  }

  // Flag set BEFORE await so onAuthStateChange SIGNED_IN (which fires almost
  // immediately on page load) never triggers a second concurrent initDB call.
  let _initialLoadDone = !!session;

  if(session){
    _currentUserId = session.user.id;
    showApp();
    // Set avatar initial
    const _av=document.getElementById('user-avatar');
    if(_av && session.user?.email) _av.textContent=session.user.email[0].toUpperCase();
    await initDB();
    _dbSnapshot = _dbFingerprint();
  } else {
    showLogin();
  }

  // Listen for auth state changes
  _sb.auth.onAuthStateChange(async (event, sess) => {
    if(event === 'SIGNED_IN' && sess){
      _currentUserId = sess.user.id;
      showApp();
      // Set avatar initial from email
      const _av=document.getElementById('user-avatar');
      if(_av && sess.user?.email) _av.textContent=sess.user.email[0].toUpperCase();
      if(!_initialLoadDone){
        _initialLoadDone = true;
        await initDB();
        _dbSnapshot = _dbFingerprint();
      }
      // else: page-load SIGNED_IN echo — already loaded, do nothing
    } else if(event === 'TOKEN_REFRESHED' && sess){
      // Silent token refresh — just update userId, no reload needed
      _currentUserId = sess.user.id;
    } else if(event === 'SIGNED_OUT' || (!sess && event !== 'INITIAL_SESSION')){
      clearTimeout(_saveTimer);
      _saveTimer = null;
      _initialLoadDone = false;
      _currentUserId = null;
      DB = {};
      _dbSnapshot = {};
      showLogin();
    }
  });

  // Re-check session when tab becomes visible again (phone wake, tab switch)
  // If token expired while backgrounded, boot to login immediately
  document.addEventListener('visibilitychange', async () => {
    if(document.visibilityState !== 'visible') return;
    if(!_currentUserId) return; // already on login screen
    try{
      const {data, error} = await _sb.auth.getSession();
      if(error || !data.session){
        // Session gone — try one silent refresh before giving up
        const {data:rd, error:re} = await _sb.auth.refreshSession();
        if(re || !rd.session){
          toast('Session expired — please sign in again', 'err');
          _currentUserId = null;
          DB = {};
          _dbSnapshot = {};
          _initialLoadDone = false;
          await _sb.auth.signOut();
          showLogin();
        }
      }
    }catch(e){
      console.warn('Visibility session check failed:', e.message);
    }
  });
})();

function exportForSupabase(){

  const returns=[];
  allDBKeys().forEach(function(k){
    (DB[k]||[]).forEach(function(i){
      items.push({
        id:i.id, gid:i.gid||null, month:k,
        item:i.item||'', category:i.category||null, location:i.location||null, source:i.source||null,
        date_listed:i.dateListed||null, date_sold:i.dateSold||null,
        sale_price:i.salePrice||0, postage:i.postage||0, cost_price:i.costPrice||0,
        shipping_cost:i.shippingCost||0, packaging_cost:i.packagingCost||0,
        promo_percent:i.promoPercent||0, notes:i.notes||null,
        is_returned:!!i.isReturned,
        postage_mode:i._postageMode||'simple', sd_rate_idx:i._sdRateIdx||1, sd_buyer_pays:i._sdBuyerPays!==false,
        resale_sale_price:i.resaleSalePrice||null, resale_date_sold:i.resaleDateSold||null,
        resale_shipping_cost:i.resaleShippingCost||null, resale_promo_percent:i.resalePromoPercent||null,
        gross_profit:i.grossProfit||null
      });
      (i.parts||[]).forEach(function(p,pi){
        parts.push({item_id:i.id,description:p.desc||p.description||'',cost:p.cost||0});
      });
      (i.returnHistory||[]).forEach(function(r){
        returns.push({
          item_id:i.id, logged_at:r.loggedAt||null, type:r.type||null,
          refund_amount:r.refundAmount||0, return_postage:r.returnPostage||0,
          notes:r.notes||null, relisted_at:r._relistedAt||null, relist_condition:r._relistCondition||null
        });
      });
    });
  });
  const trips=(DB.trips||[]).map(function(t){return{id:t.id||String(Date.now()),date:t.date,description:t.description||'',mileage:t.mileage||0,rate_per_mile:t.ratePerMile||0.45};});
  const expenses=(DB.expenses||[]).map(function(e){return{id:e.id||String(Date.now()),date:e.date,description:e.description||'',amount:e.amount||0,category:e.category||null};});
  const out={items,item_parts:parts,item_returns:returns,trips,expenses};
  console.log('=== SUPABASE EXPORT ===');
  console.log(JSON.stringify(out,null,2));
  console.log('Items:',items.length,'Parts:',parts.length,'Returns:',returns.length,'Trips:',trips.length,'Expenses:',expenses.length);
  return out;
}
