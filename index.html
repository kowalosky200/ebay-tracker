// ── Token editing helpers ─────────────────────────────────────────────────────
// ── Section open-state persistence across re-renders ─────────────────────────
function _getSecStates(){
  const states={};
  document.querySelectorAll('#p-item .ip-section').forEach(function(el){
    const title=el.querySelector('.ip-section-title');
    const body=el.querySelector('.ip-section-body');
    if(title&&body)states[title.textContent.trim()]=body.style.display!=='none';
  });
  return states;
}
function _applySecStates(states){
  document.querySelectorAll('#p-item .ip-section').forEach(function(el){
    const title=el.querySelector('.ip-section-title');
    const body=el.querySelector('.ip-section-body');
    const chev=el.querySelector('.ip-section-chevron');
    if(!title||!body)return;
    const key=title.textContent.trim();
    if(key in states){
      const open=states[key];
      body.style.display=open?'block':'none';
      if(chev)chev.style.transform=open?'rotate(180deg)':'rotate(0deg)';
    }
  });
}

// Tracks which token field to open after a blur-triggered re-render
var _nextTokenField=null;
var _tokenM=null;
var _tokenId=null;

// tokenPointerDown fires on pointerdown — BEFORE blur on the active input.
// This is the key: we capture the intended next token while the old input
// is still mounted, so when blur fires and destroys the DOM we already know
// which field to re-open.
function tokenPointerDown(m,id,field){
  if(document.querySelector('.ip-token.editing')){
    _nextTokenField=field;
    _tokenM=m;
    _tokenId=id;
  }
}

function openTokenEdit(m,id,field,_alreadyAsync){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const tok=document.getElementById('tok-'+field+'-'+id);
  if(!tok||tok.classList.contains('locked'))return;

  // Another token is open — pointerdown may have already set _nextTokenField.
  // Either way, ensure it is set then trigger blur to save+re-render+re-open.
  const alreadyEditing=document.querySelector('.ip-token.editing');
  if(alreadyEditing&&alreadyEditing!==tok){
    _nextTokenField=field;
    _tokenM=m;
    _tokenId=id;
    const openInp=alreadyEditing.querySelector('input');
    if(openInp)openInp.blur();
    return;
  }

  if(tok.classList.contains('editing'))return;
  tok.classList.add('editing');
  const valEl=tok.querySelector('.ip-token-val');
  const currentVal=field==='promoPercent'?+((i.promoPercent||0)*100).toFixed(2):(i[field]||0);
  valEl.innerHTML='<input type="number" step="0.01" min="0" value="'+currentVal+'" autocomplete="off">';
  const inp=valEl.querySelector('input');

  function focusAndSelect(){
    inp.focus();
    try{inp.setSelectionRange(0,999);}catch(e){try{inp.select();}catch(e2){}}
  }
  if(_alreadyAsync){focusAndSelect();}
  else{setTimeout(focusAndSelect,0);}

  let committed=false;
  function commit(save){
    if(committed)return;
    committed=true;
    if(save){
      const v=parseFloat(inp.value)||0;
      if(field==='promoPercent'){i.promoPercent=+(v/100).toFixed(4);}
      else{i[field]=+v.toFixed(2);}
      if(i.dateSold||i.isReturned||i.resaleSalePrice)i.grossProfit=calcGrossProfit(i);
      DB._userOwned=true;
      saveDB();
    }
    const pending=_nextTokenField;
    const pm=_tokenM||m;
    const pid=_tokenId||id;
    _nextTokenField=null;
    _tokenM=null;
    _tokenId=null;
    // If this token lives inside the slide-panel (not the full item page), re-render the panel
    const inPanel=tok&&tok.closest('#slide-panel');
    if(inPanel){
      openItemDetail(m,id,true);
    }else{
      const states=_getSecStates();
      renderItemPage(m,id);
      _applySecStates(states);
    }
    if(pending){
      openTokenEdit(pm,pid,pending,true);
    }
  }
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();commit(true);}
    if(e.key==='Escape'){_nextTokenField=null;_tokenM=null;_tokenId=null;commit(false);}
  });
  inp.addEventListener('blur',function(){commit(true);});
}

// ── Postage mode save ─────────────────────────────────────────────────────────
function savePostageMode(m,id,mode){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  i._postageMode=mode;
  if(mode==='simple'&&i._sdRateIdx==null)i._sdRateIdx=0;
  saveDB();
  const s=_getSecStates();renderItemPage(m,id);_applySecStates(s);
}
function saveSDRate(m,id,idx){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  i._sdRateIdx=parseInt(idx)||0;
  const rate=SIMPLE_DELIVERY_RATES[i._sdRateIdx]||SIMPLE_DELIVERY_RATES[0];
  i.shippingCost=rate.cost;
  // _sdBuyerPays=true means buyer pays postage; false/undefined means free shipping
  i.postage=i._sdBuyerPays?rate.cost:0;
  if(i.dateSold||i.isReturned||i.resaleSalePrice)i.grossProfit=calcGrossProfit(i);
  saveDB();
  const s=_getSecStates();renderItemPage(m,id);_applySecStates(s);
}
function saveSDFree(m,id,buyerPays){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  i._sdBuyerPays=buyerPays;
  const rate=SIMPLE_DELIVERY_RATES[i._sdRateIdx||0];
  i.postage=buyerPays?(rate?rate.cost:0):0;
  if(i.dateSold||i.isReturned||i.resaleSalePrice)i.grossProfit=calcGrossProfit(i);
  saveDB();
  const s=_getSecStates();renderItemPage(m,id);_applySecStates(s);
}

function renderItemPage(m,id){
  const i=(DB[m]||[]).find(x=>x.id===id);
  const page=document.getElementById('p-item');
  if(!i){page.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Item not found</div>';return;}

  const bpf=calcEbayBPF(i.salePrice||0);
  const grossInc=(i.salePrice||0)-bpf;
  const promoCost=grossInc*(i.promoPercent||0)*1.20;
  const profit=calcGrossProfit(i);
  const roi=calcROI(i);
  const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'active';
  const hasReturn=(i.returnHistory||[]).length>0;
  const totalRefunded=(i.returnHistory||[]).reduce((s,r)=>s+(r.refundAmount||0),0);
  const totalReturnPostage=(i.returnHistory||[]).reduce((s,r)=>s+(r.returnPostage||0),0);
  const postageMode=i._postageMode||(i.shippingCost>0?'custom':'simple');
  const sdIdx=i._sdRateIdx||0;
  const sdRate=SIMPLE_DELIVERY_RATES[sdIdx]||SIMPLE_DELIVERY_RATES[0];

  // ── Timeline entries ─────────────────────────────────────────────────
  const timeline=[];
  timeline.push({date:i.dateListed||'',badge:'listed',label:'Listed on eBay',detail:'Price: '+fmt(i.salePrice)+' · Cost: '+fmt(i.costPrice||0)});
  // Show sale entry if: sold, currently returned, OR has return history (was sold before the return)
  if(i.dateSold||hasReturn){
    const sd=i.dateSold||((i.returnHistory||[])[0]?(i.returnHistory[0].loggedAt||''):'');
    timeline.push({date:sd,badge:'sale',label:'Sold',detail:'Sale price: '+fmt(i.salePrice)+' → Received: '+fmt(grossInc)+' after BPF'});
  }
  (i.returnHistory||[]).forEach(function(r,rtnIdx){
    const lbl2={full_seller:'Full refund — seller handled',full_ebay:'Full refund — eBay stepped in',partial_seller:'Partial refund — seller agreed',partial_ebay:'Partial refund — eBay decided'};
    const bc=r.type.startsWith('full')?'return-full':'return-partial';
    const parts2=['Refund: '+fmt(r.refundAmount||0)];
    if(r.returnPostage>0)parts2.push('Return postage: '+fmt(r.returnPostage));
    if(r.notes)parts2.push('Note: '+esc(r.notes));
    timeline.push({date:r.loggedAt||'',badge:bc,label:lbl2[r.type]||r.type,detail:parts2.join(' · '),rtnIdx:rtnIdx});
    // If this return entry has a relist logged on it, add a relist timeline event
    if(r._relistedAt){
      const condLabel=r._relistCondition==='spares'?'Spares / Repairs':'Working';
      timeline.push({date:r._relistedAt,badge:'relist',label:'Relisted',detail:'Condition: '+condLabel+' · Price: '+fmt(i.salePrice),rtnIdx:rtnIdx});
    }
  });
  if(i.resaleSalePrice){
    const rBPF2=calcEbayBPF(i.resaleSalePrice);
    timeline.push({date:i.resaleDateSold||'',badge:'resale',label:'Re-sold',detail:'Sale price: '+fmt(i.resaleSalePrice)+' → Received: '+fmt(i.resaleSalePrice-rBPF2)+' after BPF'});
  }
  const typeOrder={listed:0,sale:1,'return-full':2,'return-partial':2,relist:3,resale:4};
  timeline.sort(function(a,b){if(a.date<b.date)return -1;if(a.date>b.date)return 1;return (typeOrder[a.badge]??1)-(typeOrder[b.badge]??1);});
  const badgeLbl={listed:'listed',sale:'sold',resale:'re-sold','return-full':'full return','return-partial':'partial return',relist:'relisted'};
  const timelineHTML=timeline.map(function(t,idx){
    const isLast=idx===timeline.length-1;
    let undoBtn='';
    if(isLast){
      if(t.badge==='sale')undoBtn='<button onclick="event.stopPropagation();undoSale(\''+m+'\',\''+id+'\')" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:11px;color:var(--muted);cursor:pointer">✕ undo</button>';
      else if(t.badge==='resale')undoBtn='<button onclick="event.stopPropagation();undoResale(\''+m+'\',\''+id+'\')" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:11px;color:var(--muted);cursor:pointer">✕ undo</button>';
      else if(t.badge==='return-full'||t.badge==='return-partial')undoBtn='<button onclick="event.stopPropagation();undoReturnEntry(\''+m+'\',\''+id+'\','+t.rtnIdx+')" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:11px;color:var(--muted);cursor:pointer">✕ undo</button>';
      else if(t.badge==='relist')undoBtn='<button onclick="event.stopPropagation();undoRelist(\''+m+'\',\''+id+'\','+t.rtnIdx+')" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:11px;color:var(--muted);cursor:pointer">✕ undo</button>';
    }
    return '<div class="ip-timeline-entry">'
      +'<div class="ip-timeline-header">'
      +'<span class="history-badge '+t.badge+'">'+(badgeLbl[t.badge]||t.badge)+'</span>'
      +'<span style="color:var(--muted);font-size:12px">'+fmtDate(t.date)+'</span>'
      +undoBtn
      +'</div>'
      +'<div class="ip-timeline-label">'+t.label+'</div>'
      +(t.detail?'<div class="ip-timeline-detail">'+t.detail+'</div>':'')
      +'</div>';
  }).join('');

  // ── P&L receipt (read-only, derived) ─────────────────────────────────
  const partsCost=calcPartsCost(i);
  const sale1Net=i.resaleSalePrice?(+((i.salePrice+(i.postage||0)-calcEbayBPF(i.salePrice))-((i.costPrice||0)+(i.shippingCost||0)+(i.packagingCost||0)+promoCost+calcPartsCost(i))-(i.returnHistory||[]).reduce(function(s,r){const f=(r.type==='full_seller'||r.type==='full_ebay');if(f){const osp=r._salePriceAtReturn||r.refundAmount||i.salePrice||0;return s+Math.max(0,(r.refundAmount||0)-calcEbayBPF(osp))+(r.returnPostage||0);}return s+(r.refundAmount||0)+(r.returnPostage||0);},0)).toFixed(2)):profit;
  function rcp(label,val,color,indent){
    return'<div class="ip-receipt-row'+(indent?' indent':'')+'"><span style="flex:1;color:'+(color&&color.includes('--text')?color:'var(--text-secondary)')+'">'+label+'</span><span class="ip-receipt-val" style="color:'+(color||'var(--text)')+'">'+val+'</span></div>';
  }
  let pb='';
  pb+=rcp('Sale price',fmt(i.salePrice||0),'var(--green)');
  if((i.postage||0)>0)pb+=rcp('+ Buyer postage','+'+fmt(i.postage),'var(--green)');
  pb+=rcp('eBay BPF','−'+fmt(bpf),'var(--red)');
  if((i.shippingCost||0)>0)pb+=rcp('Shipping cost','−'+fmt(i.shippingCost),'var(--red)');
  if((i.packagingCost||0)>0)pb+=rcp('Packaging','−'+fmt(i.packagingCost),'var(--red)');
  if(i.promoPercent)pb+=rcp('Promo fee ('+((i.promoPercent*100).toFixed(0))+'% +VAT)','−'+fmt(promoCost),'var(--red)');
  pb+=rcp('Item cost','−'+fmt(i.costPrice||0),'var(--red)');
  if(partsCost>0){
    const pts=i.parts||[];
    if(pts.length===1){pb+=rcp(esc(pts[0].description),'−'+fmt(partsCost),'var(--red)');}
    else{
      pb+=rcp('Parts & expenses ('+pts.length+')','−'+fmt(partsCost),'var(--red)');
      pts.forEach(function(p){pb+=rcp(esc(p.description),'−'+fmt(p.cost),'var(--red)',true);});
    }
  }
  if(hasReturn){
    pb+='<div class="ip-receipt-row section-head"><span>Return impact</span><span></span></div>';
    (i.returnHistory||[]).forEach(function(r){
      const fullReturn=(r.type==='full_seller'||r.type==='full_ebay');
      const lbl3={full_seller:'Full refund — you handled',full_ebay:'Full refund — eBay involved',partial_seller:'Partial refund — you handled',partial_ebay:'Partial refund — eBay decided'}[r.type]||r.type;
      pb+=rcp(lbl3,'−'+fmt(r.refundAmount||0),'var(--accent)');
      if(fullReturn)pb+=rcp('eBay refunds BPF back to you','+'+fmt(bpf),'var(--green)',true);
      if((r.returnPostage||0)>0)pb+=rcp('Return postage','−'+fmt(r.returnPostage),'var(--red)');
    });
  }
  pb+='<div class="ip-receipt-row total"><span style="flex:1">'+(i.resaleSalePrice?'Sale 1 net':'Net profit / loss')+'</span><span class="ip-receipt-val" style="color:'+(sale1Net>=0?'var(--green)':'var(--red)')+'">'+fmt(sale1Net)+'</span></div>';

  // Sale 2 block
  let resaleHTML='';
  if(i.resaleSalePrice){
    const rBPF=calcEbayBPF(i.resaleSalePrice);
    const rGrossInc=i.resaleSalePrice-rBPF;
    const rPromoCost=rGrossInc*(i.resalePromoPercent||0)*1.20;
    const rRev=i.resaleSalePrice-rBPF-(i.resaleShippingCost||0)-rPromoCost;
    const lifetimeProfit=profit;

    s2b+=rcp('Sale price',fmt(i.resaleSalePrice),'var(--green)');

    if(rPromoCost>0)s2b+=rcp('Promo fee ('+((i.resalePromoPercent||0)*100).toFixed(1)+'% +VAT)','−'+fmt(rPromoCost),'var(--red)');
    s2b+=rcp('Item cost (sunk)','—','var(--muted)');
    s2b+='<div class="ip-receipt-row total"><span style="flex:1">Sale 2 net</span><span class="ip-receipt-val" style="color:'+(rRev>=0?'var(--green)':'var(--red)')+'">'+fmt(rRev)+'</span></div>';
    s2b+='<div class="ip-receipt-row" style="margin-top:6px;padding:10px 0 2px;border-top:2px solid var(--border)"><span style="flex:1;font-weight:700;font-size:13px">Lifetime P&amp;L</span><span class="ip-receipt-val" style="font-size:16px;color:'+(lifetimeProfit>=0?'var(--green)':'var(--red)')+'">'+fmt(lifetimeProfit)+'</span></div>';
    if(roi!==null)s2b+=rcp('Overall ROI',roi.toFixed(1)+'%','var(--muted)');
    resaleHTML=sec2('Sale 2 P&amp;L <span style="color:var(--muted);font-weight:400;font-size:11px">re-sold '+esc(i.resaleDateSold||'—')+'</span>',s2b,true,fmt(rRev),rRev>=0?'var(--green)':'var(--red)','ip-section-pnl','var(--purple)');
  }

  // ── Re-list projection ────────────────────────────────────────────────
  let relistHTML='';
  const hasReturnHistory=(i.returnHistory||[]).length>0;
  const notYetSold=!i.dateSold&&!i.resaleSalePrice;
  if(hasReturnHistory&&notYetSold){
    const rlBPF=calcEbayBPF(i.salePrice||0);
    const rlSalePrice=i.salePrice||0;
    const rlShipping=i.shippingCost||0;
    const rlPackaging=i.packagingCost||0;
    const rlPostage=i.postage||0;
    const rlDefaultPromo=+((i.promoPercent||0)*100).toFixed(1);
    const projTitle=i.isReturned?'Re-list Projection — at current price':'Relist Projection — if sold at '+fmt(rlSalePrice);
    const rlGrossInc=rlSalePrice-rlBPF;
    const rlPromo=rlGrossInc*(i.promoPercent||0)*1.20;
    const rlRev=rlSalePrice+rlPostage-rlBPF;
    const rlCost=rlShipping+rlPackaging+rlPromo;
    const rlProfit=+(rlRev-rlCost).toFixed(2);
    const combinedP=+(profit+rlProfit).toFixed(2);
    relistHTML=`<div class="ip-relist-section">
      <div class="ip-section-header" onclick="var b=this.nextElementSibling,c=this.querySelector('.ip-section-chevron');b.style.display=b.style.display==='none'?'block':'none';c.style.transform=b.style.display==='none'?'rotate(0deg)':'rotate(180deg)'">

        ${rlPostage>0?`<div class="ip-receipt-row"><span style="flex:1">+ Buyer postage</span><span class="ip-receipt-val" style="color:var(--green)">+${fmt(rlPostage)}</span></div>`:''}
        <div class="ip-receipt-row"><span style="flex:1">eBay BPF</span><span class="ip-receipt-val" style="color:var(--red)">−${fmt(rlBPF)}</span></div>
        <div class="ip-receipt-row"><span style="flex:1">Shipping</span><span class="ip-receipt-val" style="color:var(--red)">−${fmt(rlShipping)}</span></div>

            <span style="font-size:11px;color:var(--muted)">+VAT</span>
          </span>

  db+='<div class="ip-row"><div class="ip-label">Source</div>'

  // Parts & Expenses

// SEARCH
const CATEGORY_ICONS={
  'Electronics & Tech':'💻','Cameras & Photography':'📷','Audio & Music':'🎵',
  'Books & Media':'📚','Toys & Games':'🎮','Home & Garden':'🏡',
  'Clothing & Fashion':'👗','Collectibles & Vintage':'🏺','Other':'📦'
};
let _searchIdx=-1;
let _searchResults=[];

function searchAllItems(q){
  const terms=q.toLowerCase().trim().split(/\s+/).filter(Boolean);
  if(!terms.length)return[];
  const results=[];
  allDBKeys().forEach(k=>{
    (DB[k]||[]).forEach(i=>{
      const haystack=[
        (i.item||'').toLowerCase(),
        (i.category||'').toLowerCase(),
        (i.gid||'').toLowerCase(),
        (i.source||'').toLowerCase(),
        (i.notes||'').toLowerCase()
      ].join(' ');
      if(terms.every(t=>haystack.includes(t))){
        results.push({...i,month:k});
      }
    });
  });
  // Sort: active first, then sold, then returned
  const order={listed:0,sold:1,returned:2};
  results.sort((a,b)=>{
    const sa=a.isReturned?'returned':a.resaleSalePrice?'resold':a.dateSold?'sold':'listed';
    const sb=b.isReturned?'returned':b.resaleSalePrice?'resold':b.dateSold?'sold':'listed';
    return (order[sa]??1)-(order[sb]??1);
  });
  return results;
}

function highlightMatch(text,q){
  if(!text||!q.trim())return esc(text||'');
  const terms=q.trim().split(/\s+/).filter(Boolean);
  let result=esc(text);
  terms.forEach(t=>{
    const escaped=t.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&');
    const re=new RegExp('('+escaped+')','gi');
    result=result.replace(re,'<mark>$1</mark>');
  });
  return result;
}

function showSearchDropdown(q){
  const dd=document.getElementById('search-dropdown');
  if(!q.trim()){dd.classList.remove('open');dd.innerHTML='';return;}
  _searchResults=searchAllItems(q);
  _searchIdx=-1;
  const MAX=8;
  const shown=_searchResults.slice(0,MAX);
  const extra=_searchResults.length-MAX;
  if(!shown.length){
    dd.innerHTML=`<div class="search-empty">No items found for "<strong>${esc(q)}</strong>"</div>`;
    dd.classList.add('open');
    return;
  }
  const rows=shown.map((i,idx)=>{
    const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'active';
    const icon=CATEGORY_ICONS[i.category]||'📦';
    const price=i.salePrice?fmt(i.salePrice):'—';
    return`<div class="search-result" data-idx="${idx}" onclick="selectSearchResult(${idx})" onmouseenter="setSearchActive(${idx})">
      <div class="sr-icon">${icon}</div>
      <div class="sr-body">
        <div class="sr-name">${highlightMatch(i.item,q)}</div>
        <div class="sr-meta">
          ${i.category?`<span class="sr-cat">${esc(i.category)}</span>`:''}
          <span class="sr-month">${i.month}</span>
          <span class="sr-status ${status}">${status}</span>
        </div>
      </div>
      <div class="sr-price">${price}</div>
    </div>`;
  }).join('');
  const footer=extra>0?`<div class="search-footer" style="cursor:pointer" onclick="openSearchPage('${esc(q)}')">See all ${_searchResults.length} results for "${esc(q)}" →</div>`:'';
  dd.innerHTML=rows+footer;
  dd.classList.add('open');
}

function setSearchActive(idx){
  _searchIdx=idx;
  document.querySelectorAll('.search-result').forEach((el,i)=>{
    el.classList.toggle('active',i===idx);
  });
}

function selectSearchResult(idx){
  const item=_searchResults[idx];
  if(!item)return;
  closeSearchDropdown();
  document.getElementById('global-search').value='';
  document.querySelector('.search-clear').classList.remove('show');
  openItemPage(item.month,item.id);
}

function handleSearchKey(e){
  const dd=document.getElementById('search-dropdown');
  const open=dd.classList.contains('open');
  if(e.key==='Escape'){closeSearchDropdown();return;}
  if(!open)return;
  const count=Math.min(_searchResults.length,8);
  if(e.key==='ArrowDown'){e.preventDefault();setSearchActive(Math.min(_searchIdx+1,count-1));}
  else if(e.key==='ArrowUp'){e.preventDefault();setSearchActive(Math.max(_searchIdx-1,0));}
  else if(e.key==='Enter'){e.preventDefault();if(_searchIdx>=0){selectSearchResult(_searchIdx);}else{const q=document.getElementById('global-search').value.trim();if(q)openSearchPage(q);}}
}

function closeSearchDropdown(){
  const dd=document.getElementById('search-dropdown');
  dd.classList.remove('open');
  _searchIdx=-1;
}

function handleSearch(q){
  const clear=document.querySelector('.search-clear');
  if(q.trim()){clear.classList.add('show');showSearchDropdown(q);}
  else{clear.classList.remove('show');closeSearchDropdown();}
}
function clearSearch(){
  document.getElementById('global-search').value='';
  document.querySelector('.search-clear').classList.remove('show');
  closeSearchDropdown();
}
function toggleNavSearch(){
  const expand=document.getElementById('nav-search-expand');
  const btn=document.getElementById('nav-search-icon-btn');
  if(!expand)return;
  const isOpen=expand.classList.toggle('open');
  if(btn){btn.style.background=isOpen?'var(--surface2)':'';btn.style.borderColor=isOpen?'var(--accent)':'';}
  if(isOpen)setTimeout(()=>{const inp=document.getElementById('global-search-mobile');if(inp)inp.focus();},50);
}
function clearMobileSearch(){
  const inp=document.getElementById('global-search-mobile');
  if(inp){inp.value='';handleSearch('');}
  toggleNavSearch();
}

function openSearchPage(q){
  closeSearchDropdown();
  document.getElementById('global-search').value=q;
  document.querySelector('.search-clear').classList.add('show');
  // Switch to search page without using goToTab (no tab element to highlight)
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-search').classList.add('on');
  renderSearchResults(q);
}

function renderSearchResults(q){
  // q may be passed directly or read from the input
  if(q===undefined)q=document.getElementById('global-search').value.trim();
  const page=document.getElementById('p-search');
  if(!q){page.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">No search query</div>';return;}
  const results=searchAllItems(q);
  const total=results.length;
  const soldItems=results.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned);
  const totalProfit=soldItems.reduce((s,i)=>s+calcGrossProfit(i),0);

  const rows=results.map(i=>{
    const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'listed';
    const profit=(i.dateSold||i.resaleSalePrice)&&!i.isReturned?calcGrossProfit(i):null;
    const roi=calcROI(i);
    const icon=CATEGORY_ICONS[i.category]||'📦';
    return`<div class="item-row" onclick="openItemPage('${i.month}','${i.id}','p-search')">
      <div class="item-main">
        <div class="item-header">
          <div class="item-name">${icon} ${esc(i.item)}</div>
          <div class="item-badge ${status}">${status}</div>
          ${i.gid?`<div style="font-size:12px;color:var(--muted);font-family:monospace">${i.gid}</div>`:''}
        </div>
        <div class="item-meta">
          <div class="item-meta-item">📅 ${i.dateListed||'—'}</div>
          ${i.dateSold?`<div class="item-meta-item" style="color:var(--green)"><svg width="14" height="14" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="var(--green)" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="var(--green)"/></svg> ${i.dateSold}</div>`:''}
          <div class="item-meta-item">📆 ${i.month}</div>
          ${i.category?`<div class="item-meta-item">📁 ${esc(i.category)}</div>`:''}
        </div>
        <div class="item-meta">
          <div class="item-meta-item">🏷️ ${fmt(i.salePrice)}</div>
          ${profit!==null?`<div class="item-meta-item" style="color:var(--green);font-weight:600">Profit: ${fmt(profit)}</div>`:''}
          ${roi!==null?`<div class="item-meta-item" style="color:var(--muted);font-size:12px">ROI: ${roi.toFixed(1)}%</div>`:''}
        </div>
      </div>
      <div class="item-actions">
        <button class="btn btn-s" onclick="event.stopPropagation();closePanel();editItem('${i.month}','${i.id}')">✏️</button>
      </div>
    </div>`;
  }).join('');

  const noResults=`<div style="padding:60px 20px;text-align:center;color:var(--muted)">
    <div style="font-size:48px;margin-bottom:12px">🔍</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:6px">No results for "${esc(q)}"</div>
    <div style="font-size:14px">Try a different keyword or category</div>

let PANEL_STACK=[];
function updatePanelNav(){
  const backBtn=document.getElementById('panel-back-btn');
  if(!backBtn)return;
  if(PANEL_STACK.length>0){
    backBtn.disabled=false;
    backBtn.style.visibility='visible';
    backBtn.style.cursor='pointer';
  }else{
    backBtn.disabled=true;
    backBtn.style.visibility='hidden';
    backBtn.style.cursor='default';
  }
}
function openPanel(title,content,pushHistory,_meta){
  const panel=document.getElementById('slide-panel');
  if(pushHistory && document.getElementById('slide-panel').classList.contains('on')){
    PANEL_STACK.push({
      title:document.getElementById('panel-title').textContent,
      content:document.getElementById('panel-content').innerHTML,
      scrollTop:panel.scrollTop,
      _meta:panel._panelMeta||null
    });
  }
  panel._panelMeta=_meta||null;
  document.getElementById('panel-title').textContent=title;
  document.getElementById('panel-content').innerHTML=content;
  document.getElementById('panel-overlay').classList.add('on');
  panel.classList.remove('dragging');
  panel.style.transition='';
  panel.style.transform='';
  panel.classList.add('on');
  panel.scrollTop=0;
  document.body.style.overflow='hidden';
  updatePanelNav();
}
function closePanel(){
  const panel=document.getElementById('slide-panel');
  document.getElementById('panel-overlay').classList.remove('on');
  panel.classList.remove('dragging');
  panel.classList.remove('on');
  PANEL_STACK=[];
  document.body.style.overflow='';
  updatePanelNav();
}
function panelBack(){
  if(!PANEL_STACK.length){closePanel();return;}
  const prev=PANEL_STACK.pop();
  const panel=document.getElementById('slide-panel');
  // If the previous panel was a category panel, re-render it live so prices are fresh
  if(prev._meta&&prev._meta.type==='category'){
    panel._panelMeta=prev._meta;
    showCategoryItems(prev._meta.cat,true);
    panel.scrollTop=prev.scrollTop||0;
    updatePanelNav();
    return;
  }
  document.getElementById('panel-title').textContent=prev.title;
  document.getElementById('panel-content').innerHTML=prev.content;
  panel._panelMeta=prev._meta||null;
  panel.scrollTop=prev.scrollTop||0;
  updatePanelNav();
}
function initPanelSwipe(){
  const panel=document.getElementById('slide-panel');
  if(!panel||panel._swipeInit)return;
  panel._swipeInit=true;
  let startX=0,startY=0,curDx=0,tracking=false,active=false,lastX=0,lastT=0,vx=0;

  panel.addEventListener('touchstart',function(e){
    if(!panel.classList.contains('on'))return;
    const t=e.touches[0];if(!t)return;
    if(e.target.closest('input,textarea,select,button,a'))return;
    active=true;tracking=false;curDx=0;vx=0;
    startX=t.clientX;startY=t.clientY;lastX=t.clientX;lastT=Date.now();
  },{passive:true});

  panel.addEventListener('touchmove',function(e){
    if(!active)return;
    const t=e.touches[0];if(!t)return;
    const dx=t.clientX-startX;
    const dy=Math.abs(t.clientY-startY);
    if(!tracking){
      if(dx<8||dy>dx)return;
      tracking=true;
      panel.classList.add('dragging');
    }
    // Confirmed horizontal swipe — stop vertical scroll and panel content scroll
    e.preventDefault();
    const now=Date.now();
    const dt=now-lastT;
    if(dt>0)vx=(t.clientX-lastX)/dt;
    lastX=t.clientX;lastT=now;
    curDx=Math.max(0,dx);
    panel.style.transform='translateX('+curDx+'px)';
  },{passive:false});

  function endSwipe(){
    if(!active)return;
    active=false;
    panel.classList.remove('dragging');
    if(!tracking){curDx=0;vx=0;panel.style.transition='';panel.style.transform='';return;}
    tracking=false;
    const threshold=panel.offsetWidth*0.35;
    const isFlick=vx>0.5&&curDx>20;
    const dismiss=isFlick||(curDx>threshold);
    curDx=0;vx=0;
    if(dismiss){
      // Animate off screen, then close — disable right transition first so only transform runs
      panel.style.transition='transform 0.25s cubic-bezier(0.4,0,1,1)';
      panel.style.transform='translateX(100%)';
      setTimeout(function(){
        // Close silently: remove .on without triggering right transition
        panel.style.transition='none';
        closePanel();
        // Clean up on next frame after close
        requestAnimationFrame(function(){
          panel.style.transition='';
          panel.style.transform='';
        });
      },250);
    } else {
      // Spring back
      panel.style.transition='transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
      panel.style.transform='translateX(0px)';
      setTimeout(function(){
        panel.style.transition='';
        panel.style.transform='';
      },310);
    }
  }

  panel.addEventListener('touchend',endSwipe,{passive:true});
  panel.addEventListener('touchcancel',endSwipe,{passive:true});
}
initPanelSwipe();

function updateBPFPreview(){
  const price=parseFloat(document.getElementById('qa-price').value)||0;
  const preview=document.getElementById('bpf-preview');
  if(price<=0){preview.style.display='none';return;}
  const bpf=calcBuyerProtectionFee(price);
  const net=price-bpf;
  document.getElementById('bpf-listed').textContent=fmt(price);
  document.getElementById('bpf-fee').textContent=fmt(bpf);
  document.getElementById('bpf-total').textContent=fmt(net);
  preview.style.display='block';
  const cost=parseFloat(document.getElementById('qa-cost').value)||0;
  // Read postage from whichever mode is active
  const isSimple=document.getElementById('qa-delivery-simple')&&document.getElementById('qa-delivery-simple').style.display!=='none';
  let shipping=0,buyerPostage=0,packaging=0;
  if(isSimple){
    const sdIdx=parseInt(document.getElementById('qa-sd-rate')?.value||'0')||0;
    const rate=SIMPLE_DELIVERY_RATES[sdIdx]||SIMPLE_DELIVERY_RATES[0];
    const buyerPays=document.getElementById('qa-sd-buyer-pays')?.checked!==false;
    shipping=rate.cost;
    buyerPostage=buyerPays?rate.cost:0;
  }else{
    shipping=parseFloat(document.getElementById('qa-shipping')?.value)||0;
    buyerPostage=parseFloat(document.getElementById('qa-postage')?.value)||0;
    packaging=parseFloat(document.getElementById('qa-packaging')?.value)||0;
  }
  const promoRaw=parseFloat(document.getElementById('qa-promo').value)||0;
  const promoPercent=promoRaw/100;
  const promoCost=net*promoPercent*1.20;
  const rev=price+buyerPostage-bpf;
  const totalCost=cost+shipping+packaging+promoCost;
  const profit=+(rev-totalCost).toFixed(2);
  const profitEl=document.getElementById('profit-preview');
  const valEl=document.getElementById('profit-val');
  const roiEl=document.getElementById('profit-roi');
  if(cost>0||shipping>0||packaging>0||promoPercent>0){profitEl.style.display='block';valEl.textContent=fmt(profit);valEl.style.color=profit>=0?'var(--green)':'var(--red)';if(cost>0){const ti=cost+shipping+packaging+bpf+promoCost;const roi=ti>0?((profit/ti)*100).toFixed(1):null;roiEl.textContent=roi!==null?roi+'% ROI':'';}else{roiEl.textContent='';}}
  else{profitEl.style.display='none';}
}

function showStaleItems(){

    if(!i.isReturned&&!i.dateSold&&!i.resaleSalePrice){
      const days=daysBetween(i.dateListed,today);
      // Only include items listed within the selected period window
      if(days>=30&&i.dateListed&&i.dateListed>=range.from&&i.dateListed<=range.to)
        staleItems.push({...i,month:k,_daysListed:days});
    }
  });});
  staleItems.sort((a,b)=>b._daysListed-a._daysListed);
  if(!staleItems.length){openPanel('Stale Items','<div style="padding:30px;text-align:center;color:var(--muted)">No stale items — everything is moving!</div>');return;}
  const rows=staleItems.map(i=>{

    const profit=calcGrossProfit(i);

function showCategoryItems(cat,_fromBack){
  let items=[];
  allDBKeys().forEach(k=>{(DB[k]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    if((i.category||'Other')===cat)items.push({...i,month:k});
  });});
  const sold=items.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned);
  const active=items.filter(i=>!i.dateSold&&!i.isReturned&&!i.resaleSalePrice);
  // Sort: listed first (by days listed desc — most urgent top), then sold (most recent first), then returned
  items.sort((a,b)=>{
    const statusOrder=i=>{
      if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice)return 0;
      if((i.dateSold||i.resaleSalePrice)&&!i.isReturned)return 1;
      return 2;
    };
    const so=statusOrder(a)-statusOrder(b);
    if(so!==0)return so;
    // Within listed: most days listed first (most urgent)
    if(statusOrder(a)===0){
      const _today=new Date().toISOString().split('T')[0];
      const dA=a.dateListed?daysBetween(a.dateListed,_today):0;
      const dB=b.dateListed?daysBetween(b.dateListed,_today):0;
      return dB-dA;
    }
    // Within sold: most recent sale first
    const dateA=(a.resaleDateSold||a.dateSold||'');
    const dateB=(b.resaleDateSold||b.dateSold||'');
    return dateB.localeCompare(dateA);
  });
  const totalProfit=sold.reduce((s,i)=>s+calcGrossProfit(i),0);
  const soldWithDate=sold.filter(i=>calcDaysToSell(i)!==null);
  const avgDays=soldWithDate.length?Math.round(soldWithDate.reduce((s,i)=>s+calcDaysToSell(i),0)/soldWithDate.length):null;
  const html=`
    <div style="margin-bottom:16px;background:var(--surface2);border-radius:10px;padding:14px">
      <div style="font-size:16px;font-weight:700;margin-bottom:6px">${esc(cat)}</div>
      <div style="display:flex;gap:16px;font-size:13px;color:var(--text-secondary);flex-wrap:wrap">
        <span>${items.length} total</span>
        <span style="color:var(--green)">${sold.length} sold · ${fmt(totalProfit)} profit</span>
        <span style="color:var(--muted)">${active.length} active</span>
        ${avgDays!==null?`<span style="color:var(--text-secondary)">avg ${avgDays}d to sell</span>`:''}
      </div>
    </div>
    ${items.map(i=>{
      const _today=new Date().toISOString().split('T')[0];
      const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'listed';
      const prof=(i.dateSold||i.resaleSalePrice)&&!i.isReturned?calcGrossProfit(i):null;
      const daysToSell=!i.isReturned&&(i.dateSold||i.resaleSalePrice)?calcDaysToSell(i):null;
      const daysListed=!i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&i.dateListed?daysBetween(i.dateListed,_today):null;
      const returnedAt=i.isReturned&&i.returnHistory&&i.returnHistory.length?i.returnHistory[i.returnHistory.length-1].loggedAt:null;
      const daysSinceReturn=i.isReturned&&(returnedAt||i.dateListed)?daysBetween(returnedAt||i.dateListed,_today):null;
      const isStale=daysListed!==null&&daysListed>=30;
      const isStaleReturn=daysSinceReturn!==null&&daysSinceReturn>=30;
      // Colour thresholds: ≤14 green, ≤30 amber, 30+ red
      const daysColor=daysToSell!==null
        ?(daysToSell<=14?'var(--green)':daysToSell<=30?'var(--warn)':'var(--red)')
        :daysListed!==null
        ?(daysListed<=14?'var(--green)':daysListed<=30?'var(--warn)':'var(--red)')
        :daysSinceReturn!==null
        ?(daysSinceReturn<=14?'var(--green)':daysSinceReturn<=30?'var(--warn)':'var(--red)')
        :'var(--muted)';
      const daysDisplay=daysToSell!==null?daysToSell+'d'
        :daysListed!==null?daysListed+'d'
        :daysSinceReturn!==null?daysSinceReturn+'d since return'
        :null;
      return`<div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;cursor:pointer${isStale||isStaleReturn?';border-left:2px solid var(--warn)':''}" onclick="openItemDetail('${i.month}','${i.id}')">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <div style="flex:1;font-weight:600;font-size:14px">${esc(i.item)}</div>
          ${daysDisplay!==null?`<span style="font-size:11px;font-weight:600;color:${daysColor}">${daysDisplay}</span>`:''}
          ${isStale||isStaleReturn?`<span style="font-size:10px;font-weight:700;background:rgba(245,158,11,0.15);color:var(--warn);border-radius:4px;padding:2px 6px;">stale</span>`:''}
          <div class="item-badge ${status}">${status}</div>
          <div style="font-size:11px;color:var(--muted)">${i.month}</div>
        </div>
        <div style="display:flex;gap:12px;font-size:12px;color:var(--text-secondary)">
          <span>${fmt(i.salePrice)}</span>
          ${prof!==null?`<span style="color:var(--green);font-weight:600">${fmt(prof)}</span>`:''}
          ${(i.dateSold||i.resaleSalePrice)&&!i.isReturned&&calcROI(i)!==null?`<span style="color:var(--muted)">ROI ${calcROI(i).toFixed(1)}%</span>`:''}
        </div>
      </div>`;
    }).join('')}`;
  openPanel(cat,html,false,{type:'category',cat});
}

function _inSummaryPeriod(dateStr){
  const range=_periodDateRange(SUMMARY_PERIOD);
  if(!range.from)return true;
  if(!dateStr)return false;
  return dateStr>=range.from&&dateStr<=range.to;
}

function showFilteredItems(filter){
  let items=[];
  allDBKeys().forEach(k=>{(DB[k]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    const sold=(i.dateSold||i.resaleSalePrice)&&!i.isReturned;
    const saleDate=i.resaleSalePrice?i.resaleDateSold:i.dateSold;
    if((filter==='revenue'||filter==='realised')&&sold){
      if(!_inSummaryPeriod(saleDate))return;
      if(i.resaleSalePrice){
        const bpf=calcEbayBPF(i.salePrice);
        const grossInc=i.salePrice-bpf;
        const promoCost=grossInc*(i.promoPercent||0)*1.20;
        const rev=i.salePrice+(i.postage||0)-bpf;
        const returnCost=(i.returnHistory||[]).reduce(function(s,r){
          const fullReturn=(r.type==='full_seller'||r.type==='full_ebay');
          const netRefund=fullReturn?Math.max(0,(r.refundAmount||0)-bpf):(r.refundAmount||0);
          return s+netRefund+(r.returnPostage||0);
        },0);
        const partsCost=calcPartsCost(i);
        const cost=(i.costPrice||0)+(i.shippingCost||0)+(i.packagingCost||0)+promoCost+returnCost+partsCost;
        const sale1Profit=+(rev-cost).toFixed(2);
        const rBPF=calcEbayBPF(i.resaleSalePrice);
        const rGrossInc=i.resaleSalePrice-rBPF;
        const rPromoCost=rGrossInc*(i.resalePromoPercent||0)*1.20;
        const sale2Profit=+(i.resaleSalePrice-rBPF-(i.resaleShippingCost||0)-rPromoCost).toFixed(2);
        if(filter==='revenue'){
          // Revenue: two real cash transactions — show both
          items.push({...i,month:k,_entryType:'sale1',_displayPrice:i.salePrice,_displayDate:i.dateSold||(i.returnHistory&&i.returnHistory[0]?i.returnHistory[0].loggedAt:'')||'',_entryProfit:sale1Profit});
          items.push({...i,month:k,_entryType:'sale2',_displayPrice:i.resaleSalePrice,_displayDate:i.resaleDateSold||'',_entryProfit:sale2Profit});
        }else{
          // Realised P&L: one lifetime entry — the full story
          const lifetimeProfit=calcGrossProfit(i);
          const saleDate=i.resaleDateSold||(i.returnHistory&&i.returnHistory[0]?i.returnHistory[0].loggedAt:'')||'';
          items.push({...i,month:k,_entryType:'resold',_displayPrice:i.resaleSalePrice,_displayDate:saleDate,_entryProfit:lifetimeProfit});
        }
      } else {
        items.push({...i,month:k,_entryType:'normal',_displayPrice:i.salePrice,_displayDate:i.dateSold||'',_entryProfit:calcGrossProfit(i)});
      }
    } else if(filter==='unrealised'&&!sold&&!i.isReturned){
      items.push({...i,month:k});
    } else if(filter==='stock'&&!sold&&!i.isReturned){
      items.push({...i,month:k});
    }
  });});
  // Sort
  if(filter==='revenue'||filter==='realised')items.sort((a,b)=>(b._displayDate||'').localeCompare(a._displayDate||''));
  if(filter==='realised')items.sort((a,b)=>(b._entryProfit||0)-(a._entryProfit||0));
  const titles={revenue:'Total Revenue',realised:'Realised P&L',unrealised:'Unrealised Profit',stock:'Stock Value'};
  let summaryVal='',summaryLabel='',summaryColor='var(--accent)';
  const uniqueItemCount=new Set(items.map(i=>i.id)).size;
  const returnEntryCount=items.filter(i=>i._entryType==='sale1').length;
  const resoldEntryCount=items.filter(i=>i._entryType==='resold').length;
  if(filter==='revenue'){
    summaryVal=fmt(items.reduce((s,i)=>s+(i._displayPrice||0),0));
    summaryLabel=`${items.length} transactions · ${uniqueItemCount} items`;
    summaryColor='var(--accent)';
  } else if(filter==='realised'){
    const t=items.reduce((s,i)=>s+(i._entryProfit||0),0);
    summaryVal=fmt(t);
    const extras=[];
    if(resoldEntryCount>0)extras.push(`${resoldEntryCount} resold`);
    summaryLabel=`${items.length} items${extras.length?' · '+extras.join(' · '):''}`;
    summaryColor='var(--green)';
  } else if(filter==='unrealised'){
    summaryVal=fmt(items.reduce((s,i)=>s+(calcGrossProfit(i)||0),0));
    summaryLabel=`${items.length} active listings`;
    summaryColor='var(--purple)';
  } else if(filter==='stock'){
    summaryVal=fmt(items.reduce((s,i)=>s+(i.salePrice||0),0));
    summaryLabel=`${items.length} items listed`;
    summaryColor='var(--blue)';
  }
  function renderEntryRow(i){
    const entryLabel=esc(i.item);
    const badgeHTML=i._entryType==='sale1'
      ?`<div style="display:flex;gap:4px"><div class="item-badge" style="background:var(--warn);color:#000">sold & returned</div><div class="item-badge" style="background:var(--warn);color:#000;opacity:0.75">S1</div></div>`
      :i._entryType==='sale2'
      ?`<div style="display:flex;gap:4px"><div class="item-badge" style="background:var(--purple);color:#fff">resold</div><div class="item-badge" style="background:var(--purple);color:#fff;opacity:0.75">S2</div></div>`
      :i._entryType==='resold'
      ?`<div class="item-badge" style="background:var(--purple);color:#fff">↻ resold</div>`
      :`<div class="item-badge ${i.dateSold?'sold':'listed'}">${i.month}</div>`;
    let subRow='';
    if(filter==='revenue'){
      subRow=`<div style="font-size:12px;margin-top:4px;color:var(--muted)">${i._displayDate||'—'} · ${fmt(i._displayPrice)}</div>`;
    } else if(filter==='realised'){

// Track collapsed state of FY sections — default: current year expanded, others collapsed
const _fyCollapsed={};

function _getFYLabel(fyStart){
  // fyStart = year the FY begins (e.g. 2025 for 2025-26)
  return fyStart+'–'+(fyStart+1);
}

function _getMonthFY(m){
  // m = e.g. 'APR' (MONTHS array uses 3-letter codes, no year suffix).
  // UK tax year runs Apr–Mar. MONTHS covers one calendar year Jan–Dec.
  // We split them across two tax years:
  //   Jan, Feb, Mar → tail end of the PREVIOUS tax year (FY started Apr year-1)
  //   Apr–Dec       → start of the CURRENT tax year (FY started Apr this year)
  // Example (today = Apr 2026):
  //   APR–DEC → FY 2026 (tax year 2026-27)  ← future months not yet reached
  //   JAN–MAR → FY 2025 (tax year 2025-26)  ← already passed
  const mo=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'].indexOf(m);
  const now=new Date();
  const yr=now.getFullYear();
  const curMo=now.getMonth(); // 0=Jan
  // fyBase = the year the current tax year STARTED (i.e. the April)
  const fyBase=curMo<3?yr-1:yr;
  // Apr(3)–Dec(11) belong to fyBase; Jan(0)–Mar(2) belong to fyBase-1
  return mo>=3?fyBase:fyBase-1;
}

function _getCurrentFY(){
  const now=new Date();
  const m=now.getMonth(); // 0=Jan
  const y=now.getFullYear();
  return m>=3?y:y-1; // April=3
}

function toggleFYSection(fyStart){
  _fyCollapsed[fyStart]=!_fyCollapsed[fyStart];
  renderMonthlyGrid();
}

function renderMonthlyGrid(){
  const now=new Date();
  const curMonthKey=currentMonthKey(); // e.g. 'APR-26'
  const currentFY=_currentFYStart();

  // Build set of FYs to show: previous, current, next + any FY with data
  const fySet=new Set([currentFY-1, currentFY, currentFY+1]);
  allDBKeys().forEach(function(k){
    const code=keyCode(k); const yr=keyYear(k);
    const mo=MONTHS.indexOf(code);
    if(mo<0)return;
    const fy=mo>=3?yr:yr-1;
    fySet.add(fy);
  });
  const fyYears=Array.from(fySet).sort(function(a,b){return b-a;}); // newest first

  let html='<div style="padding-bottom:80px;">';
  html+='<h1 style="font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:20px;">Calendar</h1>';

  fyYears.forEach(function(fy){
    const months=_fyKeys(fy); // full Apr-Mar ordered list of 'MMM-YY' keys
    const isCurrentFY=fy===currentFY;
    // Default collapse: current FY always open; previous FY open if within 6 months
    // of its end (March) — i.e. before October of the current year; future + older always collapsed
    let defaultCollapsed;
    if(fy===currentFY){ defaultCollapsed=false; }
    else if(fy===currentFY-1){
      // Previous FY ended March of currentFY. Stay open until Oct 1 of currentFY.
      const cutoff=new Date(currentFY,9,1); // Oct 1 (month index 9)
      defaultCollapsed=now>=cutoff;
    } else { defaultCollapsed=true; }
    const isCollapsed=_fyCollapsed[fy]!==undefined?_fyCollapsed[fy]:defaultCollapsed;

    let fyProfit=0,fySold=0,fyROISum=0,fyROICount=0;
    months.forEach(function(k){
      const ms=calcMonthStats(k);
      fyProfit+=ms.realisedProfit;
      fySold+=ms.soldCount;
      (DB[k]||[]).forEach(function(i){
        if((i.dateSold||i.resaleSalePrice)&&!i.isReturned){
          const roi=calcROI(i);
          if(roi!==null){fyROISum+=roi;fyROICount++;}
        }
      });
    });
    const fyAvgROI=fyROICount>0?(fyROISum/fyROICount):null;
    const fyLabel=_getFYLabel(fy);
    const profitColor=fyProfit>0?'var(--green)':fyProfit<0?'var(--red)':'var(--muted)';
    const chevronRot=isCollapsed?'0deg':'180deg';
    const borderCol=isCurrentFY?'var(--accent)':'var(--border)';
    const labelCol=isCurrentFY?'var(--accent)':'var(--text)';
    const currentBadge=isCurrentFY?'<span style="font-size:10px;font-weight:700;background:var(--accent);color:#000;border-radius:4px;padding:2px 7px;letter-spacing:0.5px;">CURRENT</span>':'';
    const roiSpan=fyAvgROI!==null?'<span style="color:var(--text-secondary)">'+fyAvgROI.toFixed(1)+'% avg ROI</span>':'';

    let gridHTML='';
    if(!isCollapsed){
      // Past FYs: show most-recent month first (MAR→APR). Current FY: chronological (APR→now).
      const displayMonths=isCurrentFY?months:[...months].reverse();
      const cards=displayMonths.map(function(k){
        const ms=calcMonthStats(k);
        const hasItems=(DB[k]||[]).length>0;
        const hasSales=ms.soldCount>0||ms.listedCount>0;
        const isCurrent=k===curMonthKey;
        // Truly empty: no items at all AND not current month
        const trulyEmpty=!hasItems&&!isCurrent;
        // Has items but 0 sold
        const hasListedOnly=hasItems&&ms.soldCount===0;
        const borderStyle=isCurrent?'border-color:var(--accent);':'';
        let cardContent;
        if(trulyEmpty){
          cardContent='<div class="mval nil" style="font-size:16px;margin-bottom:6px;">—</div>'
            +'<div class="msub" style="opacity:0.5">No items yet · tap to add</div>';
        } else if(hasListedOnly){
          cardContent='<div class="mval nil">—</div>'
            +'<div class="msub">0 sold · '+ms.listedCount+' active · — avg</div>';
        } else {
          const profVal=ms.realisedProfit>0?'pos':ms.realisedProfit<0?'neg':'nil';
          cardContent='<div class="mval '+profVal+'">'+(ms.soldCount>0?fmt(ms.realisedProfit):'—')+'</div>'
            +'<div class="msub">'+ms.soldCount+' sold · '+ms.listedCount+' active'+(ms.avgDays!==null?' · '+ms.avgDays+'d avg':' · — avg')+'</div>';
        }
        const nowBadge=isCurrent?'<span style="font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.5px;text-transform:uppercase;">Now</span>':'';
        const monthLabel=MONTH_NAMES[keyCode(k)]; // e.g. 'April'
        return '<div class="mcard'+(trulyEmpty?' mcard-empty':'')+'" style="'+borderStyle+'" onclick="goToMonth(\''+k+'\')">' 
          +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'
          +'<div class="mname" style="margin-bottom:0">'+monthLabel+'</div>'+nowBadge+'</div>'
          +cardContent+'</div>';
      }).join('');
      gridHTML='<div class="mgrid" style="margin-top:10px;">'+cards+'</div>';
    }

    html+='<div class="fy-section" style="margin-bottom:'+(isCollapsed?'12px':'20px')+'">'
      +'<div onclick="toggleFYSection('+fy+')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border:1.5px solid '+borderCol+';border-radius:10px;cursor:pointer;user-select:none;transition:border-color 0.15s;">'
      +'<div style="display:flex;align-items:center;gap:10px;">'
      +'<span style="font-size:13px;font-weight:700;letter-spacing:0.02em;color:'+labelCol+'">FY '+fyLabel+'</span>'
      +currentBadge+'</div>'
      +'<div style="display:flex;align-items:center;gap:20px;">'
      +'<div style="display:flex;gap:16px;align-items:center;font-size:13px;">'
      +'<span style="color:var(--text-secondary)">'+fySold+' sold</span>'
      +roiSpan
      +'<span style="font-weight:700;color:'+profitColor+'">'+fmt(fyProfit)+'</span>'
      +'</div>'
      +'<span style="font-size:14px;color:var(--muted);transition:transform 0.2s;display:inline-block;transform:rotate('+chevronRot+');">▾</span>'
      +'</div></div>'
      +gridHTML
      +'</div>';
  });

  html+='</div>';
  document.getElementById('p-monthly').innerHTML=html;
}

function toggleMonthPicker(){
  const el=document.getElementById('month-picker');
  if(!el)return;
  const wasOpen=el.classList.contains('open');
  el.classList.toggle('open');
  if(!wasOpen){
    // Scroll active month into view after dropdown renders
    setTimeout(function(){
      const list=document.getElementById('month-picker-list');
      const active=list&&list.querySelector('.month-picker-option.active');
      if(active)active.scrollIntoView({block:'center',behavior:'instant'});
    },0);
  }
}
function pickMonth(m){
  const el=document.getElementById('month-picker');
  if(el)el.classList.remove('open');
  SELECTED_MONTH=m;MONTH_FILTER='listed';SELECTION_MODE=false;SELECTED_ITEMS.clear();
  renderMonth();
}
// Close picker on outside click
document.addEventListener('click',function(e){
  const el=document.getElementById('month-picker');
  if(el&&!el.contains(e.target))el.classList.remove('open');
});

function setMonthFilter(f){
  MONTH_FILTER=f;
  if(f==='sold')MONTH_SORT='date-sold';
  else if(f==='listed'||f==='all')MONTH_SORT='date-listed';
  renderMonth();
}
function setMonthSort(s){MONTH_SORT=s;renderMonth();}

function renderMonth(){
  const m=SELECTED_MONTH;
  const allItems=(DB[m]||[]);
  const stats=calcMonthStats(m);

  // Counts for chips
  const cAll=allItems.length;
  const cListed=allItems.filter(i=>!i.dateSold&&!i.isReturned&&!i.resaleSalePrice).length;
  const cSold=allItems.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned).length;
  const cReturned=allItems.filter(i=>i.isReturned).length;

  // Apply filter
  let items=allItems;
  if(MONTH_FILTER==='listed')items=allItems.filter(i=>!i.dateSold&&!i.isReturned&&!i.resaleSalePrice);
  else if(MONTH_FILTER==='sold')items=allItems.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned);
  else if(MONTH_FILTER==='returned')items=allItems.filter(i=>i.isReturned);

  // Apply sort
  const today=new Date().toISOString().split('T')[0];
  items=[...items].sort((a,b)=>{
    if(MONTH_SORT==='profit'){
      const pa=calcGrossProfit(a)||0, pb=calcGrossProfit(b)||0;
      return pb-pa;
    }
    if(MONTH_SORT==='price')return (b.salePrice||0)-(a.salePrice||0);
    if(MONTH_SORT==='date-sold'){
      const da=a.dateSold||'0', db=b.dateSold||'0';
      return db<da?-1:db>da?1:0;
    }
    // default: date-listed desc
    const da=a.dateListed||'0', db=b.dateListed||'0';
    return db<da?-1:db>da?1:0;
  });

  const backLabel=_monthOrigin==='grid'?'← Calendar':_monthOrigin==='p-summary'?'← Summary':'← Back';
  const backAction=_monthOrigin==='grid'
    ?`backToMonthlyGrid()`
    :_monthOrigin==='p-summary'
      ?`goToTab('summary',document.querySelector('[data-tab="summary"]'))`
      :`goToTab('${(_monthOrigin||'p-summary').replace('p-','')}',document.querySelector('[data-tab="${(_monthOrigin||'p-summary').replace('p-','')}"]'))`;

  const html=`
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-s" style="padding:7px 14px;font-size:13px;" onclick="${backAction}">${backLabel}</button>
        <div class="month-picker-wrap" id="month-picker">
          <div class="month-picker-title" onclick="toggleMonthPicker()">
            ${keyName(m)}
            <span class="month-picker-chevron">▾</span>
          </div>
          <div class="month-picker-backdrop" onclick="toggleMonthPicker()"></div>
          <div class="month-picker-dropdown" id="month-picker-list">
            ${(()=>{
              const curFY=_currentFYStart();
              const fySet=new Set();
              allDBKeys().forEach(k=>{const code=keyCode(k);const yr=keyYear(k);const mo=MONTHS.indexOf(code);const fy=mo>=3?yr:yr-1;fySet.add(fy);});
              const fyYears=Array.from(fySet).sort((a,b)=>b-a);
              let out='';
              fyYears.forEach(fy=>{
                const keys=_fyKeys(fy);
                const isCur=fy===curFY;
                out+='<div class="month-picker-fy-header">FY '+_getFYLabel(fy)+(isCur?' · Current':'')+'</div>';
                keys.forEach(k=>{
                  const ms=calcMonthStats(k);
                  const hasSales=ms.soldCount>0||ms.listedCount>0;
                  const sub=hasSales
                    ?'<span class="month-picker-option-sub">'+ms.soldCount+' sold · '+ms.listedCount+' listed</span>'
                    :'<span class="month-picker-option-sub" style="opacity:0.4">empty</span>';
                  out+='<div class="month-picker-option'+(k===m?' active':'')+'" onclick="pickMonth(\''+k+'\')">' 
                    +MONTH_NAMES[keyCode(k)]+sub+'</div>';
                });
              });
              return out;
            })()}
          </div>
        </div>
      </div>
    </div>

    <div class="kgrid kgrid-4">
      <div class="kcard">
        <div class="klabel">Revenue</div>
        <div class="kval">${fmt(stats.totalRev)}</div>
        <div class="ksub">${stats.soldCount} item${stats.soldCount!==1?'s':''} sold</div>
      </div>
      <div class="kcard b">
        <div class="klabel">Potential Revenue</div>
        <div class="kval">${fmt(stats.stockValue)}</div>
        <div class="ksub">${stats.listedCount} still listed</div>
      </div>
      <div class="kcard g">
        <div class="klabel">Realised P&amp;L</div>
        <div class="kval">${fmt(stats.realisedProfit)}</div>
        <div class="ksub">${stats.soldCount>0?(stats.realisedProfit/stats.totalRev*100).toFixed(0)+'% margin':'—'}</div>
      </div>
      <div class="kcard p">
        <div class="klabel">Potential Profit</div>
        <div class="kval">${fmt(stats.unrealisedProfit)}</div>
        <div class="ksub">${stats.listedCount} still listed</div>
      </div>
    </div>



    <div class="filter-row">
      <select class="sort-select" onchange="setMonthFilter(this.value)">
        <option value="listed" ${MONTH_FILTER==='listed'?'selected':''}>Listed (${cListed})</option>
        <option value="all" ${MONTH_FILTER==='all'?'selected':''}>All (${cAll})</option>
        <option value="sold" ${MONTH_FILTER==='sold'?'selected':''}>Sold (${cSold})</option>
        ${cReturned>0?`<option value="returned" ${MONTH_FILTER==='returned'?'selected':''}>Returned (${cReturned})</option>`:''}
      </select>
      <select class="sort-select" onchange="setMonthSort(this.value)">
        <option value="date-listed" ${MONTH_SORT==='date-listed'?'selected':''}>↑ Date listed</option>
        <option value="date-sold" ${MONTH_SORT==='date-sold'?'selected':''}>↑ Date sold</option>
        <option value="profit" ${MONTH_SORT==='profit'?'selected':''}>↑ Profit</option>
        <option value="price" ${MONTH_SORT==='price'?'selected':''}>↑ Price</option>
      </select>
    </div>

    ${allItems.length===0?`
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div class="empty-state-text">No items for ${m} yet</div>
        <div class="empty-state-sub">Tap the + button to add your first item</div>
      </div>
    `:items.length===0?`
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-text">No ${MONTH_FILTER} items</div>
        <div class="empty-state-sub"><span style="color:var(--accent);cursor:pointer;font-weight:600" onclick="setMonthFilter('all')">Show all ${cAll}</span></div>
      </div>
    `:`
      <div class="list-toolbar">
        ${SELECTION_MODE?`
          <button class="sel-check" onclick="${SELECTED_ITEMS.size===items.length?'SELECTED_ITEMS.clear();renderMonth()':'selectAllMonth()'}">
            <span class="sel-check-box ${SELECTED_ITEMS.size===items.length?'all':SELECTED_ITEMS.size>0?'some':''}">
              ${SELECTED_ITEMS.size===items.length?'\u2713':SELECTED_ITEMS.size>0?'\u2212':''}
            </span>
            <span style="color:${SELECTED_ITEMS.size>0?'var(--text)':'var(--text-secondary)'}">${SELECTED_ITEMS.size>0?SELECTED_ITEMS.size+' selected':'Select all'}</span>
          </button>
          ${SELECTED_ITEMS.size>0?`
            <button class="btn btn-s" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px;color:var(--green)" onclick="bulkAction('sold')"><svg width="13" height="13" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="currentColor"/></svg> Mark Sold</button>
            <button class="btn btn-s danger" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px" onclick="bulkAction('delete')"><svg width="13" height="13" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.5 1h4M1 3.5h13M2.5 3.5l1 9a1 1 0 001 .9h6a1 1 0 001-.9l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 6.5v4M9 6.5v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> Delete</button>
          `:''}
          <button class="sel-exit" onclick="toggleSelectionMode()">\u2715 Done</button>
        `:`
          <button class="select-toggle" onclick="toggleSelectionMode()">Select</button>
        `}
      </div>
      <div class="item-table">
        ${items.map(i=>renderItemRow(m,i)).join('')}
      </div>
    `}
  `;
  document.getElementById('p-monthly').innerHTML=html;
}

function renderItemRow(m,i){
  const selected=SELECTED_ITEMS.has(i.id);
  const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'listed';
  const today=new Date().toISOString().split('T')[0];
  // daysListed: for active items only (stale detection). For sold/resold use calcDaysToSell.
  const daysListed=(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice)?daysBetween(i.dateListed,today):0;
  const daysToSellVal=(i.dateSold||i.resaleSalePrice)&&!i.isReturned?calcDaysToSell(i):null;
  const profit=calcGrossProfit(i);
  const roi=calcROI(i);
  const isStale=!i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&daysListed>=30;

  // Status-aware meta — minimum useful info per status
  const metaParts=[];
  if(status==='listed'){
    if(i.dateListed)metaParts.push(i.dateListed);
    metaParts.push(daysListed+'d'+(isStale?' ⚠️':''));
  }else if(status==='sold'){
    if(i.dateSold)metaParts.push('sold '+i.dateSold);
    if(daysToSellVal!==null)metaParts.push(daysToSellVal+'d to sell');
  }else if(status==='resold'){
    if(i.resaleDateSold)metaParts.push('resold '+i.resaleDateSold);
    else if(i.dateSold)metaParts.push('sold '+i.dateSold);
    if(daysToSellVal!==null)metaParts.push(daysToSellVal+'d avg');
  }else if(status==='returned'){
    if(i.dateSold)metaParts.push('sold '+i.dateSold);
  }
  if(i.gid)metaParts.push(i.gid);

  const metaStr=metaParts.join(' · ');

  // Right column — price + profit/ROI
  let profitEl='';
  if((i.dateSold||i.resaleSalePrice)&&!i.isReturned){
    const cls=profit>=0?'pos':'neg';
    profitEl='<div class="item-row-profit '+cls+'">'+fmt(profit)+'</div>';
    if(roi!==null)profitEl+='<div class="item-row-roi">'+roi.toFixed(1)+'% ROI</div>';
  }else if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&profit!==null){
    profitEl='<div class="item-row-profit est">est. profit '+fmt(profit)+'</div>';
  }else if(i.isReturned){
    const cls=profit>=0?'pos':'neg';
    profitEl='<div class="item-row-profit '+cls+'">net '+fmt(profit)+'</div>';
  }

  // Left slot: checkbox in selection mode, status dot otherwise
  const leftSlot=SELECTION_MODE
    ?'<label class="item-checkbox-left" onclick="event.stopPropagation()"><input type="checkbox" '+(selected?'checked':'')+' onchange="toggleSelect(\''+i.id+'\')" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;margin-right:4px"></label>'
    :'<div class="status-dot '+status+'"></div>';

  // Row click
  const rowClick=SELECTION_MODE
    ?'onclick="toggleSelect(\''+i.id+'\')"'
    :'onclick="openItemPage(\''+m+'\',\''+i.id+'\')"';

  const actionsHTML='<div class="ddwrap" id="dd-'+i.id+'">'+
    '<button class="ddbtn" onclick="event.stopPropagation();toggleDD(\'dd-'+i.id+'\')" title="Actions">⋮</button>'+
    '<div class="ddmenu">'+
      '<button onclick="event.stopPropagation();openItemPage(\''+m+'\',\''+i.id+'\')">📄 Full page</button>'+
      '<button onclick="event.stopPropagation();editItem(\''+m+'\',\''+i.id+'\')">✏️ Edit</button>'+
      (!i.dateSold&&!i.resaleSalePrice?'<button onclick="event.stopPropagation();markSold(\''+m+'\',\''+i.id+'\')"><svg width="14" height="14" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="currentColor"/></svg> Mark Sold</button>':'')+
      ((i.dateSold||i.resaleSalePrice)&&!i.isReturned?'<button onclick="event.stopPropagation();openReturn(\''+m+'\',\''+i.id+'\')">↩️ Log Return</button>':'')+
      '<button onclick="event.stopPropagation();duplicateItem(\''+m+'\',\''+i.id+'\')">📋 Duplicate</button>'+
      '<button class="danger" onclick="event.stopPropagation();deleteItem(\''+m+'\',\''+i.id+'\')">🗑️ Delete</button>'+
    '</div></div>';

  return'<div class="item-row'+(selected?' selected':'')+' '+(isStale?' stale':'')+'" '+rowClick+'>'+
    '<div class="item-main">'+
      '<div class="item-row-inner">'+
        leftSlot+
        '<div class="item-row-body">'+
          '<div class="item-row-name">'+esc(i.item)+'</div>'+
          '<div class="item-row-meta">'+
            '<span class="item-badge '+status+'">'+status+'</span>'+
            (metaStr?'<span class="item-row-meta-sep">·</span><span>'+metaStr+'</span>':'')+
          '</div>'+
        '</div>'+
        '<div class="item-row-right">'+
          '<div class="item-row-price">'+fmt(i.salePrice)+'</div>'+
          profitEl+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="item-actions">'+actionsHTML+'</div>'+
  '</div>';
}


function openItemDetail(m,id,noHistory){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const bpf=calcEbayBPF(i.salePrice||0);
  const grossInc=(i.salePrice||0)-bpf;
  const promoCost=grossInc*(i.promoPercent||0)*1.20;
  const profit=calcGrossProfit(i);
  const roi=calcROI(i);
  const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'listed';
  const isSold=(i.dateSold||i.resaleSalePrice)&&!i.isReturned;
  const isUnsold=!i.dateSold&&!i.resaleSalePrice&&!i.isReturned;

  // Primary action button — the thing you most likely opened this to do
  const primaryBtn=i.isReturned
    ?`<button class="btn btn-p" style="flex:1;justify-content:center;gap:8px;padding:12px;background:var(--warn);color:#000" onclick="openRelist('${m}','${id}')">↩ Relist</button>`
    :isUnsold
    ?`<button class="btn btn-p" style="flex:1;justify-content:center;gap:8px;padding:12px" onclick="markSold('${m}','${id}')"><svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="currentColor"/></svg> Mark Sold</button>`
    :isSold
    ?`<button class="btn btn-s" style="flex:1;justify-content:center;padding:12px" onclick="openReturn('${m}','${id}')">↩ Log Return</button>`
    :'';

  // Stat strip — sale + cost as editable ip-tokens, profit read-only
  const saleEditable=isUnsold;
  const statStrip=`
    <div style="display:grid;grid-template-columns:1fr 1fr${profit!==null?' 1fr':''};gap:8px;margin-bottom:16px">
      <div class="ip-token${saleEditable?'':' locked'}" id="tok-salePrice-${id}"${saleEditable?` onpointerdown="tokenPointerDown('${m}','${id}','salePrice')" onclick="openTokenEdit('${m}','${id}','salePrice')"`:''}>
        <div class="ip-token-label">Sale Price</div>
        <div class="ip-token-val">${fmt(i.salePrice||0)}</div>
        <div class="ip-token-sub">${saleEditable?'✏️ Tap to edit':'🔒 Locked'}</div>
      </div>
      <div class="ip-token" id="tok-costPrice-${id}" onpointerdown="tokenPointerDown('${m}','${id}','costPrice')" onclick="openTokenEdit('${m}','${id}','costPrice')">
        <div class="ip-token-label">Buy Price</div>
        <div class="ip-token-val">${fmt(i.costPrice||0)}</div>
        <div class="ip-token-sub">✏️ Tap to edit</div>
      </div>
      ${profit!==null?`<div class="ip-token locked ${profit>=0?'pos':'neg'}">
        <div class="ip-token-label">Profit</div>
        <div class="ip-token-val">${fmt(profit)}</div>
        <div class="ip-token-sub">${roi!==null?'ROI '+roi.toFixed(1)+'%':'—'}</div>
      </div>`:''}
    </div>`;

  // Quick edits — only the fields you realistically change on the fly
  const quickEdit=`

function toggleSelect(id){
  if(SELECTED_ITEMS.has(id)){SELECTED_ITEMS.delete(id);}else{SELECTED_ITEMS.add(id);}
  renderMonth();
}

function toggleSelectionMode(){
  SELECTION_MODE=!SELECTION_MODE;
  if(!SELECTION_MODE)SELECTED_ITEMS.clear();
  renderMonth();
}

function selectAllMonth(){
  // Select all items visible in current filter
  const allItems=(DB[SELECTED_MONTH]||[]);
  let items=allItems;
  if(MONTH_FILTER==='listed')items=allItems.filter(i=>!i.dateSold&&!i.isReturned&&!i.resaleSalePrice);
  else if(MONTH_FILTER==='sold')items=allItems.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned);
  else if(MONTH_FILTER==='returned')items=allItems.filter(i=>i.isReturned);
  const allSelected=items.length>0&&items.every(i=>SELECTED_ITEMS.has(i.id));
  if(allSelected){items.forEach(i=>SELECTED_ITEMS.delete(i.id));}
  else{items.forEach(i=>SELECTED_ITEMS.add(i.id));}
  renderMonth();
}

async function bulkAction(action){
  if(action==='sold'){
    SELECTED_ITEMS.forEach(id=>{
      const item=(DB[SELECTED_MONTH]||[]).find(i=>i.id===id);
      if(item && !item.dateSold){
        item.dateSold=new Date().toISOString().split('T')[0];
        item.grossProfit=calcGrossProfit(item);
      }
    });
    saveDB();
    SELECTED_ITEMS.clear();SELECTION_MODE=false;
    toast(`Marked items as sold`);
    renderMonth();
  }else if(action==='delete'){
    const ok=await showConfirm('Delete '+SELECTED_ITEMS.size+' items?','This cannot be undone.',{icon:'🗑️',okLabel:'Delete all'});
    if(!ok)return;
    SELECTED_ITEMS.forEach(id=>{
      const idx=(DB[SELECTED_MONTH]||[]).findIndex(i=>i.id===id);
      if(idx>-1)DB[SELECTED_MONTH].splice(idx,1);
    });
    saveDB();
    SELECTED_ITEMS.clear();SELECTION_MODE=false;
    toast('Items deleted');
    renderMonth();
  }
}

// STOCK PAGE
function setStockSort(s){STOCK_SORT=s;renderStock();}
function setStockFilter(f){STOCK_FILTER=f;renderStock();}

function toggleStockSelection(){
  STOCK_SELECTION_MODE=!STOCK_SELECTION_MODE;
  if(!STOCK_SELECTION_MODE)STOCK_SELECTED.clear();
  renderStock();
}

function toggleStockSelect(id){
  if(STOCK_SELECTED.has(id)){STOCK_SELECTED.delete(id);}else{STOCK_SELECTED.add(id);}
  renderStock();
}

function selectAllStockVisible(){
  const today=new Date().toISOString().split('T')[0];
  let allListed=[];
  allDBKeys().forEach(k=>(DB[k]||[]).forEach(i=>{
    if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice)allListed.push({...i,month:k});
  }));
  let items=allListed;
  if(STOCK_FILTER==='stale')items=allListed.filter(i=>daysBetween(i.dateListed,today)>=30);
  selectAllStock(items);
}

function selectAllStock(items){
  const allSel=items.length>0&&items.every(i=>STOCK_SELECTED.has(i.id));
  if(allSel){items.forEach(i=>STOCK_SELECTED.delete(i.id));}
  else{items.forEach(i=>STOCK_SELECTED.add(i.id));}
  renderStock();
}

async function stockBulkAction(action,items){
  if(action==='sold'){
    const today=new Date().toISOString().split('T')[0];
    STOCK_SELECTED.forEach(id=>{
      let found=null;
      allDBKeys().forEach(k=>{const x=(DB[k]||[]).find(i=>i.id===id);if(x)found=x;});
      if(found&&!found.dateSold){found.dateSold=today;found.grossProfit=calcGrossProfit(found);}
    });
    saveDB();STOCK_SELECTED.clear();STOCK_SELECTION_MODE=false;toast('Marked as sold');renderStock();
  }else if(action==='delete'){
    const ok=await showConfirm('Delete '+STOCK_SELECTED.size+' items?','This cannot be undone.',{icon:'🗑️',okLabel:'Delete all'});
    if(!ok)return;
    STOCK_SELECTED.forEach(id=>{
      allDBKeys().forEach(k=>{
        const idx=(DB[k]||[]).findIndex(i=>i.id===id);
        if(idx>-1)DB[k].splice(idx,1);
      });
    });
    saveDB();STOCK_SELECTED.clear();STOCK_SELECTION_MODE=false;toast('Items deleted');renderStock();
  }
}

function renderStockRow(m,i){
  // Temporarily swap globals so renderItemRow uses stock selection state
  const _sm=SELECTION_MODE,_si=SELECTED_ITEMS;
  SELECTION_MODE=STOCK_SELECTION_MODE;SELECTED_ITEMS=STOCK_SELECTED;
  // Override toggleSelect click to use stock version
  const html=renderItemRow(m,i)
    .replace(/onchange="toggleSelect\(/g,'onchange="toggleStockSelect(')
    .replace(/onclick="toggleSelect\(/g,'onclick="toggleStockSelect(');
  SELECTION_MODE=_sm;SELECTED_ITEMS=_si;
  return html;
}

function renderStock(){
  const today=new Date().toISOString().split('T')[0];
  let allListed=[];
  allDBKeys().forEach(k=>(DB[k]||[]).forEach(i=>{
    if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice)allListed.push({...i,month:k});
  }));

  // Counts
  const cAll=allListed.length;
  const cStale=allListed.filter(i=>daysBetween(i.dateListed,today)>=30).length;

  // Apply filter
  let items=allListed;
  if(STOCK_FILTER==='stale')items=allListed.filter(i=>daysBetween(i.dateListed,today)>=30);

  // Apply sort
  items=[...items].sort((a,b)=>{
    if(STOCK_SORT==='profit')return(calcGrossProfit(b)||0)-(calcGrossProfit(a)||0);
    if(STOCK_SORT==='price')return(b.salePrice||0)-(a.salePrice||0);
    // default: days listed desc (oldest first — most urgent)
    return daysBetween(a.dateListed,today)<daysBetween(b.dateListed,today)?1:-1;
  });

  const totalValue=allListed.reduce((s,i)=>s+(i.salePrice||0),0);
  const potentialProfit=allListed.reduce((s,i)=>s+(calcGrossProfit(i)||0),0);
  const avgAsking=allListed.length?totalValue/allListed.length:0;

  const html=`
    <div class="page-header">
      <div>
        <div class="page-title">Active Stock</div>
      </div>

    </div>

    <div class="kgrid kgrid-3">
      <div class="kcard b">
        <div class="klabel">Stock Value</div>
        <div class="kval">${fmt(totalValue)}</div>
        <div class="ksub">At asking price</div>
      </div>
      <div class="kcard p">
        <div class="klabel">Est. Profit</div>
        <div class="kval">${fmt(potentialProfit)}</div>
        <div class="ksub">If all sell</div>
      </div>
      <div class="kcard">
        <div class="klabel">Avg Asking</div>
        <div class="kval">${fmt(avgAsking)}</div>
        <div class="ksub">Per item</div>
      </div>
    </div>

    ${cAll===0?`
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div class="empty-state-text">No active listings</div>
        <div class="empty-state-sub">Add items via + or import from Excel</div>
      </div>
    `:`


      <div class="filter-row">
        <select class="sort-select" onchange="setStockFilter(this.value)">
          <option value="all" ${STOCK_FILTER==='all'?'selected':''}>All (${cAll})</option>
          ${cStale>0?`<option value="stale" ${STOCK_FILTER==='stale'?'selected':''}>Stale 30d+ (${cStale})</option>`:''}
        </select>
        <select class="sort-select" onchange="setStockSort(this.value)">
          <option value="days" ${STOCK_SORT==='days'?'selected':''}>Oldest first</option>
          <option value="profit" ${STOCK_SORT==='profit'?'selected':''}>Est. profit</option>
          <option value="price" ${STOCK_SORT==='price'?'selected':''}>Price</option>
        </select>
      </div>

      <div class="list-toolbar">
        ${STOCK_SELECTION_MODE?`
          <button class="sel-check" onclick="${STOCK_SELECTED.size===items.length?'STOCK_SELECTED.clear();renderStock()':'selectAllStockVisible()'}">
            <span class="sel-check-box ${STOCK_SELECTED.size===items.length?'all':STOCK_SELECTED.size>0?'some':''}">
              ${STOCK_SELECTED.size===items.length?'\u2713':STOCK_SELECTED.size>0?'\u2212':''}
            </span>
            <span style="color:${STOCK_SELECTED.size>0?'var(--text)':'var(--text-secondary)'}">${STOCK_SELECTED.size>0?STOCK_SELECTED.size+' selected':'Select all'}</span>
          </button>
          ${STOCK_SELECTED.size>0?`
            <button class="btn btn-s" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px;color:var(--green)" onclick="stockBulkAction('sold')"><svg width="13" height="13" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="currentColor"/></svg> Mark Sold</button>
            <button class="btn btn-s danger" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px" onclick="stockBulkAction('delete')"><svg width="13" height="13" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.5 1h4M1 3.5h13M2.5 3.5l1 9a1 1 0 001 .9h6a1 1 0 001-.9l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 6.5v4M9 6.5v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> Delete</button>
          `:''}
          <button class="sel-exit" onclick="toggleStockSelection()">\u2715 Done</button>
        `:`
          <button class="select-toggle" onclick="toggleStockSelection()">Select</button>
        `}
      </div>

      <div class="item-table">
        ${items.map(i=>renderStockRow(i.month,i)).join('')}
      </div>
    `}
  `;
  document.getElementById('p-stock').innerHTML=html;
}

function exportDB(){
  // Build a clean export — strip user_id and internal flags so the backup
  // is portable and never contains account-specific identifiers
  const exportData = {};
  allDBKeys().forEach(k => {
    if(!(DB[k]||[]).length) return;
    exportData[k] = (DB[k]||[]).map(i => {
      const clean = Object.assign({}, i);
      delete clean.user_id;
      if(clean.parts) clean.parts = clean.parts.map(p => { const cp=Object.assign({},p); delete cp.user_id; return cp; });
      if(clean.returnHistory) clean.returnHistory = clean.returnHistory.map(r => { const cr=Object.assign({},r); delete cr.user_id; return cr; });
      return clean;
    });
  });
  if(DB.trips) exportData.trips = DB.trips.map(t => { const ct=Object.assign({},t); delete ct.user_id; return ct; });
  if(DB.expenses) exportData.expenses = DB.expenses.map(e => { const ce=Object.assign({},e); delete ce.user_id; return ce; });
  const json=JSON.stringify(exportData,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`general007_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Database exported');
}

    try{
      const imported=JSON.parse(ev.target.result);
      imported._userOwned=true;

      const TRACKED=['salePrice','costPrice','dateSold','shippingCost','postage','packagingCost','promoPercent','location','item'];

      // ── MERGE DIFF ─────────────────────────────────────────────────────────
      // New   = in file, not in DB            → always added, no prompt
      // Dupe  = in both (matched by id or name+date) → shown with Replace/Skip
      // Untouched = in DB only                → never deleted (merge mode)
      const newItems=[], dupeItems=[];

      allDBKeys().forEach(m=>{
        const inc=(imported[m]||[]).filter(i=>(i.item||'').trim().toUpperCase()!=='MONTH END');
        const cur=(DB[m]||[]).filter(i=>(i.item||'').trim().toUpperCase()!=='MONTH END');
        inc.forEach(a=>{
          const b=cur.find(c=>c.id===a.id||(c.item===a.item&&c.dateListed===a.dateListed));
          if(!b){
            newItems.push({m, item:a.item, dateListed:a.dateListed, data:a});
          } else if(TRACKED.some(f=>String(b[f]??'')!==String(a[f]??''))){
            dupeItems.push({m, item:a.item, dateListed:a.dateListed, incoming:a, existing:b, replace:false});
          }
          // identical match → no action needed
        });
      });

      // Store on window for confirm to access
      window._pendingImport = { imported, newItems, dupeItems };

      // ── BUILD REVIEW PANEL HTML ─────────────────────────────────────────────
      const isMob = window.innerWidth < 600;

      function newRows(){
        if(!newItems.length) return '';

              <button onclick="_importBulkDupe('skip')" style="padding:4px 10px;font-size:11px;font-weight:700;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer">Skip all</button>
            </div>
          </div>`;
        const rows = dupeItems.map((r,i)=>
