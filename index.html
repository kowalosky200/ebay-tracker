<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General-007 | eBay Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* LIGHT THEME (default) */
  --bg:#f8f9fa;
  --surface:#ffffff;
  --surface2:#f1f3f5;
  --border:#dee2e6;
  --border2:#ced4da;
  --accent:#f59e0b;
  --accent-hover:#d97706;
  --green:#10b981;
  --green-hover:#059669;
  --red:#ef4444;
  --red-hover:#dc2626;
  --blue:#3b82f6;
  --purple:#8b5cf6;
  --warn:#f59e0b;
  --text:#1f2937;
  --text-secondary:#6b7280;
  --muted:#9ca3af;
  --shadow:rgba(0,0,0,0.1);
  --shadow-md:rgba(0,0,0,0.15);
  --overlay:rgba(0,0,0,0.4);
}

[data-theme="dark"]{
  /* DARK THEME */
  --bg:#0f172a;
  --surface:#1e293b;
  --surface2:#334155;
  --border:#334155;
  --border2:#475569;
  --accent:#f59e0b;
  --accent-hover:#fbbf24;
  --green:#10b981;
  --green-hover:#34d399;
  --red:#ef4444;
  --red-hover:#f87171;
  --blue:#3b82f6;
  --purple:#8b5cf6;
  --warn:#f59e0b;
  --text:#f1f5f9;
  --text-secondary:#cbd5e1;
  --muted:#64748b;
  --shadow:rgba(0,0,0,0.3);
  --shadow-md:rgba(0,0,0,0.5);
  --overlay:rgba(0,0,0,0.6);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-size:14px;
  line-height:1.5;
  min-height:100vh;
  transition:background 0.2s, color 0.2s;
}

/* NAV - Improved sticky header */
nav{
  position:sticky;
  top:0;
  z-index:200;
  background:var(--surface);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 3px var(--shadow);
}
.nav-inner{
  max-width:1400px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:12px 20px;
  gap:16px;
}

/* Brand */
.brand{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  user-select:none;
  transition:opacity 0.15s;
}
.brand:hover{opacity:0.8;}
.brand-text{
  font-weight:700;
  font-size:18px;
  letter-spacing:-0.02em;
}
.brand-general{color:var(--text);}
.brand-007{color:var(--accent);}

/* Tabs - Improved mobile responsiveness */
.tabs{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
  justify-content:center;
}
.tab{
  padding:8px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:600;
  font-size:13px;
  background:transparent;
  color:var(--text-secondary);
  transition:all 0.15s;
  white-space:nowrap;
}
.tab:hover{
  color:var(--text);
  background:var(--surface2);
}
.tab.on{
  background:var(--accent);
  color:#000;
}

/* Nav right controls */
.nav-right{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:12px;
  flex-wrap:wrap;
}

/* Theme toggle button */
.theme-toggle{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:18px;
  transition:all 0.15s;
}
.theme-toggle:hover{
  border-color:var(--accent);
  background:var(--accent);
}

/* Search bar - Improved */
.search-wrap{
  position:relative;
  width:200px;
}
.search-wrap input{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 12px 8px 36px;
  color:var(--text);
  font-size:13px;
  width:100%;
  transition:all 0.15s;
}
.search-wrap input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(245,158,11,0.1);
}
.search-wrap input::placeholder{
  color:var(--muted);
}
.search-icon{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:14px;
  pointer-events:none;
}
.search-clear{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-size:16px;
  display:none;
  padding:4px;
  line-height:1;
}
.search-clear.show{display:block;}
.search-clear:hover{color:var(--text);}

.nav-year{
  font-size:11px;
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;
}

/* QUICK-ADD FAB - Improved positioning */
.fab{
  position:fixed;
  bottom:24px;
  right:24px;
  z-index:300;
  width:56px;
  height:56px;
  border-radius:50%;
  background:var(--accent);
  color:#000;
  border:none;
  cursor:pointer;
  font-size:28px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 20px var(--shadow-md);
  transition:all 0.2s;
}
.fab:hover{
  transform:scale(1.08);
  background:var(--accent-hover);
}

/* SLIDE-IN PANEL - Improved */
.panel-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:var(--overlay);
  z-index:400;
  backdrop-filter:blur(4px);
}
.panel-overlay.on{display:block;}
.slide-panel{
  position:fixed;
  top:0;
  right:-440px;
  width:440px;
  max-width:95vw;
  height:100vh;
  background:var(--surface);
  border-left:1px solid var(--border);
  z-index:401;
  transition:right 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow-y:auto;
  padding:24px;
  box-shadow:-4px 0 24px var(--shadow-md);
}
.slide-panel.on{right:0;}
.panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}
.panel-title{
  font-weight:700;
  font-size:20px;
  color:var(--accent);
}
.panel-close{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text-secondary);
  font-size:20px;
  cursor:pointer;
  padding:6px 12px;
  line-height:1;
  transition:all 0.15s;
}
.panel-close:hover{
  border-color:var(--accent);
  color:var(--accent);
}
.panel-section{
  font-size:11px;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:12px;
  font-weight:600;
}

/* PAGES */
.page{
  display:none;
  max-width:1400px;
  margin:0 auto;
  padding:24px 20px 120px;
}
.page.on{display:block;}

/* KPI CARDS - Improved grid and responsive */
.kgrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
  margin-bottom:32px;
}
.kcard{
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:12px;
  padding:20px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:all 0.2s;
  box-shadow:0 1px 3px var(--shadow);
}
.kcard:hover{
  border-color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 4px 12px var(--shadow-md);
}
.kcard.active-filter{
  border-color:var(--accent);
  background:var(--surface2);
}
.kcard.active-filter::before{
  content:'▾';
  position:absolute;
  bottom:8px;
  right:12px;
  font-size:16px;
  color:var(--accent);
}
.kcard::after{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:4px;
  background:var(--accent);
}
.kcard.g::after{background:var(--green);}
.kcard.r::after{background:var(--red);}
.kcard.b::after{background:var(--blue);}
.kcard.p::after{background:var(--purple);}

.klabel{
  font-size:11px;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:8px;
  font-weight:600;
}
.kval{
  font-size:32px;
  font-weight:700;
  line-height:1;
  letter-spacing:-0.02em;
}
.ksub{
  font-size:12px;
  color:var(--text-secondary);
  margin-top:6px;
}

/* INSIGHTS STRIP */
.insights{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
  margin-bottom:32px;
}
.insight-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  display:flex;
  align-items:center;
  gap:14px;
  box-shadow:0 1px 3px var(--shadow);
}
.insight-icon{
  font-size:24px;
  flex-shrink:0;
}
.insight-label{
  font-size:10px;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:4px;
  font-weight:600;
}
.insight-val{
  font-size:20px;
  font-weight:700;
  letter-spacing:-0.01em;
}
.insight-sub{
  font-size:12px;
  color:var(--text-secondary);
  margin-top:2px;
}

/* STALE ALERT */
.stale-alert{
  background:rgba(245,158,11,0.1);
  border:1px solid rgba(245,158,11,0.3);
  border-radius:12px;
  padding:16px;
  margin-bottom:24px;
  display:flex;
  align-items:center;
  gap:12px;
}
.stale-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--warn);
  flex-shrink:0;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:0.5;}
}
.stale-text{
  font-size:14px;
  color:var(--warn);
  font-weight:600;
}
.stale-items{
  font-size:13px;
  color:var(--text-secondary);
  margin-top:4px;
}

/* SECTION LABEL - Improved */
.sl{
  font-size:11px;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin:32px 0 16px;
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:600;
}
.sl::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

/* MONTH GRID */
.mgrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
  margin-bottom:32px;
}
.mcard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  cursor:pointer;
  transition:all 0.2s;
  box-shadow:0 1px 3px var(--shadow);
}
.mcard:hover{
  border-color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 4px 12px var(--shadow-md);
}
.mname{
  font-weight:600;
  font-size:14px;
  margin-bottom:8px;
  color:var(--text);
}
.mval{
  font-size:24px;
  font-weight:700;
  letter-spacing:-0.01em;
}
.mval.pos{color:var(--green);}
.mval.nil{color:var(--muted);}
.msub{
  font-size:11px;
  color:var(--text-secondary);
  margin-top:4px;
}

/* CHART - Improved */
.chart-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:32px;
  margin-bottom:32px;
  box-shadow:0 1px 3px var(--shadow);
}
.chart-title{
  font-size:13px;
  font-weight:600;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:40px;
  display:flex;
  align-items:center;
  gap:16px;
}
.chart-legend{
  display:flex;
  gap:16px;
  margin-left:auto;
}
.leg{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:var(--text-secondary);
}
.leg-dot{
  width:10px;
  height:10px;
  border-radius:3px;
}
.bars-wrap{
  display:flex;
  align-items:flex-end;
  gap:10px;
  height:220px;
  padding-bottom:36px;
  position:relative;
}
.bars-wrap::after{
  content:'';
  position:absolute;
  bottom:36px;
  left:0;
  right:0;
  height:1px;
  background:var(--border);
}
.bar-group{
  display:flex;
  flex-direction:column;
  align-items:center;
  flex:1;
  min-width:0;
}
.bar-pair{
  display:flex;
  align-items:flex-end;
  gap:3px;
  width:100%;
  height:184px;
}
.bar-rev{
  background:var(--blue);
  border-radius:4px 4px 0 0;
  width:55%;
  transition:opacity 0.15s;
  min-height:2px;
}
.bar-rev:hover{opacity:0.85;}
.bar-prof{
  background:var(--green);
  border-radius:4px 4px 0 0;
  width:45%;
  min-height:0;
}
.bar-label{
  font-size:10px;
  color:var(--muted);
  text-align:center;
  margin-top:6px;
  font-weight:500;
}
.bar-zero .bar-rev{opacity:0.2;}

/* ITEM TABLE - Completely redesigned for better mobile */
.item-table{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 1px 3px var(--shadow);
}
.item-row{
  border-bottom:1px solid var(--border);
  padding:16px 20px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:16px;
  transition:background 0.15s;
  cursor:pointer;
}
.item-row:hover{
  background:var(--surface2);
}
.item-row.selected{
  background:rgba(245,158,11,0.1);
  border-left:4px solid var(--accent);
}
.item-main{
  display:grid;
  gap:8px;
}
.item-header{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.item-name{
  font-weight:600;
  font-size:15px;
  color:var(--text);
}
.item-badge{
  font-size:10px;
  padding:3px 8px;
  border-radius:6px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.item-badge.listed{background:rgba(59,130,246,0.15);color:var(--blue);}
.item-badge.sold{background:rgba(16,185,129,0.15);color:var(--green);}
.item-badge.returned{background:rgba(239,68,68,0.15);color:var(--red);}
.item-meta{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  font-size:13px;
  color:var(--text-secondary);
}
.item-meta-item{
  display:flex;
  align-items:center;
  gap:6px;
}
.item-actions{
  display:flex;
  align-items:center;
  gap:8px;
}

/* FORM GROUPS - Improved */
.fg{
  margin-bottom:16px;
}
.fg label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--text-secondary);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.fg input,
.fg select,
.fg textarea{
  width:100%;
  padding:10px 12px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:14px;
  font-family:inherit;
  transition:all 0.15s;
}
.fg input:focus,
.fg select:focus,
.fg textarea:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(245,158,11,0.1);
}
.fg textarea{
  resize:vertical;
  min-height:80px;
}

/* BUTTONS - Completely redesigned */
.btn{
  padding:10px 18px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
  transition:all 0.15s;
  display:inline-flex;
  align-items:center;
  gap:6px;
  justify-content:center;
}
.btn-p{
  background:var(--accent);
  color:#000;
}
.btn-p:hover{
  background:var(--accent-hover);
  transform:translateY(-1px);
  box-shadow:0 4px 12px var(--shadow-md);
}
.btn-s{
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
}
.btn-s:hover{
  border-color:var(--accent);
  background:var(--accent);
  color:#000;
}
.btn-danger{
  background:var(--red);
  color:#fff;
}
.btn-danger:hover{
  background:var(--red-hover);
}
.btn-success{
  background:var(--green);
  color:#fff;
}
.btn-success:hover{
  background:var(--green-hover);
}

/* ACTION DROPDOWN - Improved for mobile */
.ddwrap{
  position:relative;
}
.ddbtn{
  padding:8px 12px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  color:var(--text);
  transition:all 0.15s;
  display:flex;
  align-items:center;
  gap:6px;
}
.ddbtn:hover{
  border-color:var(--accent);
  background:var(--accent);
  color:#000;
}
.ddmenu{
  display:none;
  position:absolute;
  top:calc(100% + 4px);
  right:0;
  min-width:180px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  box-shadow:0 4px 20px var(--shadow-md);
  z-index:100;
  overflow:hidden;
}
.ddwrap.open .ddmenu{
  display:block;
}
.ddmenu button{
  width:100%;
  padding:12px 16px;
  background:none;
  border:none;
  text-align:left;
  cursor:pointer;
  font-size:14px;
  color:var(--text);
  transition:background 0.15s;
  display:flex;
  align-items:center;
  gap:8px;
}
.ddmenu button:hover{
  background:var(--surface2);
}
.ddmenu button.danger{
  color:var(--red);
}
.ddmenu button.danger:hover{
  background:rgba(239,68,68,0.1);
}

/* TOAST - Improved */
#toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:14px 24px;
  border-radius:10px;
  font-size:14px;
  font-weight:500;
  z-index:500;
  opacity:0;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 4px 20px var(--shadow-md);
  max-width:90vw;
}
#toast.on{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
#toast.err{
  background:var(--red);
  color:#fff;
  border-color:var(--red-hover);
}

/* MOBILE OPTIMIZATIONS */
@media (max-width: 768px) {
  .nav-inner{
    grid-template-columns:1fr;
    gap:12px;
  }
  .brand{
    justify-content:center;
  }
  .tabs{
    order:2;
  }
  .nav-right{
    order:1;
    justify-content:center;
  }
  .search-wrap{
    width:100%;
    max-width:300px;
  }
  .kgrid{
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:12px;
  }
  .insights{
    grid-template-columns:1fr;
  }
  .chart-wrap{
    padding:20px 16px;
  }
  .chart-title{
    flex-direction:column;
    align-items:flex-start;
  }
  .chart-legend{
    margin-left:0;
  }
  .bars-wrap{
    gap:6px;
  }
  .item-row{
    padding:14px 16px;
    grid-template-columns:1fr;
  }
  .item-actions{
    justify-content:flex-end;
  }
  .fab{
    bottom:80px;
    right:20px;
    width:52px;
    height:52px;
  }
  .slide-panel{
    width:100%;
    right:-100%;
  }
}

/* RETURN SECTIONS */
.return-section{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px;
  margin-top:14px;
}
.return-title{
  font-weight:600;
  font-size:15px;
  margin-bottom:14px;
  color:var(--text);
}
.return-type-btns{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.rtype-btn{
  padding:10px 16px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  font-weight:500;
  color:var(--text);
  transition:all 0.15s;
}
.rtype-btn:hover{
  border-color:var(--accent);
}
.rtype-btn.on{
  background:var(--accent);
  color:#000;
  border-color:var(--accent);
}
.return-fields{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.return-log{
  background:var(--surface);

  padding:14px;
  margin-top:12px;
  font-size:13px;

}

  font-size:16px;
  font-weight:700;
}

/* INFO BOXES */
.info-box{
  background:rgba(59,130,246,0.1);
  border:1px solid rgba(59,130,246,0.3);
  border-radius:8px;
  padding:12px 14px;
  font-size:13px;
  color:var(--blue);
  margin-bottom:14px;
  line-height:1.6;
}
.info-box strong{
  font-weight:600;
}

/* EXPENSE ITEMS */
.expense-item{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px 14px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.expense-main{
  flex:1;
}
.expense-label{
  font-weight:600;
  font-size:14px;
  margin-bottom:4px;
}
.expense-meta{
  font-size:12px;
  color:var(--text-secondary);
}
.expense-amount{
  font-size:18px;
  font-weight:700;
  font-family:'JetBrains Mono',monospace;
}

/* Scroll improvements */
::-webkit-scrollbar{
  width:10px;
  height:10px;
}
::-webkit-scrollbar-track{
  background:var(--bg);
}
::-webkit-scrollbar-thumb{
  background:var(--border2);
  border-radius:5px;
}
::-webkit-scrollbar-thumb:hover{
  background:var(--muted);
}

.loading{

  align-items:center;
  justify-content:center;
  min-height:200px;
  color:var(--text-secondary);

  padding:60px 20px;
  color:var(--text-secondary);
}
.empty-state-icon{
  font-size:48px;
  margin-bottom:16px;
  opacity:0.5;
}
.empty-state-text{
  font-size:16px;

}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="brand" onclick="goToTab('summary')">
      <div class="brand-text">
        <span class="brand-general">GENERAL</span><span class="brand-007">-007</span>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="goToTab('summary')">Summary</button>
      <button class="tab" onclick="goToTab('monthly')">Monthly</button>
      <button class="tab" onclick="goToTab('stock')">Stock</button>
      <button class="tab" onclick="goToTab('expenses')">Expenses</button>
      <button class="tab" onclick="goToTab('data')">Data</button>
    </div>
    <div class="nav-right">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="global-search" placeholder="Search items..." oninput="handleSearch(this.value)">
        <button class="search-clear" onclick="clearSearch()">×</button>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <span id="theme-icon">🌙</span>
      </button>
      <div class="nav-year">2026</div>
    </div>
  </div>
</nav>

<!-- Quick Add FAB -->
<button class="fab" onclick="openQuickAdd()" title="Quick add item">+</button>

<!-- Slide-in Panel -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="slide-panel" id="slide-panel">
  <div class="panel-header">
    <div class="panel-title" id="panel-title">Quick Add</div>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>
  <div id="panel-content"></div>
</div>

<!-- PAGES -->
<div class="page on" id="p-summary"></div>
<div class="page" id="p-monthly"></div>
<div class="page" id="p-stock"></div>
<div class="page" id="p-expenses"></div>
<div class="page" id="p-data"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal for sold date -->
<div id="sold-modal" style="display:none;position:fixed;inset:0;background:var(--overlay);z-index:1000;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:300px;max-width:90vw;box-shadow:0 8px 32px var(--shadow-md)">
    <div style="font-weight:700;font-size:16px;margin-bottom:16px">Mark as Sold</div>
    <div class="fg" style="margin-bottom:16px">
      <label>Date Sold</label>
      <input type="date" id="modal-date" style="padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);width:100%;box-sizing:border-box">
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-success" onclick="confirmSold()" style="flex:1">Confirm</button>
      <button class="btn btn-s" onclick="closeModal()" style="flex:1">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────
const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const STORAGE_KEY='ebay_db_v3';
const THEME_KEY='ebay_theme';
let DB={};
let SELECTED_MONTH='MAR';
let SELECTED_ITEMS=new Set();
let MODAL_CALLBACK=null;

// ── THEME MANAGEMENT ─────────────────────────────────────────────────────
function initTheme(){
  const saved=localStorage.getItem(THEME_KEY)||'light';
  document.documentElement.setAttribute('data-theme',saved);
  updateThemeIcon(saved);
}
function toggleTheme(){
  const current=document.documentElement.getAttribute('data-theme')||'light';
  const next=current==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem(THEME_KEY,next);
  updateThemeIcon(next);
}
function updateThemeIcon(theme){
  document.getElementById('theme-icon').textContent=theme==='light'?'🌙':'☀️';
}

// ── DATABASE ─────────────────────────────────────────────────────────────
function initDB(){
  const raw=localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{DB=JSON.parse(raw);}catch(e){DB={};}
  }
  MONTHS.forEach(m=>{if(!DB[m])DB[m]=[];});
  if(!DB.trips)DB.trips=[];
  if(!DB.expenses)DB.expenses=[];
}
function saveDB(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(DB));
}

// ── NAVIGATION ───────────────────────────────────────────────────────────
function goToTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  event.target.classList.add('on');
  document.getElementById('p-'+name).classList.add('on');
  
  if(name==='summary')renderSummary();
  else if(name==='monthly')renderMonth();
  else if(name==='stock')renderStock();
  else if(name==='expenses')renderExpenses();
  else if(name==='data')renderData();
}

// ── SEARCH ───────────────────────────────────────────────────────────────
function handleSearch(q){
  const clear=document.querySelector('.search-clear');
  if(q.trim()){
    clear.classList.add('show');
  }else{
    clear.classList.remove('show');
  }
  // Search functionality to be implemented based on active page
}
function clearSearch(){
  document.getElementById('global-search').value='';
  document.querySelector('.search-clear').classList.remove('show');
}

// ── PANEL ────────────────────────────────────────────────────────────────
function openPanel(title,content){
  document.getElementById('panel-title').textContent=title;
  document.getElementById('panel-content').innerHTML=content;
  document.getElementById('panel-overlay').classList.add('on');
  document.getElementById('slide-panel').classList.add('on');
}
function closePanel(){
  document.getElementById('panel-overlay').classList.remove('on');
  document.getElementById('slide-panel').classList.remove('on');
}
function openQuickAdd(){
  const html=`
    <div class="panel-section">New item</div>
    ${formHTML()}
    <button class="btn btn-p" style="width:100%;margin-top:20px" onclick="submitQuickAdd()">Add Item</button>
  `;
  openPanel('Quick Add',html);
}
function submitQuickAdd(){
  const m=document.getElementById('qa-month').value;
  const item={
    id:'qa_'+Date.now(),
    gid:'G007-'+String(getNextGID()).padStart(4,'0'),
    dateListed:document.getElementById('qa-date').value||new Date().toISOString().split('T')[0],
    item:document.getElementById('qa-item').value||'Untitled',
    location:document.getElementById('qa-location').value||'',
    costPrice:parseFloat(document.getElementById('qa-cost').value)||0,
    salePrice:parseFloat(document.getElementById('qa-price').value)||0,
    postage:parseFloat(document.getElementById('qa-postage').value)||0,
    shippingCost:parseFloat(document.getElementById('qa-shipping').value)||0,
    packagingCost:parseFloat(document.getElementById('qa-packaging').value)||0,
    promoPercent:parseFloat(document.getElementById('qa-promo').value)||0,
    dateSold:null,
    grossProfit:null,
    isReturned:false
  };
  DB[m].push(item);
  saveDB();
  closePanel();
  toast('Item added to '+m);
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
}

function getNextGID(){
  let max=0;
  MONTHS.forEach(m=>(DB[m]||[]).forEach(i=>{
    const n=parseInt((i.gid||'').replace('G007-',''))||0;
    if(n>max)max=n;
  }));
  return max+1;
}

function formHTML(){
  return`
    <div class="fg">
      <label>Month</label>
      <select id="qa-month">
        ${MONTHS.map(m=>`<option value="${m}" ${m===SELECTED_MONTH?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>
    <div class="fg">
      <label>Date Listed</label>
      <input type="date" id="qa-date" value="${new Date().toISOString().split('T')[0]}">
    </div>
    <div class="fg">
      <label>Item Name</label>
      <input type="text" id="qa-item" placeholder="e.g. Vintage watch">
    </div>
    <div class="fg">
      <label>Location</label>
      <input type="text" id="qa-location" placeholder="e.g. Boot sale">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="fg">
        <label>Cost Price (£)</label>
        <input type="number" id="qa-cost" step="0.01" placeholder="0.00">
      </div>
      <div class="fg">
        <label>Sale Price (£)</label>
        <input type="number" id="qa-price" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="fg">
        <label>Postage (£)</label>
        <input type="number" id="qa-postage" step="0.01" placeholder="0.00">
      </div>
      <div class="fg">
        <label>Shipping Cost (£)</label>
        <input type="number" id="qa-shipping" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="fg">
        <label>Packaging (£)</label>
        <input type="number" id="qa-packaging" step="0.01" placeholder="0.00">
      </div>
      <div class="fg">
        <label>Promo %</label>
        <input type="number" id="qa-promo" step="0.1" placeholder="0">
      </div>
    </div>
  `;
}

// ── SUMMARY PAGE ─────────────────────────────────────────────────────────
function renderSummary(){
  const stats=calcYearlyStats();
  const html=`
    <div class="kgrid">
      <div class="kcard">
        <div class="klabel">Total Revenue</div>
        <div class="kval">${fmt(stats.totalRev)}</div>
        <div class="ksub">Gross income</div>
      </div>
      <div class="kcard g">
        <div class="klabel">Realised Profit</div>
        <div class="kval">${fmt(stats.realisedProfit)}</div>
        <div class="ksub">${stats.soldCount} items sold</div>
      </div>
      <div class="kcard p">
        <div class="klabel">Unrealised Profit</div>
        <div class="kval">${fmt(stats.unrealisedProfit)}</div>
        <div class="ksub">${stats.listedCount} items listed</div>
      </div>
      <div class="kcard b">
        <div class="klabel">Stock Value</div>
        <div class="kval">${fmt(stats.stockValue)}</div>
        <div class="ksub">Current inventory</div>
      </div>
      <div class="kcard">
        <div class="klabel">Avg ROI</div>
        <div class="kval">${stats.avgROI.toFixed(1)}%</div>
        <div class="ksub">Sold items</div>
      </div>
      <div class="kcard">
        <div class="klabel">Total Items</div>
        <div class="kval">${stats.totalItems}</div>
        <div class="ksub">${stats.listedCount} active</div>
      </div>
    </div>

    ${stats.stale.length>0?`
      <div class="stale-alert">
        <div class="stale-dot"></div>
        <div>
          <div class="stale-text">⚠️ ${stats.stale.length} items listed 60+ days</div>
          <div class="stale-items">Consider repricing or relisting</div>
        </div>
      </div>
    `:''}

    <div class="insights">
      <div class="insight-card">
        <div class="insight-icon">📊</div>
        <div>
          <div class="insight-label">Sell-through</div>
          <div class="insight-val">${stats.sellThrough.toFixed(1)}%</div>
          <div class="insight-sub">Of all listings</div>
        </div>
      </div>
      <div class="insight-card">
        <div class="insight-icon">⏱️</div>
        <div>
          <div class="insight-label">Avg Days to Sell</div>
          <div class="insight-val">${stats.avgDays}</div>
          <div class="insight-sub">Listed → Sold</div>
        </div>
      </div>
      <div class="insight-card">
        <div class="insight-icon">💰</div>
        <div>
          <div class="insight-label">Avg Sale Price</div>
          <div class="insight-val">${fmt(stats.avgSale)}</div>
          <div class="insight-sub">Per item</div>
        </div>
      </div>
      <div class="insight-card">
        <div class="insight-icon">📦</div>
        <div>
          <div class="insight-label">Avg Profit</div>
          <div class="insight-val">${fmt(stats.avgProfit)}</div>
          <div class="insight-sub">Per sold item</div>
        </div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">
        Monthly Performance
        <div class="chart-legend">
          <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div>Revenue</div>
          <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Profit</div>
        </div>
      </div>
      <div class="bars-wrap">
        ${MONTHS.map(m=>{
          const ms=calcMonthStats(m);
          const maxVal=Math.max(...MONTHS.map(x=>calcMonthStats(x).totalRev),1);
          const revH=(ms.totalRev/maxVal)*100;
          const profH=(ms.realisedProfit/maxVal)*100;
          return`
            <div class="bar-group ${ms.totalRev===0?'bar-zero':''}">
              <div class="bar-pair">
                <div class="bar-rev" style="height:${revH}%"></div>
                <div class="bar-prof" style="height:${profH}%"></div>
              </div>
              <div class="bar-label">${m}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="sl">Recent Activity</div>
    <div class="mgrid">
      ${MONTHS.map(m=>{
        const ms=calcMonthStats(m);
        return`
          <div class="mcard" onclick="goToMonth('${m}')">
            <div class="mname">${m} 2026</div>
            <div class="mval ${ms.realisedProfit>0?'pos':'nil'}">${fmt(ms.realisedProfit)}</div>
            <div class="msub">${ms.soldCount} sold / ${ms.listedCount} active</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  document.getElementById('p-summary').innerHTML=html;
}

function goToMonth(m){
  SELECTED_MONTH=m;
  goToTab('monthly');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tab')[1].classList.add('on');
}

// ── MONTHLY PAGE ─────────────────────────────────────────────────────────
function renderMonth(){
  const m=SELECTED_MONTH;
  const items=(DB[m]||[]);
  const stats=calcMonthStats(m);
  
  const html=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div>
        <h1 style="font-size:28px;font-weight:700;margin-bottom:6px">${m} 2026</h1>
        <div style="color:var(--text-secondary);font-size:14px">${items.length} total items</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select onchange="SELECTED_MONTH=this.value;renderMonth()" style="padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;cursor:pointer">
          ${MONTHS.map(mo=>`<option value="${mo}" ${mo===m?'selected':''}>${mo}</option>`).join('')}
        </select>
        <button class="btn btn-p" onclick="openQuickAdd()">+ Add Item</button>
      </div>
    </div>

    <div class="kgrid">
      <div class="kcard">
        <div class="klabel">Revenue</div>
        <div class="kval">${fmt(stats.totalRev)}</div>
        <div class="ksub">${stats.soldCount} sold</div>
      </div>
      <div class="kcard g">
        <div class="klabel">Profit</div>
        <div class="kval">${fmt(stats.realisedProfit)}</div>
        <div class="ksub">Realised</div>
      </div>
      <div class="kcard p">
        <div class="klabel">Potential</div>
        <div class="kval">${fmt(stats.unrealisedProfit)}</div>
        <div class="ksub">${stats.listedCount} listed</div>
      </div>
      <div class="kcard b">
        <div class="klabel">Stock</div>
        <div class="kval">${fmt(stats.stockValue)}</div>
        <div class="ksub">Investment</div>
      </div>
    </div>

    ${SELECTED_ITEMS.size>0?`
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
        <div style="font-weight:600">${SELECTED_ITEMS.size} items selected</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-s" onclick="bulkAction('sold')">Mark Sold</button>
          <button class="btn btn-s" onclick="bulkAction('delete')">Delete</button>
          <button class="btn btn-s" onclick="SELECTED_ITEMS.clear();renderMonth()">Clear</button>
        </div>
      </div>
    `:''}

    <div class="sl">Items</div>
    ${items.length===0?`
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div class="empty-state-text">No items for ${m} yet</div>
      </div>
    `:`
      <div class="item-table">
        ${items.map(i=>renderItemRow(m,i)).join('')}
      </div>
    `}
  `;
  document.getElementById('p-monthly').innerHTML=html;
}

function renderItemRow(m,i){
  const selected=SELECTED_ITEMS.has(i.id);
  const status=i.isReturned?'returned':i.dateSold?'sold':'listed';
  const daysListed=i.dateSold?daysBetween(i.dateListed,i.dateSold):daysBetween(i.dateListed,new Date().toISOString().split('T')[0]);
  
  return`
    <div class="item-row ${selected?'selected':''}" onclick="toggleSelect('${i.id}')">
      <div class="item-main">
        <div class="item-header">
          <div class="item-name">${esc(i.item)}</div>
          <div class="item-badge ${status}">${status}</div>
          ${i.gid?`<div style="font-size:12px;color:var(--muted);font-family:JetBrains Mono">${i.gid}</div>`:''}
        </div>
        <div class="item-meta">
          <div class="item-meta-item">📅 Listed ${i.dateListed}</div>
          ${i.dateSold?`<div class="item-meta-item">✅ Sold ${i.dateSold}</div>`:''}
          <div class="item-meta-item">⏱️ ${daysListed}d</div>
          ${i.location?`<div class="item-meta-item">📍 ${esc(i.location)}</div>`:''}
        </div>
        <div class="item-meta">
          <div class="item-meta-item">💰 ${fmt(i.salePrice)}</div>
          ${i.dateSold?`<div class="item-meta-item" style="color:var(--green);font-weight:600">+${fmt(calcGrossProfit(i))}</div>`:''}
        </div>
      </div>
      <div class="item-actions">
        <div class="ddwrap" id="dd-${i.id}">
          <button class="ddbtn" onclick="event.stopPropagation();toggleDD('dd-${i.id}')">⋮</button>
          <div class="ddmenu">
            <button onclick="event.stopPropagation();editItem('${m}','${i.id}')">✏️ Edit</button>
            ${!i.dateSold?`<button onclick="event.stopPropagation();markSold('${m}','${i.id}')">✅ Mark Sold</button>`:''}
            ${i.dateSold && !i.isReturned?`<button onclick="event.stopPropagation();openReturn('${m}','${i.id}')">↩️ Log Return</button>`:''}
            <button onclick="event.stopPropagation();duplicateItem('${m}','${i.id}')">📋 Duplicate</button>
            <button class="danger" onclick="event.stopPropagation();deleteItem('${m}','${i.id}')">🗑️ Delete</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function toggleSelect(id){
  if(SELECTED_ITEMS.has(id)){
    SELECTED_ITEMS.delete(id);
  }else{
    SELECTED_ITEMS.add(id);
  }
  renderMonth();
}

function bulkAction(action){
  if(action==='sold'){
    SELECTED_ITEMS.forEach(id=>{
      const item=(DB[SELECTED_MONTH]||[]).find(i=>i.id===id);
      if(item && !item.dateSold){
        item.dateSold=new Date().toISOString().split('T')[0];
        item.grossProfit=calcGrossProfit(item);
      }
    });
    saveDB();
    SELECTED_ITEMS.clear();
    toast(`Marked ${SELECTED_ITEMS.size} items as sold`);
    renderMonth();
  }else if(action==='delete'){
    if(!confirm(`Delete ${SELECTED_ITEMS.size} items?`))return;
    SELECTED_ITEMS.forEach(id=>{
      const idx=(DB[SELECTED_MONTH]||[]).findIndex(i=>i.id===id);
      if(idx>-1)DB[SELECTED_MONTH].splice(idx,1);
    });
    saveDB();
    SELECTED_ITEMS.clear();
    toast('Items deleted');
    renderMonth();
  }
}

function exportDB(){
  const json=JSON.stringify(DB,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`general007_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Database exported');
}

function importDB(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const imported=JSON.parse(e.target.result);
      if(confirm('This will replace all current data. Continue?')){
        DB=imported;
        saveDB();
        toast('Database imported');
        renderSummary();
      }
    }catch(err){
      toast('Import failed: Invalid file','err');
    }
  };
  reader.readAsText(file);
}

function clearAllData(){
  if(!confirm('PERMANENTLY delete all data? This cannot be undone!'))return;
  if(!confirm('Are you ABSOLUTELY sure?'))return;
  DB={};
  MONTHS.forEach(m=>DB[m]=[]);
  DB.trips=[];
  DB.expenses=[];
  saveDB();
  toast('All data cleared');
  renderSummary();
}

// ── STATS CALCULATIONS ───────────────────────────────────────────────────
function calcYearlyStats(){
  let totalRev=0,realisedProfit=0,unrealisedProfit=0,stockValue=0;
  let soldCount=0,listedCount=0,totalItems=0;
  let soldItems=[],stale=[];
  
  MONTHS.forEach(m=>{
    (DB[m]||[]).forEach(i=>{
      totalItems++;
      if(i.dateSold && !i.isReturned){
        soldCount++;
        const prof=calcGrossProfit(i);
        totalRev+=(i.totalRev||i.salePrice||0);
        realisedProfit+=prof;
        soldItems.push({...i,profit:prof});
      }else if(!i.isReturned){
        listedCount++;
        stockValue+=i.costPrice||0;
        unrealisedProfit+=calcGrossProfit(i)||0;
        const days=daysBetween(i.dateListed,new Date().toISOString().split('T')[0]);
        if(days>=60)stale.push(i);
      }
    });
  });
  
  const avgROI=soldItems.length?soldItems.reduce((s,i)=>s+calcROI(i),0)/soldItems.length:0;
  const avgSale=soldItems.length?soldItems.reduce((s,i)=>s+(i.salePrice||0),0)/soldItems.length:0;
  const avgProfit=soldItems.length?realisedProfit/soldItems.length:0;
  const sellThrough=totalItems?soldCount/totalItems*100:0;
  const avgDays=soldItems.length?Math.round(soldItems.reduce((s,i)=>s+daysBetween(i.dateListed,i.dateSold),0)/soldItems.length):0;
  
  return{totalRev,realisedProfit,unrealisedProfit,stockValue,soldCount,listedCount,totalItems,avgROI,avgSale,avgProfit,sellThrough,avgDays,stale};
}

function calcMonthStats(m){
  let totalRev=0,realisedProfit=0,unrealisedProfit=0,stockValue=0;
  let soldCount=0,listedCount=0;
  
  (DB[m]||[]).forEach(i=>{
    if(i.dateSold && !i.isReturned){
      soldCount++;
      totalRev+=(i.totalRev||i.salePrice||0);
      realisedProfit+=calcGrossProfit(i);
    }else if(!i.isReturned){
      listedCount++;
      stockValue+=i.costPrice||0;
      unrealisedProfit+=calcGrossProfit(i)||0;
    }
  });
  
  return{totalRev,realisedProfit,unrealisedProfit,stockValue,soldCount,listedCount};
}

function calcGrossProfit(i){
  const rev=i.salePrice+(i.postage||0);
  const bpf=calcBPF(i.salePrice,i.promoPercent||0);
  const promoCost=(i.salePrice||0)*(i.promoPercent||0)/100;
  const cost=(i.costPrice||0)+(i.shippingCost||0)+(i.packagingCost||0)+bpf+promoCost;
  return rev-cost;
}

function calcBPF(salePrice,promoPercent){
  let bpf=0;
  let sp=salePrice;
  for(let j=0;j<10;j++){
    const promo=sp*promoPercent/100;
    const gross=sp-promo;
    bpf=gross*0.129;
    if(bpf>0.01){
      const vat=bpf*0.2;
      bpf+=vat;
    }
    const newSp=salePrice-bpf;
    if(Math.abs(newSp-sp)<0.0001)break;
    sp=newSp;
  }
  return bpf;
}

function calcROI(i){
  const prof=calcGrossProfit(i);
  const cost=i.costPrice||0.01;
  return (prof/cost)*100;
}

function daysBetween(d1,d2){
  const a=new Date(d1);
  const b=new Date(d2);
  const diff=Math.abs(b-a);
  return Math.floor(diff/(1000*60*60*24));
}

function toggleDD(id){

});

function fmt(n){
  if(n===null||n===undefined)return'£0.00';
  return'£'+Number(n).toFixed(2);
}
function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className=type==='err'?'on err':'on';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('on','err'),3000);
}
