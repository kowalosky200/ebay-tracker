const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MN={JAN:'January',FEB:'February',MAR:'March',APR:'April',MAY:'May',JUN:'June',JUL:'July',AUG:'August',SEP:'September',OCT:'October',NOV:'November',DEC:'December'};
const £=n=>n!=null?'£'+parseFloat(n).toFixed(2):'—';
let DB,invFilter='all',_st=null;

function initDB(){
  try{const s=localStorage.getItem('g007v3');if(s){DB=JSON.parse(s);return;}}catch(e){}
  DB=JSON.parse(JSON.stringify(SEED));
  saveDB();
}
function saveDB(){try{localStorage.setItem('g007v3',JSON.stringify(DB));}catch(e){}}
function daysAgo(d){return Math.round((Date.now()-new Date(d))/86400000);}
function sold(m){return(DB[m]||[]).filter(i=>i.dateSold);}
function unsold(m){return(DB[m]||[]).filter(i=>!i.dateSold);}
function allSold(){return MONTHS.flatMap(m=>sold(m).map(i=>({...i,month:m})));}
function allUnsold(){return MONTHS.flatMap(m=>unsold(m).map(i=>({...i,month:m})));}
function mT(m){const s=sold(m);return{rev:s.reduce((a,i)=>a+(i.totalRev||0),0),cost:s.reduce((a,i)=>a+(i.totalCost||0),0),profit:s.reduce((a,i)=>a+(i.grossProfit||0),0),nSold:s.length,nTotal:(DB[m]||[]).length};}
function yT(){return MONTHS.reduce((a,m)=>{const t=mT(m);a.rev+=t.rev;a.cost+=t.cost;a.profit+=t.profit;a.nSold+=t.nSold;a.nTotal+=t.nTotal;return a;},{rev:0,cost:0,profit:0,nSold:0,nTotal:0});}
function recalc(i,ds){const pc=i.salePrice*(i.promoPercent||0);const tc=i.itemCost+i.shipping+i.ebayFee+pc;const tr=i.salePrice+(i.postage||0);i.promoCost=+pc.toFixed(4);i.totalCost=+tc.toFixed(4);i.totalRev=+tr.toFixed(4);i.grossProfit=ds?+(tr-tc).toFixed(2):null;i.roi=i.itemCost>0?+((tr-tc)/i.itemCost).toFixed(4):null;}

function goNav(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('p-'+page).classList.add('on');
  ['summary','monthly','stock','tax'].forEach((p,i)=>{if(p===page)document.querySelectorAll('.tab')[i].classList.add('on');});
  if(page==='summary')renderSummary();
  if(page==='monthly')renderMonthPage();
  if(page==='stock')renderStock();
  if(page==='tax')renderTax();
}

function kc(l,v,s,c){return`<div class="kcard ${c}"><div class="klabel">${l}</div><div class="kval">${v}</div><div class="ksub">${s}</div></div>`;}

function renderSummary(){
  const yt=yT(),u=allUnsold();
  const unreal=u.reduce((a,i)=>a+(i.totalRev-i.totalCost),0),sc=u.reduce((a,i)=>a+i.itemCost,0);
  const top=allSold().filter(i=>i.grossProfit>0).sort((a,b)=>b.grossProfit-a.grossProfit).slice(0,10);
  document.getElementById('p-summary').innerHTML=`
    <div class="page-title" style="color:var(--accent)">2026</div>
    <div class="page-sub">eBay Reselling — Annual Overview</div>
    <div class="kgrid">${kc('Total Revenue',£(yt.rev),yt.nSold+' items sold','')}${kc('Gross Profit',£(yt.profit),'Margin: '+(yt.rev>0?((yt.profit/yt.rev)*100).toFixed(1)+'%':'—'),'g')}${kc('Total Costs',£(yt.cost),'Fees + shipping + stock','r')}${kc('Stock on Hand',u.length+' items',£(sc)+' cost value','b')}${kc('Unrealised Profit',£(unreal),'If all listed items sell','p')}${kc('Items Listed',yt.nTotal,yt.nSold+' sold · '+(yt.nTotal-yt.nSold)+' active','')}</div>
    <div class="sl">Monthly breakdown</div>
    <div class="mgrid">${MONTHS.map(m=>{const t=mT(m);return`<div class="mcard" onclick="goMonth('${m}')"><div class="mname">${MN[m]}</div><div class="mval ${t.profit>0?'pos':'nil'}">${t.profit>0?£(t.profit):'—'}</div><div class="msub">${t.nSold} sold · ${t.nTotal-t.nSold} listed</div></div>`;}).join('')}</div>
    <div class="sl">Top performers</div>
    <div class="twrap"><table><thead><tr><th>Item</th><th>Month</th><th>Sale Price</th><th>Item Cost</th><th>Gross Profit</th><th>ROI</th></tr></thead>
    <tbody>${top.length?top.map(i=>`<tr><td>${esc(i.item)}</td><td class="dim">${MN[i.month]}</td><td>${£(i.salePrice)}</td><td class="dim">${£(i.itemCost)}</td><td class="pos">${£(i.grossProfit)}</td><td style="color:var(--accent)">${i.roi!=null?(i.roi*100).toFixed(0)+'%':'—'}</td></tr>`).join(''):'<tr><td colspan="6" class="empty">No sold items yet</td></tr>'}</tbody></table></div>`;
}

function goMonth(m){document.getElementById('msel').value=m;goNav('monthly');}

function renderMonthPage(){
  const el=document.getElementById('p-monthly');
  if(!el.querySelector('#msel')){el.innerHTML=`<div class="selrow"><button class="backbtn" onclick="goNav('summary')">← Back</button><select id="msel" onchange="renderMonth()">${MONTHS.map(m=>`<option value="${m}"${m==='MAR'?' selected':''}>${MN[m]}</option>`).join('')}</select></div><div id="mbody"></div>`;}
  renderMonth();
}

function renderMonth(){
  const m=document.getElementById('msel')?.value||'MAR';
  const items=DB[m]||[],t=mT(m),s=sold(m),u=unsold(m);
  const made=s.reduce((a,i)=>a+(i.grossProfit||0),0);
  const rem=u.reduce((a,i)=>{const p=i.totalRev-i.totalCost;return a+(p>0?p:0);},0);
  const tot=made+rem,pct=tot>0?((made/tot)*100).toFixed(1):0;
  document.getElementById('mbody').innerHTML=`
    <div class="mhdr"><div class="mtitle">${MN[m]}</div>
      <div class="mstats">
        <div class="mstat"><div class="msv pos">${£(t.profit)}</div><div class="msl">Realised Profit</div></div>
        <div class="mstat"><div class="msv" style="color:var(--accent)">${£(t.rev)}</div><div class="msl">Revenue</div></div>
        <div class="mstat"><div class="msv dim">${£(t.cost)}</div><div class="msl">Total Costs</div></div>
        <div class="mstat"><div class="msv">${t.nSold}/${t.nTotal}</div><div class="msl">Sold / Listed</div></div>
      </div>
    </div>
    ${tot>0?`<div class="pbar-wrap"><div class="pbar-labels"><span>Realised ${£(made)} (${pct}%)</span><span>Remaining ${£(rem)}</span></div><div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div></div>`:''}
    <div class="sl">Add new item</div>
    <div class="fsec"><div class="fgrid">
      <div class="fg"><label>Item name</label><input type="text" id="fi-name" placeholder="e.g. Nokia 3310"></div>
      <div class="fg"><label>Date listed</label><input type="date" id="fi-listed" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="fg"><label>Location</label><input type="text" id="fi-loc" placeholder="Bed, A101, Desk..."></div>
      <div class="fg"><label>Sale Price (£)</label><input type="number" id="fi-price" step="0.01" placeholder="0.00" oninput="autoCalc()"></div>
      <div class="fg"><label>Item Cost (£)</label><input type="number" id="fi-cost" step="0.01" placeholder="0.00"></div>
      <div class="fg"><label>Shipping Cost (£)</label><input type="number" id="fi-ship" step="0.01" placeholder="2.94"></div>
      <div class="fg"><label>eBay Fee (£)</label><input type="number" id="fi-ebay" step="0.01" placeholder="auto"></div>
      <div class="fg"><label>Postage charged (£)</label><input type="number" id="fi-post" step="0.01" placeholder="0.00"></div>
      <div class="fg"><label>Promo % (e.g. 0.05)</label><input type="number" id="fi-promo" step="0.01" placeholder="0.05"></div>
      <div class="fg"><label>Date Sold (optional)</label><input type="date" id="fi-sold"></div>
    </div>
    <div class="fbtns"><button class="btn btn-p" onclick="addItem('${m}')">+ Add Item</button><button class="btn btn-s" onclick="autoCalc()">Auto-calc eBay fee</button></div></div>
    <div class="sl">Items this month (${items.length})</div>
    <div class="twrap"><table><thead><tr><th>Status</th><th>Item</th><th>Location</th><th>Listed</th><th>Price</th><th>Cost</th><th>Ship</th><th>eBay Fee</th><th>Promo</th><th>Total Cost</th><th>Gross Profit</th><th>ROI</th><th>Actions</th></tr></thead>
    <tbody>${items.map(i=>iRow(i,m)).join('')||'<tr><td colspan="13" class="empty">No items yet</td></tr>'}</tbody></table></div>
    <div class="sfooter"><div class="sfgrid">${[['Revenue',£(t.rev),'var(--accent)'],['Total Cost',£(t.cost),'var(--red)'],['Gross Profit',£(t.profit),'var(--green)'],['Realised',£(made),'var(--green)'],['Remaining',£(rem),'var(--muted2)'],['Margin',t.rev>0?((t.profit/t.rev)*100).toFixed(1)+'%':'—','var(--text)']].map(([l,v,c])=>`<div><div class="sflabel">${l}</div><div class="sfval" style="color:${c}">${v}</div></div>`).join('')}</div></div>`;
}

function iRow(i,m){
  const s=!!i.dateSold;
  return`<tr><td><span class="badge ${s?'sold-b':'listed-b'}">${s?'Sold':'Listed'}</span></td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${esc(i.item)}</td><td class="dim">${esc(i.location||'—')}</td><td class="dim">${i.dateListed||'—'}</td><td>${£(i.salePrice)}</td><td class="dim">${£(i.itemCost)}</td><td class="dim">${£(i.shipping)}</td><td class="dim">${£(i.ebayFee)}</td><td class="dim">${£(i.promoCost)}</td><td style="color:var(--red)">${£(i.totalCost)}</td><td class="${i.grossProfit>0?'pos':i.grossProfit<0?'neg':''}">${i.grossProfit!=null?£(i.grossProfit):'—'}</td><td style="color:var(--accent)">${i.roi!=null?(i.roi*100).toFixed(0)+'%':'—'}</td><td style="display:flex;gap:4px">${!s?`<button class="tbtn" onclick="openSold('${m}','${i.id}')">Mark sold</button>`:''}<button class="tbtn del" onclick="delItem('${m}','${i.id}')">✕</button></td></tr>`;
}

function autoCalc(){const p=parseFloat(document.getElementById('fi-price')?.value)||0;if(p>0)document.getElementById('fi-ebay').value=(p*0.093).toFixed(2);}

function addItem(m){
  const name=document.getElementById('fi-name').value.trim();
  if(!name){toast('Enter an item name','err');return;}
  const price=parseFloat(document.getElementById('fi-price').value)||0;
  const cost=parseFloat(document.getElementById('fi-cost').value)||0;
  const ship=parseFloat(document.getElementById('fi-ship').value)||0;
  const ebay=parseFloat(document.getElementById('fi-ebay').value)||(price*0.093);
  const post=parseFloat(document.getElementById('fi-post').value)||0;
  const pp=parseFloat(document.getElementById('fi-promo').value)||0.05;
  const ds=document.getElementById('fi-sold').value||null;
  const item={id:Date.now().toString(),dateListed:document.getElementById('fi-listed').value,item:name,location:document.getElementById('fi-loc').value,dateSold:ds,salePrice:price,postage:post,itemCost:cost,shipping:ship,ebayFee:+ebay.toFixed(2),promoPercent:pp};
  recalc(item,ds);DB[m].push(item);saveDB();renderMonth();toast('Added: '+name);
}

function delItem(m,id){if(!confirm('Delete?'))return;DB[m]=DB[m].filter(i=>i.id!==id);saveDB();renderMonth();toast('Deleted');}

function openSold(m,id){_st={m,id};document.getElementById('modal-date').value=new Date().toISOString().split('T')[0];document.getElementById('modal-overlay').classList.add('on');}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay')){document.getElementById('modal-overlay').classList.remove('on');_st=null;}}
function confirmSold(){
  if(!_st)return;
  const ds=document.getElementById('modal-date').value;
  if(!ds){toast('Pick a date','err');return;}
  const item=DB[_st.m].find(i=>i.id===_st.id);
  if(item){item.dateSold=ds;recalc(item,ds);saveDB();}
  closeModal();
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-monthly')renderMonth();
  if(cur==='p-stock')renderStock();
  toast('Marked as sold!');
}

function setFilter(f,btn){invFilter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderStock();}

function renderStock(){
  const locs=[...new Set(MONTHS.flatMap(m=>(DB[m]||[]).filter(i=>!i.dateSold).map(i=>i.location).filter(Boolean)))].sort();
  let items=allUnsold();
  if(invFilter!=='all')items=items.filter(i=>i.location===invFilter);
  const cv=items.reduce((a,i)=>a+i.itemCost,0),pp=items.reduce((a,i)=>a+(i.totalRev-i.totalCost),0);
  document.getElementById('p-stock').innerHTML=`
    <div class="page-title">Current Stock</div><div class="page-sub">Listed but not yet sold</div>
    <div class="filters"><button class="fbtn ${invFilter==='all'?'on':''}" onclick="setFilter('all',this)">All</button>${locs.map(l=>`<button class="fbtn ${invFilter===l?'on':''}" onclick="setFilter('${esc(l)}',this)">${esc(l)}</button>`).join('')}</div>
    <div class="kgrid">${kc('Items in Stock',items.length,[...new Set(items.map(i=>i.location).filter(Boolean))].length+' locations','b')}${kc('Stock Cost Value',£(cv),'Capital tied up','')}${kc('Potential Profit',£(pp),'At current list prices','g')}</div>
    <div class="twrap"><table><thead><tr><th>Item</th><th>Month Listed</th><th>Location</th><th>Days Listed</th><th>List Price</th><th>Item Cost</th><th>Potential Profit</th><th>ROI</th><th></th></tr></thead>
    <tbody>${items.length?items.sort((a,b)=>daysAgo(a.dateListed)-daysAgo(b.dateListed)).reverse().map(i=>{
      const d=daysAgo(i.dateListed),p=i.totalRev-i.totalCost;
      return`<tr><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc(i.item)}</td><td class="dim">${MN[i.month]||i.month}</td><td><span class="badge listed-b">${esc(i.location||'—')}</span></td><td style="color:${d>30?'var(--red)':d>14?'var(--accent)':'var(--muted2)'}">${d}d</td><td>${£(i.salePrice)}</td><td class="dim">${£(i.itemCost)}</td><td class="${p>0?'pos':'neg'}">${£(p)}</td><td style="color:var(--accent)">${i.roi!=null?(i.roi*100).toFixed(0)+'%':'—'}</td><td><button class="tbtn" onclick="openSold('${i.month}','${i.id}')">Mark sold</button></td></tr>`;
    }).join(''):`<tr><td colspan="9" class="empty">No stock${invFilter!=='all'?' in '+invFilter:''}</td></tr>`}</tbody></table></div>`;
}

function renderTax(){
  const yt=yT(),u=allUnsold(),sc=u.reduce((a,i)=>a+i.itemCost,0);
  const net=yt.profit,tax=Math.max(0,net-12570);
  const it=tax<=37700?tax*0.2:37700*0.2+(tax-37700)*0.4,ni=Math.max(0,(net-12570)*0.09);
  const sr=(l,v,c)=>`<div class="sarow"><span>${l}</span><span style="color:${c};font-weight:700">${v}</span></div>`;
  document.getElementById('p-tax').innerHTML=`
    <div class="page-title">Self Assessment</div><div class="page-sub">Tax Year: 6 April 2025 – 5 April 2026 · Sole Trader</div>
    <div class="notice">⚠ Estimated figures only — not financial or tax advice. Always verify with HMRC or a qualified accountant before submitting.</div>
    <div class="sa-grid">
      <div class="sacard"><div class="sacard-title">Income & Expenses</div>${sr('Gross turnover',£(yt.rev),'var(--accent)')}${sr('Total expenses',£(yt.cost),'var(--red)')}${sr('Net profit',£(net),net>=0?'var(--green)':'var(--red)')}</div>
      <div class="sacard"><div class="sacard-title">Tax Estimate</div>${sr('Net profit',£(net),net>=0?'var(--green)':'var(--red)')}${sr('Personal allowance','£12,570','var(--muted2)')}${sr('Taxable income',£(tax),'var(--accent)')}${sr('Est. income tax',£(it),'var(--red)')}${sr('Est. Class 4 NI',£(ni),'var(--red)')}${sr('Est. total tax',£(it+ni),'var(--red)')}${sr('Est. take-home',£(net-it-ni),'var(--green)')}</div>
    </div>
    <div class="sacard"><div class="sacard-title">SA103 Export</div>
    <div class="sabox" id="sa-box">SA103 SELF-EMPLOYMENT
Tax Year: 6 April 2025 – 5 April 2026
Business: eBay Reselling — General-007
Description: Online resale of second-hand goods
Method: Cash basis

INCOME
Box 15  Turnover:             ${yt.rev.toFixed(2)}

EXPENSES
Box 16  Cost of goods:        ${yt.cost.toFixed(2)}
Box 30  Total expenses:       ${yt.cost.toFixed(2)}

PROFIT
Box 31  Net profit:           ${net.toFixed(2)}

STOCK (for records)
Unsold items:                 ${u.length}
Stock cost value:             ${sc.toFixed(2)}

TAX ESTIMATE
Taxable income:               ${tax.toFixed(2)}
Income tax:                   ${it.toFixed(2)}
Class 4 NI:                   ${ni.toFixed(2)}
Total estimated tax:          ${(it+ni).toFixed(2)}

Generated: ${new Date().toLocaleDateString('en-GB')}
Verify with HMRC / accountant before submitting.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-p" onclick="copySA()">Copy to clipboard</button><button class="btn btn-s" onclick="dlSA()">Download .txt</button></div></div>`;
}

function copySA(){navigator.clipboard.writeText(document.getElementById('sa-box').textContent).then(()=>toast('Copied!')).catch(()=>toast('Copy failed','err'));}
function dlSA(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([document.getElementById('sa-box').textContent],{type:'text/plain'}));a.download='SA103_General007_2026.txt';a.click();toast('Downloaded!');}
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className=type==='err'?'on err':'on';clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on','err'),2800);}

initDB();
renderSummary();
</script>
</body>
</html>
