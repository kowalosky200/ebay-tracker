  html+='</div>';

  // Buy price — always editable
  html+='<div class="ip-token" id="tok-costPrice-'+id+'" onpointerdown="tokenPointerDown(\''+m+'\',\''+id+'\',\'costPrice\')" onclick="openTokenEdit(\''+m+'\',\''+id+'\',\'costPrice\')">';
  html+='<div class="ip-token-label">Buy Price</div>';
  html+='<div class="ip-token-val">'+fmt(i.costPrice||0)+'</div>';
  html+='<div class="ip-token-sub">Tap to edit</div>';
  html+='</div>';

  // Promo %
  html+='<div class="ip-token" id="tok-promoPercent-'+id+'" onpointerdown="tokenPointerDown(\''+m+'\',\''+id+'\',\'promoPercent\')" onclick="openTokenEdit(\''+m+'\',\''+id+'\',\'promoPercent\')">';
  html+='<div class="ip-token-label">Promo %</div>';
  html+='<div class="ip-token-val">'+promoStr+'%</div>';
  html+='<div class="ip-token-sub">Tap to edit · Fee: '+fmt(promoCost)+'</div>';
  html+='</div>';

  // Net Profit + ROI — read only, auto calculated
  html+='<div class="ip-token locked '+profitClass+'">';
  html+='<div class="ip-token-label">'+(i.resaleSalePrice?'Lifetime Profit':'Net Profit')+'</div>';
  html+='<div class="ip-token-val">'+(profit!==null?fmt(profit):'—')+'</div>';
  html+='<div class="ip-token-sub">'+(roi!==null?roi.toFixed(1)+'% ROI · ':'')+(hasReturn?'after return':'after fees')+'</div>';
  html+='</div>';

  html+='</div>'; // ip-tokens

  // Postage row
  html+='<div class="ip-postage-row">';
  html+='<span class="ip-postage-label">Postage</span>';
  html+='<div class="ip-postage-mode">';
  html+='<button class="ip-postage-mode-btn'+(postageMode==='simple'?' active':'')+'" onclick="savePostageMode(\''+m+'\',\''+id+'\',\'simple\')">Simple Delivery</button>';
  html+='<button class="ip-postage-mode-btn'+(postageMode==='custom'?' active':'')+'" onclick="savePostageMode(\''+m+'\',\''+id+'\',\'custom\')">Custom</button>';
  html+='</div>';
  html+='<div class="ip-postage-divider"></div>';
  html+=postageRowInner;
  html+='</div>'; // ip-postage-row

  // Body sections
  html+='<div class="ip-body">';

  // P&L Receipt
  const pnlOpen=!i.resaleSalePrice;
  const pnlTitle=i.resaleSalePrice?'Sale 1 P&amp;L':'P&amp;L Receipt';
  html+=sec(pnlTitle,pb,pnlOpen,fmt(sale1Net),sale1Net>=0?'var(--green)':'var(--red)','ip-section-pnl');

  // Sale 2
  if(resaleHTML)html+=resaleHTML;

  // Relist projection
  if(relistHTML)html+=relistHTML;

  // Details — no item name field (title is editable inline at top)
  let db='<div class="ip-details-grid">';
  db+='<div class="ip-row"><div class="ip-label">Date Listed</div>'
    +'<input class="ip-field" type="date" value="'+(i.dateListed||'')+'" onchange="ipSave(\''+m+'\',\''+i.id+'\',\'dateListed\',this.value)"></div>';
  db+=i.dateSold
    ?'<div class="ip-row"><div class="ip-label">Date Sold</div><div class="ip-field-date">'+fmtDate(i.dateSold)+'</div></div>'
    :'<div class="ip-row"><div class="ip-label">Date Sold</div><div class="ip-field-date" style="color:var(--muted);font-style:italic">Not yet sold</div></div>';
  db+='<div class="ip-row"><div class="ip-label">Location</div>'
    +'<input class="ip-field" value="'+esc(i.location||'')+'" placeholder="e.g. A101" onchange="ipSave(\''+m+'\',\''+i.id+'\',\'location\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"></div>';
  db+='<div class="ip-row"><div class="ip-label">Source</div>'
    +'<select class="ip-field ip-field-select" onchange="ipSave(\''+m+'\',\''+i.id+'\',\'source\',this.value)"><option value="">—</option>'+srcOpts+'</select></div>';
  db+='<div class="ip-row"><div class="ip-label">Category</div>'
    +'<select class="ip-field ip-field-select" onchange="ipSave(\''+m+'\',\''+i.id+'\',\'category\',this.value)"><option value="">—</option>'+catOpts+'</select></div>';
  db+='<div class="ip-row" style="grid-column:1/-1"><div class="ip-label">Notes</div>'
    +'<input class="ip-field" value="'+esc(i.notes||'')+'" placeholder="Any notes..." onchange="ipSave(\''+m+'\',\''+i.id+'\',\'notes\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"></div>';
  db+='</div>';
  html+=sec('Details',db,true,null);

  // Parts & Expenses
  const hasParts=(i.parts||[]).length>0;
  html+=sec('Parts &amp; Expenses'+(hasParts?' ('+i.parts.length+')':''),partsHTML(m,id,'page'),false,null);

  // Timeline — always open
  html+=sec('Timeline',timelineHTML||'<div style="color:var(--muted);font-size:13px;padding:4px 0">No history yet</div>',true,null,null);

  html+='</div>'; // ip-body
  html+='</div>'; // ip-content
  html+='</div>'; // item-full-page
  page.innerHTML=html;
}


// SEARCH
const CATEGORY_ICONS={
  'Electronics & Tech':'💻','Cameras & Photography':'📷','Audio & Music':'🎵',
  'Books & Media':'📚','Toys & Games':'🎮','Home & Garden':'🏡',
  'Clothing & Fashion':'👗','Collectibles & Vintage':'🏺','Other':'📦'
};
let _searchIdx=-1;
let _searchResults=[];

function searchAllItems(q){
  const terms=q.toLowerCase().trim().split(/\s+/).filter(Boolean);
  if(!terms.length)return[];
  const results=[];
  MONTHS.forEach(m=>{
    (DB[m]||[]).forEach(i=>{
      const haystack=[
        (i.item||'').toLowerCase(),
        (i.category||'').toLowerCase(),
        (i.gid||'').toLowerCase(),
        (i.source||'').toLowerCase(),
        (i.notes||'').toLowerCase()
      ].join(' ');
      if(terms.every(t=>haystack.includes(t))){
        results.push({...i,month:m});
      }
    });
  });
  // Sort: active first, then sold, then returned
  const order={listed:0,sold:1,returned:2};
  results.sort((a,b)=>{
    const sa=a.isReturned?'returned':a.resaleSalePrice?'resold':a.dateSold?'sold':'listed';
    const sb=b.isReturned?'returned':b.resaleSalePrice?'resold':b.dateSold?'sold':'listed';
    return (order[sa]??1)-(order[sb]??1);
  });
  return results;
}

function highlightMatch(text,q){
  if(!text||!q.trim())return esc(text||'');
  const terms=q.trim().split(/\s+/).filter(Boolean);
  let result=esc(text);
  terms.forEach(t=>{
    const escaped=t.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&');
    const re=new RegExp('('+escaped+')','gi');
    result=result.replace(re,'<mark>$1</mark>');
  });
  return result;
}

function showSearchDropdown(q){
  const dd=document.getElementById('search-dropdown');
  if(!q.trim()){dd.classList.remove('open');dd.innerHTML='';return;}
  _searchResults=searchAllItems(q);
  _searchIdx=-1;
  const MAX=8;
  const shown=_searchResults.slice(0,MAX);
  const extra=_searchResults.length-MAX;
  if(!shown.length){
    dd.innerHTML=`<div class="search-empty">No items found for "<strong>${esc(q)}</strong>"</div>`;
    dd.classList.add('open');
    return;
  }
  const rows=shown.map((i,idx)=>{
    const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'active';
    const icon=CATEGORY_ICONS[i.category]||'📦';
    const price=i.salePrice?fmt(i.salePrice):'—';
    return`<div class="search-result" data-idx="${idx}" onclick="selectSearchResult(${idx})" onmouseenter="setSearchActive(${idx})">
      <div class="sr-icon">${icon}</div>
      <div class="sr-body">
        <div class="sr-name">${highlightMatch(i.item,q)}</div>
        <div class="sr-meta">
          ${i.category?`<span class="sr-cat">${esc(i.category)}</span>`:''}
          <span class="sr-month">${i.month}</span>
          <span class="sr-status ${status}">${status}</span>
        </div>
      </div>
      <div class="sr-price">${price}</div>
    </div>`;
  }).join('');
  const footer=extra>0?`<div class="search-footer" style="cursor:pointer" onclick="openSearchPage('${esc(q)}')">See all ${_searchResults.length} results for "${esc(q)}" →</div>`:'';
  dd.innerHTML=rows+footer;
  dd.classList.add('open');
}

function setSearchActive(idx){
  _searchIdx=idx;
  document.querySelectorAll('.search-result').forEach((el,i)=>{
    el.classList.toggle('active',i===idx);
  });
}

function selectSearchResult(idx){
  const item=_searchResults[idx];
  if(!item)return;
  closeSearchDropdown();
  document.getElementById('global-search').value='';
  document.querySelector('.search-clear').classList.remove('show');
  openItemPage(item.month,item.id);
}

function handleSearchKey(e){
  const dd=document.getElementById('search-dropdown');
  const open=dd.classList.contains('open');
  if(e.key==='Escape'){closeSearchDropdown();return;}
  if(!open)return;
  const count=Math.min(_searchResults.length,8);
  if(e.key==='ArrowDown'){e.preventDefault();setSearchActive(Math.min(_searchIdx+1,count-1));}
  else if(e.key==='ArrowUp'){e.preventDefault();setSearchActive(Math.max(_searchIdx-1,0));}
  else if(e.key==='Enter'){e.preventDefault();if(_searchIdx>=0){selectSearchResult(_searchIdx);}else{const q=document.getElementById('global-search').value.trim();if(q)openSearchPage(q);}}
}

function closeSearchDropdown(){
  const dd=document.getElementById('search-dropdown');
  dd.classList.remove('open');
  _searchIdx=-1;
}

function handleSearch(q){
  const clear=document.querySelector('.search-clear');
  if(q.trim()){clear.classList.add('show');showSearchDropdown(q);}
  else{clear.classList.remove('show');closeSearchDropdown();}
}
function clearSearch(){
  document.getElementById('global-search').value='';
  document.querySelector('.search-clear').classList.remove('show');
  closeSearchDropdown();
}

function openSearchPage(q){
  closeSearchDropdown();
  document.getElementById('global-search').value=q;
  document.querySelector('.search-clear').classList.add('show');
  // Switch to search page without using goToTab (no tab element to highlight)
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-search').classList.add('on');
  renderSearchResults(q);
}

function renderSearchResults(q){
  // q may be passed directly or read from the input
  if(q===undefined)q=document.getElementById('global-search').value.trim();
  const page=document.getElementById('p-search');
  if(!q){page.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">No search query</div>';return;}
  const results=searchAllItems(q);
  const total=results.length;
  const soldItems=results.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned);
  const totalProfit=soldItems.reduce((s,i)=>s+calcGrossProfit(i),0);

  const rows=results.map(i=>{
    const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'listed';
    const profit=(i.dateSold||i.resaleSalePrice)&&!i.isReturned?calcGrossProfit(i):null;
    const roi=calcROI(i);
    const icon=CATEGORY_ICONS[i.category]||'📦';
    return`<div class="item-row" onclick="openItemPage('${i.month}','${i.id}','p-search')">
      <div class="item-main">
        <div class="item-header">
          <div class="item-name">${icon} ${esc(i.item)}</div>
          <div class="item-badge ${status}">${status}</div>
          ${i.gid?`<div style="font-size:12px;color:var(--muted);font-family:monospace">${i.gid}</div>`:''}
        </div>
        <div class="item-meta">
          <div class="item-meta-item">📅 ${i.dateListed||'—'}</div>
          ${i.dateSold?`<div class="item-meta-item" style="color:var(--green)"><svg width="14" height="14" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="var(--green)" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="var(--green)"/></svg> ${i.dateSold}</div>`:''}
          <div class="item-meta-item">📆 ${i.month}</div>
          ${i.category?`<div class="item-meta-item">📁 ${esc(i.category)}</div>`:''}
        </div>
        <div class="item-meta">
          <div class="item-meta-item">🏷️ ${fmt(i.salePrice)}</div>
          ${profit!==null?`<div class="item-meta-item" style="color:var(--green);font-weight:600">Profit: ${fmt(profit)}</div>`:''}
          ${roi!==null?`<div class="item-meta-item" style="color:var(--muted);font-size:12px">ROI: ${roi.toFixed(1)}%</div>`:''}
        </div>
      </div>
      <div class="item-actions">
        <button class="btn btn-s" onclick="event.stopPropagation();closePanel();editItem('${i.month}','${i.id}')">✏️</button>
      </div>
    </div>`;
  }).join('');

  const noResults=`<div style="padding:60px 20px;text-align:center;color:var(--muted)">
    <div style="font-size:48px;margin-bottom:12px">🔍</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:6px">No results for "${esc(q)}"</div>
    <div style="font-size:14px">Try a different keyword or category</div>
  </div>`;

  page.innerHTML=`
    <div style="padding:20px 24px 0">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px">
        <button class="btn btn-s" onclick="exitSearchPage()" style="font-size:13px">← Back</button>
        <div style="font-size:20px;font-weight:700">Search Results</div>
      </div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:16px">
        <strong style="color:var(--text)">${total}</strong> item${total!==1?'s':''} matching <strong style="color:var(--accent)">"${esc(q)}"</strong>
        ${soldItems.length>0?` · <strong style="color:var(--green)">${soldItems.length} sold</strong> · Total profit: <strong style="color:var(--green)">${fmt(totalProfit)}</strong>`:''}
      </div>
    </div>
    <div style="border-top:1px solid var(--border)">
      ${total>0?rows:noResults}
    </div>`;
}

function exitSearchPage(){
  document.getElementById('global-search').value='';
  document.querySelector('.search-clear').classList.remove('show');
  closeSearchDropdown();
  // Return to summary
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-summary').classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const summaryTab=document.querySelector('[data-tab="summary"]');
  if(summaryTab)summaryTab.classList.add('on');
}

// Close dropdown when clicking outside
document.addEventListener('click',function(e){
  const wrap=document.querySelector('.search-wrap');
  if(wrap&&!wrap.contains(e.target))closeSearchDropdown();
});

// PANEL
let PANEL_STACK=[];
function updatePanelNav(){
  const backBtn=document.getElementById('panel-back-btn');
  if(!backBtn)return;
  if(PANEL_STACK.length>0){
    backBtn.disabled=false;
    backBtn.style.visibility='visible';
    backBtn.style.cursor='pointer';
  }else{
    backBtn.disabled=true;
    backBtn.style.visibility='hidden';
    backBtn.style.cursor='default';
  }
}
function openPanel(title,content,pushHistory){
  const panel=document.getElementById('slide-panel');
  if(pushHistory && document.getElementById('slide-panel').classList.contains('on')){
    PANEL_STACK.push({
      title:document.getElementById('panel-title').textContent,
      content:document.getElementById('panel-content').innerHTML,
      scrollTop:panel.scrollTop
    });
  }
  document.getElementById('panel-title').textContent=title;
  document.getElementById('panel-content').innerHTML=content;
  document.getElementById('panel-overlay').classList.add('on');
  panel.classList.remove('dragging');
  panel.style.transition='';
  panel.style.transform='';
  panel.classList.add('on');
  panel.scrollTop=0;
  document.body.style.overflow='hidden';
  updatePanelNav();
}
function closePanel(){
  const panel=document.getElementById('slide-panel');
  document.getElementById('panel-overlay').classList.remove('on');
  panel.classList.remove('dragging');
  panel.classList.remove('on');
  PANEL_STACK=[];
  document.body.style.overflow='';
  updatePanelNav();
}
function panelBack(){
  if(!PANEL_STACK.length){closePanel();return;}
  const prev=PANEL_STACK.pop();
  const panel=document.getElementById('slide-panel');
  document.getElementById('panel-title').textContent=prev.title;
  document.getElementById('panel-content').innerHTML=prev.content;
  panel.scrollTop=prev.scrollTop||0;
  updatePanelNav();
}
function initPanelSwipe(){
  const panel=document.getElementById('slide-panel');
  if(!panel||panel._swipeInit)return;
  panel._swipeInit=true;
  let startX=0,startY=0,curDx=0,tracking=false,active=false,lastX=0,lastT=0,vx=0;

  panel.addEventListener('touchstart',function(e){
    if(!panel.classList.contains('on'))return;
    const t=e.touches[0];if(!t)return;
    if(e.target.closest('input,textarea,select,button,a'))return;
    active=true;tracking=false;curDx=0;vx=0;
    startX=t.clientX;startY=t.clientY;lastX=t.clientX;lastT=Date.now();
  },{passive:true});

  panel.addEventListener('touchmove',function(e){
    if(!active)return;
    const t=e.touches[0];if(!t)return;
    const dx=t.clientX-startX;
    const dy=Math.abs(t.clientY-startY);
    if(!tracking){
      if(dx<8||dy>dx)return;
      tracking=true;
      panel.classList.add('dragging');
    }
    // Confirmed horizontal swipe — stop vertical scroll and panel content scroll
    e.preventDefault();
    const now=Date.now();
    const dt=now-lastT;
    if(dt>0)vx=(t.clientX-lastX)/dt;
    lastX=t.clientX;lastT=now;
    curDx=Math.max(0,dx);
    panel.style.transform='translateX('+curDx+'px)';
  },{passive:false});

  function endSwipe(){
    if(!active)return;
    active=false;
    panel.classList.remove('dragging');
    if(!tracking){curDx=0;vx=0;panel.style.transition='';panel.style.transform='';return;}
    tracking=false;
    const threshold=panel.offsetWidth*0.35;
    const isFlick=vx>0.5&&curDx>20;
    const dismiss=isFlick||(curDx>threshold);
    curDx=0;vx=0;
    if(dismiss){
      // Animate off screen, then close — disable right transition first so only transform runs
      panel.style.transition='transform 0.25s cubic-bezier(0.4,0,1,1)';
      panel.style.transform='translateX(100%)';
      setTimeout(function(){
        // Close silently: remove .on without triggering right transition
        panel.style.transition='none';
        closePanel();
        // Clean up on next frame after close
        requestAnimationFrame(function(){
          panel.style.transition='';
          panel.style.transform='';
        });
      },250);
    } else {
      // Spring back
      panel.style.transition='transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
      panel.style.transform='translateX(0px)';
      setTimeout(function(){
        panel.style.transition='';
        panel.style.transform='';
      },310);
    }
  }

  panel.addEventListener('touchend',endSwipe,{passive:true});
  panel.addEventListener('touchcancel',endSwipe,{passive:true});
}
initPanelSwipe();

function submitQuickAdd(){
  const m=document.getElementById('qa-month').value;
  const item={
    id:'qa_'+Date.now(),
    gid:'G007-'+String(getNextGID()).padStart(4,'0'),
    dateListed:document.getElementById('qa-date').value||new Date().toISOString().split('T')[0],
    item:document.getElementById('qa-item').value||'Untitled',
    source:document.getElementById('qa-source').value||'',
    category:document.getElementById('qa-category').value||'',
    location:document.getElementById('qa-location').value||'',
    costPrice:parseFloat(document.getElementById('qa-cost').value)||0,
    salePrice:parseFloat(document.getElementById('qa-price').value)||0,
    postage:parseFloat(document.getElementById('qa-postage').value)||0,
    shippingCost:parseFloat(document.getElementById('qa-shipping').value)||0,
    packagingCost:parseFloat(document.getElementById('qa-packaging').value)||0,
    promoPercent:(parseFloat(document.getElementById('qa-promo').value)||0)/100,
    dateSold:null,
    grossProfit:null,
    isReturned:false
  };
  item.category=item.category||autoCategory(item.item);
  if(!item.notes)item.notes='';if(!item.parts)item.parts=[];
  if(!item.returnHistory)item.returnHistory=[];
  if(item.isReturned===undefined)item.isReturned=false;
  DB[m].push(item);saveDB();closePanel();
  SELECTED_MONTH=m;MONTH_SORT='date-listed';MONTH_FILTER='all';
  SELECTION_MODE=false;SELECTED_ITEMS.clear();
  openItemPage(m,item.id,'p-monthly');
}

function getNextGID(){
  let max=0;
  MONTHS.forEach(m=>(DB[m]||[]).forEach(i=>{
    const n=parseInt((i.gid||'').replace('G007-',''))||0;
    if(n>max)max=n;
  }));
  return max+1;
}

function updateBPFPreview(){
  const price=parseFloat(document.getElementById('qa-price').value)||0;
  const preview=document.getElementById('bpf-preview');
  if(price<=0){preview.style.display='none';return;}
  const bpf=calcBuyerProtectionFee(price);
  const net=price-bpf;
  document.getElementById('bpf-listed').textContent=fmt(price);
  document.getElementById('bpf-fee').textContent=fmt(bpf);
  document.getElementById('bpf-total').textContent=fmt(net);
  preview.style.display='block';
  const cost=parseFloat(document.getElementById('qa-cost').value)||0;
  const shipping=parseFloat(document.getElementById('qa-shipping').value)||0;
  const buyerPostage=parseFloat(document.getElementById('qa-postage').value)||0;
  const packaging=parseFloat(document.getElementById('qa-packaging').value)||0;
  const promoRaw=parseFloat(document.getElementById('qa-promo').value)||0;
  const promoPercent=promoRaw/100;
  const promoCost=net*promoPercent*1.20;
  const rev=price+buyerPostage-bpf;
  const totalCost=cost+shipping+packaging+promoCost;
  const profit=+(rev-totalCost).toFixed(2);
  const profitEl=document.getElementById('profit-preview');
  const valEl=document.getElementById('profit-val');
  const roiEl=document.getElementById('profit-roi');
  if(cost>0||shipping>0||packaging>0||promoPercent>0){profitEl.style.display='block';valEl.textContent=fmt(profit);valEl.style.color=profit>=0?'var(--green)':'var(--red)';if(cost>0){const ti=cost+shipping+packaging+bpf+promoCost;const roi=ti>0?((profit/ti)*100).toFixed(1):null;roiEl.textContent=roi!==null?roi+'% ROI':'';}else{roiEl.textContent='';}}
  else{profitEl.style.display='none';}
}

function toggleSellThroughBar(card,byCat){
  const bd=card.querySelector('.st-breakdown');
  const chevron=card.querySelector('.st-chevron');
  if(bd.style.display==='none'){
    bd.style.display='block';
    if(chevron)chevron.style.transform='rotate(180deg)';
    const legend=`<div style="display:flex;gap:14px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;">
      <span style="display:flex;align-items:center;gap:4px;color:var(--green)"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block"></span>Fast ≤14d</span>
      <span style="display:flex;align-items:center;gap:4px;color:var(--warn)"><span style="width:7px;height:7px;border-radius:50%;background:var(--warn);display:inline-block"></span>Average 15–30d</span>
      <span style="display:flex;align-items:center;gap:4px;color:var(--red)"><span style="width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block"></span>Slow 30d+</span>
    </div>`;
    if(!byCat||!byCat.length){bd.innerHTML='<div style="font-size:12px;color:var(--muted)">No category data yet</div>'+legend;return;}
    const catRows=byCat.map(c=>{
      let speedLabel='',speedColor='var(--muted)';
      if(c.avgDays===null){speedLabel='no sales yet';speedColor='var(--muted)';}
      else if(c.avgDays<=14){speedLabel='fast';speedColor='var(--green)';}
      else if(c.avgDays<=30){speedLabel='average';speedColor='var(--warn)';}
      else{speedLabel='slow';speedColor='var(--red)';}
      const avgDaysStr=c.avgDays!==null?c.avgDays+'d avg':'—';
      const staleStr=c.stale>0?`<span style="font-size:10px;background:rgba(245,158,11,0.15);color:var(--warn);border-radius:4px;padding:1px 5px;margin-left:4px">${c.stale} stale</span>`:'';
      const pip=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${speedColor};flex-shrink:0"></span>`;
      return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;cursor:pointer;border-radius:6px;padding:5px 4px;transition:background 0.15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''" onclick="event.stopPropagation();showCategoryItems(${JSON.stringify(c.cat).replace(/"/g,'&quot;')})">
        <div style="width:130px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500" title="${esc(c.cat)}">${esc(c.cat)}</div>
        <div style="flex:1;display:flex;align-items:center;gap:6px">
          ${pip}
          <span style="color:${speedColor};font-weight:600">${avgDaysStr}</span>
          <span style="color:var(--muted)">${speedLabel}</span>
          ${staleStr}
        </div>
        <div style="color:var(--muted);font-size:11px;white-space:nowrap">${c.sold}/${c.total} sold ›</div>
      </div>`;
    }).join('');
    bd.innerHTML=catRows+legend;
  }else{
    bd.style.display='none';
    if(chevron)chevron.style.transform='rotate(0deg)';
  }
}

function showCategoryItems(cat){
  let items=[];
  MONTHS.forEach(m=>{(DB[m]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    if((i.category||'Other')===cat)items.push({...i,month:m});
  });});
  const sold=items.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned);
  const active=items.filter(i=>!i.dateSold&&!i.isReturned&&!i.resaleSalePrice);
  const totalProfit=sold.reduce((s,i)=>s+calcGrossProfit(i),0);
  const soldWithDate=sold.filter(i=>i.dateSold&&i.dateListed);

      const daysListed=!i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&i.dateListed?daysBetween(i.dateListed,_today):null;

function showFilteredItems(filter){
  let items=[];
  MONTHS.forEach(m=>{(DB[m]||[]).forEach(i=>{
    if((i.item||'').trim().toUpperCase()==='MONTH END')return;
    const sold=(i.dateSold||i.resaleSalePrice)&&!i.isReturned;
    if((filter==='revenue'||filter==='realised')&&sold){
      if(i.resaleSalePrice){
        const bpf=calcEbayBPF(i.salePrice);
        const grossInc=i.salePrice-bpf;
        const promoCost=grossInc*(i.promoPercent||0)*1.20;
        const rev=i.salePrice+(i.postage||0)-bpf;
        const returnCost=(i.returnHistory||[]).reduce(function(s,r){
          const fullReturn=(r.type==='full_seller'||r.type==='full_ebay');
          const netRefund=fullReturn?Math.max(0,(r.refundAmount||0)-bpf):(r.refundAmount||0);
          return s+netRefund+(r.returnPostage||0);
        },0);
        const partsCost=calcPartsCost(i);
        const cost=(i.costPrice||0)+(i.shippingCost||0)+(i.packagingCost||0)+promoCost+returnCost+partsCost;
        const sale1Profit=+(rev-cost).toFixed(2);
        const rBPF=calcEbayBPF(i.resaleSalePrice);
        const rGrossInc=i.resaleSalePrice-rBPF;
        const rPromoCost=rGrossInc*(i.resalePromoPercent||0)*1.20;
        const sale2Profit=+(i.resaleSalePrice-rBPF-(i.resaleShippingCost||0)-rPromoCost).toFixed(2);
        if(filter==='revenue'){
          // Revenue: two real cash transactions — show both
          items.push({...i,month:m,_entryType:'sale1',_displayPrice:i.salePrice,_displayDate:i.dateSold||(i.returnHistory&&i.returnHistory[0]?i.returnHistory[0].loggedAt:'')||'',_entryProfit:sale1Profit});
          items.push({...i,month:m,_entryType:'sale2',_displayPrice:i.resaleSalePrice,_displayDate:i.resaleDateSold||'',_entryProfit:sale2Profit});
        }else{
          // Realised P&L: one lifetime entry — the full story
          const lifetimeProfit=calcGrossProfit(i);
          const saleDate=i.resaleDateSold||(i.returnHistory&&i.returnHistory[0]?i.returnHistory[0].loggedAt:'')||'';
          items.push({...i,month:m,_entryType:'resold',_displayPrice:i.resaleSalePrice,_displayDate:saleDate,_entryProfit:lifetimeProfit});
        }
      } else {
        items.push({...i,month:m,_entryType:'normal',_displayPrice:i.salePrice,_displayDate:i.dateSold||'',_entryProfit:calcGrossProfit(i)});
      }
    } else if(filter==='unrealised'&&!sold&&!i.isReturned){
      items.push({...i,month:m});
    } else if(filter==='stock'&&!sold&&!i.isReturned){
      items.push({...i,month:m});
    }
  });});
  // Sort
  if(filter==='revenue'||filter==='realised')items.sort((a,b)=>(b._displayDate||'').localeCompare(a._displayDate||''));
  if(filter==='realised')items.sort((a,b)=>(b._entryProfit||0)-(a._entryProfit||0));
  const titles={revenue:'Total Revenue',realised:'Realised P&L',unrealised:'Unrealised Profit',stock:'Stock Value'};
  let summaryVal='',summaryLabel='',summaryColor='var(--accent)';
  const uniqueItemCount=new Set(items.map(i=>i.id)).size;
  const returnEntryCount=items.filter(i=>i._entryType==='sale1').length;
  const resoldEntryCount=items.filter(i=>i._entryType==='resold').length;
  if(filter==='revenue'){
    summaryVal=fmt(items.reduce((s,i)=>s+(i._displayPrice||0),0));
    summaryLabel=`${items.length} transactions · ${uniqueItemCount} items`;
    summaryColor='var(--accent)';
  } else if(filter==='realised'){
    const t=items.reduce((s,i)=>s+(i._entryProfit||0),0);
    summaryVal=fmt(t);
    const extras=[];
    if(resoldEntryCount>0)extras.push(`${resoldEntryCount} resold`);
    summaryLabel=`${items.length} items${extras.length?' · '+extras.join(' · '):''}`;
    summaryColor='var(--green)';
  } else if(filter==='unrealised'){
    summaryVal=fmt(items.reduce((s,i)=>s+(calcGrossProfit(i)||0),0));
    summaryLabel=`${items.length} active listings`;
    summaryColor='var(--purple)';
  } else if(filter==='stock'){
    summaryVal=fmt(items.reduce((s,i)=>s+(i.salePrice||0),0));
    summaryLabel=`${items.length} items listed`;
    summaryColor='var(--blue)';
  }
  function renderEntryRow(i){
    const entryLabel=esc(i.item);
    const badgeHTML=i._entryType==='sale1'
      ?`<div style="display:flex;gap:4px"><div class="item-badge" style="background:var(--warn);color:#000">sold & returned</div><div class="item-badge" style="background:var(--warn);color:#000;opacity:0.75">S1</div></div>`
      :i._entryType==='sale2'
      ?`<div style="display:flex;gap:4px"><div class="item-badge" style="background:var(--purple);color:#fff">resold</div><div class="item-badge" style="background:var(--purple);color:#fff;opacity:0.75">S2</div></div>`
      :i._entryType==='resold'
      ?`<div class="item-badge" style="background:var(--purple);color:#fff">↻ resold</div>`
      :`<div class="item-badge ${i.dateSold?'sold':'listed'}">${i.month}</div>`;
    let subRow='';
    if(filter==='revenue'){
      subRow=`<div style="font-size:12px;margin-top:4px;color:var(--muted)">${i._displayDate||'—'} · ${fmt(i._displayPrice)}</div>`;
    } else if(filter==='realised'){
      const profColor=(i._entryProfit||0)>=0?'var(--green)':'var(--red)';
      const roiStr=i._entryType==='resold'&&calcROI(i)!==null
        ?`<span style="color:var(--purple);font-weight:600;margin-left:6px">${calcROI(i).toFixed(1)}% ROI</span>`
        :i._entryType==='normal'&&calcROI(i)!==null
        ?`<span style="color:var(--muted);margin-left:6px">${calcROI(i).toFixed(1)}% ROI</span>`
        :'';
      const dateStr=i._displayDate?`<span style="color:var(--muted);margin-left:6px">${i._displayDate}</span>`:'';
      subRow=`<div style="font-size:12px;margin-top:4px;display:flex;align-items:center;flex-wrap:wrap;gap:2px"><span style="color:${profColor};font-weight:600">${fmt(i._entryProfit)}</span>${roiStr}${dateStr}</div>`;
    }
    const borderStyle=i._entryType==='sale2'?';border-left:3px solid var(--purple)':i._entryType==='sale1'?';border-left:3px solid var(--warn)':i._entryType==='resold'?';border-left:3px solid var(--purple)':'';
    return`<div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;cursor:pointer${borderStyle}" onclick="openItemDetail('${i.month}','${i.id}')">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;font-weight:600;font-size:14px">${entryLabel}</div>
        ${badgeHTML}
      </div>
      ${subRow}
    </div>`;
  }
  function renderStockRow(i){
    if(filter==='unrealised')return`<div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;cursor:pointer" onclick="openItemDetail('${i.month}','${i.id}')">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;font-weight:600;font-size:14px">${esc(i.item)}</div>
        <div class="item-badge listed">${i.month}</div>
      </div>
      <div style="font-size:12px;margin-top:4px;color:var(--muted)">Potential: <span style="color:var(--accent)">${fmt(calcGrossProfit(i))}</span></div>
    </div>`;
    return`<div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;cursor:pointer" onclick="openItemDetail('${i.month}','${i.id}')">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;font-weight:600;font-size:14px">${esc(i.item)}</div>
        <div class="item-badge listed">${i.month}</div>
      </div>
      <div style="font-size:12px;margin-top:4px;color:var(--muted)">Listed: ${fmt(i.salePrice)} · Cost: ${fmt(i.costPrice)}</div>
    </div>`;
  }
  const html=`
    <div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:10px;padding:14px">
      <div style="font-size:28px;font-weight:700;color:${summaryColor}">${summaryVal}</div>
      <div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${titles[filter]}</div><div style="font-size:13px;color:var(--text-secondary)">${summaryLabel}</div></div>
    </div>
    ${items.map(i=>(filter==='revenue'||filter==='realised')?renderEntryRow(i):renderStockRow(i)).join('')}`;
  openPanel(titles[filter]||'Items',html);
}

            <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(i.item)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${MONTH_NAMES[i.month]} · ${i.dateSold}${i.gid?' · '+i.gid:''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${profitCol}">${fmt(i.profit)}</div>
            ${roiStr}
          </div>
        </div>`;
      }).join('');
      return`<div class="sl">Top Flips</div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px 16px;box-shadow:0 1px 3px var(--shadow);">
          ${rows}
        </div>`;
    })()}
  `;
  document.getElementById('p-summary').innerHTML=html;
}
function goToMonth(m){
  SELECTED_MONTH=m;
  MONTH_FILTER='listed';
  MONTH_SORT='date-listed';
  SELECTED_ITEMS.clear();
  MONTHLY_VIEW='detail';
  const cur=document.querySelector('.page.on');
  // Record where we came from so back button knows where to go
  if(cur&&cur.id==='p-monthly'){
    _monthOrigin='grid';
  } else {
    _monthOrigin=(cur&&cur.id)||'p-summary';
  }
  if(cur&&cur.id==='p-monthly'){
    renderMonthlyPage();
  } else {
    goToTab('monthly',document.querySelector('[data-tab="monthly"]'));
  }
}

// MONTHLY PAGE
function renderMonthlyPage(){
  if(MONTHLY_VIEW==='grid')renderMonthlyGrid();
  else renderMonth();
}

function backToMonthlyGrid(){
  MONTHLY_VIEW='grid';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const mt=document.querySelector('[data-tab="monthly"]');
  if(mt)mt.classList.add('on');
  handleNavResize();
  window.scrollTo(0,0);
  renderMonthlyGrid();
}

function renderMonthlyGrid(){

  const curMonth=MONTHS[now.getMonth()];

    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">

        <span>YTD profit <strong style="color:var(--text);font-size:15px;">${fmt(ytdStats.realisedProfit)}</strong></span>
        <span>${ytdStats.soldCount} sold</span>

function toggleMonthPicker(){
  const el=document.getElementById('month-picker');
  if(el)el.classList.toggle('open');
}
function pickMonth(m){
  const el=document.getElementById('month-picker');
  if(el)el.classList.remove('open');
  SELECTED_MONTH=m;MONTH_FILTER='listed';SELECTION_MODE=false;SELECTED_ITEMS.clear();
  renderMonth();
}
// Close picker on outside click
document.addEventListener('click',function(e){
  const el=document.getElementById('month-picker');
  if(el&&!el.contains(e.target))el.classList.remove('open');
});

function setMonthFilter(f){
  MONTH_FILTER=f;
  if(f==='sold')MONTH_SORT='date-sold';
  else if(f==='listed'||f==='all')MONTH_SORT='date-listed';
  renderMonth();
}
function setMonthSort(s){MONTH_SORT=s;renderMonth();}

function renderMonth(){
  const m=SELECTED_MONTH;
  const allItems=(DB[m]||[]);
  const stats=calcMonthStats(m);

  // Counts for chips
  const cAll=allItems.length;
  const cListed=allItems.filter(i=>!i.dateSold&&!i.isReturned&&!i.resaleSalePrice).length;
  const cSold=allItems.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned).length;
  const cReturned=allItems.filter(i=>i.isReturned).length;

  // Apply filter
  let items=allItems;
  if(MONTH_FILTER==='listed')items=allItems.filter(i=>!i.dateSold&&!i.isReturned&&!i.resaleSalePrice);
  else if(MONTH_FILTER==='sold')items=allItems.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned);
  else if(MONTH_FILTER==='returned')items=allItems.filter(i=>i.isReturned);

  // Apply sort
  const today=new Date().toISOString().split('T')[0];
  items=[...items].sort((a,b)=>{
    if(MONTH_SORT==='profit'){
      const pa=calcGrossProfit(a)||0, pb=calcGrossProfit(b)||0;
      return pb-pa;
    }
    if(MONTH_SORT==='price')return (b.salePrice||0)-(a.salePrice||0);
    if(MONTH_SORT==='date-sold'){
      const da=a.dateSold||'0', db=b.dateSold||'0';
      return db<da?-1:db>da?1:0;
    }
    // default: date-listed desc
    const da=a.dateListed||'0', db=b.dateListed||'0';
    return db<da?-1:db>da?1:0;
  });

  const backLabel=_monthOrigin==='grid'?'← All months':_monthOrigin==='p-summary'?'← Summary':'← Back';
  const backAction=_monthOrigin==='grid'
    ?`backToMonthlyGrid()`
    :_monthOrigin==='p-summary'
      ?`goToTab('summary',document.querySelector('[data-tab="summary"]'))`
      :`goToTab('${(_monthOrigin||'p-summary').replace('p-','')}',document.querySelector('[data-tab="${(_monthOrigin||'p-summary').replace('p-','')}"]'))`;

  const html=`
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-s" style="padding:7px 14px;font-size:13px;" onclick="${backAction}">${backLabel}</button>
        <div class="month-picker-wrap" id="month-picker">
          <div class="month-picker-title" onclick="toggleMonthPicker()">
            ${MONTH_NAMES[m]} 2026
            <span class="month-picker-chevron">▾</span>
          </div>
          <div class="month-picker-dropdown">
            ${MONTHS.map(mo=>{
              const ms=calcMonthStats(mo);
              const hasSales=ms.soldCount>0||ms.listedCount>0;
              return`<div class="month-picker-option${mo===m?' active':''}" onclick="pickMonth('${mo}')">
                ${MONTH_NAMES[mo]} 2026
                ${hasSales?`<span class="month-picker-option-sub">${ms.soldCount} sold · ${ms.listedCount} listed</span>`:`<span class="month-picker-option-sub" style="opacity:0.4">empty</span>`}
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="kgrid" style="grid-template-columns:1fr 1fr;">
      <div class="kcard">
        <div class="klabel">Revenue</div>
        <div class="kval">${fmt(stats.totalRev)}</div>
        <div class="ksub">${stats.soldCount} item${stats.soldCount!==1?'s':''} sold</div>
      </div>
      <div class="kcard b">
        <div class="klabel">Potential Revenue</div>
        <div class="kval">${fmt(stats.stockValue)}</div>
        <div class="ksub">${stats.listedCount} still listed</div>
      </div>
      <div class="kcard g">
        <div class="klabel">Realised P&amp;L</div>
        <div class="kval">${fmt(stats.realisedProfit)}</div>
        <div class="ksub">${stats.soldCount>0?(stats.realisedProfit/stats.totalRev*100).toFixed(0)+'% margin':'—'}</div>
      </div>
      <div class="kcard p">
        <div class="klabel">Potential Profit</div>
        <div class="kval">${fmt(stats.unrealisedProfit)}</div>
        <div class="ksub">${stats.listedCount} still listed</div>
      </div>
    </div>



    <div class="filter-row">
      <div class="filter-chips">
        <span class="chip ${MONTH_FILTER==='all'?'active':''}" onclick="setMonthFilter('all')">All <span class="chip-count">${cAll}</span></span>
        <span class="chip ${MONTH_FILTER==='listed'?'active':''}" onclick="setMonthFilter('listed')">Listed <span class="chip-count">${cListed}</span></span>
        <span class="chip ${MONTH_FILTER==='sold'?'active':''}" onclick="setMonthFilter('sold')">Sold <span class="chip-count">${cSold}</span></span>
        ${cReturned>0?`<span class="chip ${MONTH_FILTER==='returned'?'active':''}" onclick="setMonthFilter('returned')">Returned <span class="chip-count">${cReturned}</span></span>`:''}
      </div>
      <select class="sort-select" onchange="setMonthSort(this.value)">
        <option value="date-listed" ${MONTH_SORT==='date-listed'?'selected':''}>Date listed</option>
        <option value="date-sold" ${MONTH_SORT==='date-sold'?'selected':''}>Date sold</option>
        <option value="profit" ${MONTH_SORT==='profit'?'selected':''}>Profit</option>
        <option value="price" ${MONTH_SORT==='price'?'selected':''}>Price</option>
      </select>
    </div>

    ${allItems.length===0?`
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div class="empty-state-text">No items for ${m} yet</div>
        <div class="empty-state-sub">Tap the + button to add your first item</div>
      </div>
    `:items.length===0?`
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-text">No ${MONTH_FILTER} items</div>
        <div class="empty-state-sub"><span style="color:var(--accent);cursor:pointer;font-weight:600" onclick="setMonthFilter('all')">Show all ${cAll}</span></div>
      </div>
    `:`
      <div class="list-toolbar">
        ${SELECTION_MODE?`
          <button class="sel-check" onclick="${SELECTED_ITEMS.size===items.length?'SELECTED_ITEMS.clear();renderMonth()':'selectAllMonth()'}">
            <span class="sel-check-box ${SELECTED_ITEMS.size===items.length?'all':SELECTED_ITEMS.size>0?'some':''}">
              ${SELECTED_ITEMS.size===items.length?'\u2713':SELECTED_ITEMS.size>0?'\u2212':''}
            </span>
            <span style="color:${SELECTED_ITEMS.size>0?'var(--text)':'var(--text-secondary)'}">${SELECTED_ITEMS.size>0?SELECTED_ITEMS.size+' selected':'Select all'}</span>
          </button>
          ${SELECTED_ITEMS.size>0?`
            <button class="btn btn-s" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px;color:var(--green)" onclick="bulkAction('sold')"><svg width="13" height="13" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="currentColor"/></svg> Mark Sold</button>
            <button class="btn btn-s danger" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px" onclick="bulkAction('delete')"><svg width="13" height="13" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.5 1h4M1 3.5h13M2.5 3.5l1 9a1 1 0 001 .9h6a1 1 0 001-.9l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 6.5v4M9 6.5v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> Delete</button>
          `:''}
          <button class="sel-exit" onclick="toggleSelectionMode()">\u2715 Done</button>
        `:`
          <button class="select-toggle" onclick="toggleSelectionMode()">Select</button>
        `}
      </div>
      <div class="item-table">
        ${items.map(i=>renderItemRow(m,i)).join('')}
      </div>
    `}
  `;
  document.getElementById('p-monthly').innerHTML=html;
}

function renderItemRow(m,i){
  const selected=SELECTED_ITEMS.has(i.id);
  const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'listed';
  const today=new Date().toISOString().split('T')[0];
  const daysListed=i.dateSold?daysBetween(i.dateListed,i.dateSold):daysBetween(i.dateListed,today);
  const profit=calcGrossProfit(i);
  const roi=calcROI(i);
  const isStale=!i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&daysListed>=30;

  // Status-aware meta — minimum useful info per status
  const metaParts=[];
  if(status==='listed'){
    if(i.dateListed)metaParts.push(i.dateListed);
    metaParts.push(daysListed+'d'+(isStale?' ⚠️':''));
  }else if(status==='sold'){
    if(i.dateSold)metaParts.push('sold '+i.dateSold);
    if(daysListed)metaParts.push(daysListed+'d to sell');
  }else if(status==='resold'){
    if(i.resaleDateSold)metaParts.push('resold '+i.resaleDateSold);
    else if(i.dateSold)metaParts.push('sold '+i.dateSold);
  }else if(status==='returned'){
    if(i.dateSold)metaParts.push('sold '+i.dateSold);
  }
  if(i.gid)metaParts.push(i.gid);

  const metaStr=metaParts.join(' · ');

  // Right column — price + profit/ROI
  let profitEl='';
  if((i.dateSold||i.resaleSalePrice)&&!i.isReturned){
    const cls=profit>=0?'pos':'neg';
    profitEl='<div class="item-row-profit '+cls+'">'+fmt(profit)+'</div>';
    if(roi!==null)profitEl+='<div class="item-row-roi">'+roi.toFixed(1)+'% ROI</div>';
  }else if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice&&profit!==null){
    profitEl='<div class="item-row-profit est">est. profit '+fmt(profit)+'</div>';
  }else if(i.isReturned){
    const cls=profit>=0?'pos':'neg';
    profitEl='<div class="item-row-profit '+cls+'">net '+fmt(profit)+'</div>';
  }

  // Left slot: checkbox in selection mode, status dot otherwise
  const leftSlot=SELECTION_MODE
    ?'<label class="item-checkbox-left" onclick="event.stopPropagation()"><input type="checkbox" '+(selected?'checked':'')+' onchange="toggleSelect(\''+i.id+'\')" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;margin-right:4px"></label>'
    :'<div class="status-dot '+status+'"></div>';

  // Row click
  const rowClick=SELECTION_MODE
    ?'onclick="toggleSelect(\''+i.id+'\')"'
    :'onclick="openItemPage(\''+m+'\',\''+i.id+'\')"';

  const actionsHTML='<div class="ddwrap" id="dd-'+i.id+'">'+
    '<button class="ddbtn" onclick="event.stopPropagation();toggleDD(\'dd-'+i.id+'\')" title="Actions">⋮</button>'+
    '<div class="ddmenu">'+
      '<button onclick="event.stopPropagation();openItemPage(\''+m+'\',\''+i.id+'\')">📄 Full page</button>'+
      '<button onclick="event.stopPropagation();editItem(\''+m+'\',\''+i.id+'\')">✏️ Edit</button>'+
      (!i.dateSold&&!i.resaleSalePrice?'<button onclick="event.stopPropagation();markSold(\''+m+'\',\''+i.id+'\')"><svg width="14" height="14" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="currentColor"/></svg> Mark Sold</button>':'')+
      ((i.dateSold||i.resaleSalePrice)&&!i.isReturned?'<button onclick="event.stopPropagation();openReturn(\''+m+'\',\''+i.id+'\')">↩️ Log Return</button>':'')+
      '<button onclick="event.stopPropagation();duplicateItem(\''+m+'\',\''+i.id+'\')">📋 Duplicate</button>'+
      '<button class="danger" onclick="event.stopPropagation();deleteItem(\''+m+'\',\''+i.id+'\')">🗑️ Delete</button>'+
    '</div></div>';

  return'<div class="item-row'+(selected?' selected':'')+' '+(isStale?' stale':'')+'" '+rowClick+'>'+
    '<div class="item-main">'+
      '<div class="item-row-inner">'+
        leftSlot+
        '<div class="item-row-body">'+
          '<div class="item-row-name">'+esc(i.item)+'</div>'+
          '<div class="item-row-meta">'+
            '<span class="item-badge '+status+'">'+status+'</span>'+
            (metaStr?'<span class="item-row-meta-sep">·</span><span>'+metaStr+'</span>':'')+
          '</div>'+
        '</div>'+
        '<div class="item-row-right">'+
          '<div class="item-row-price">'+fmt(i.salePrice)+'</div>'+
          profitEl+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="item-actions">'+actionsHTML+'</div>'+
  '</div>';
}


function openItemDetail(m,id,noHistory){
  const i=(DB[m]||[]).find(x=>x.id===id);
  if(!i)return;
  const bpf=calcEbayBPF(i.salePrice||0);
  const grossInc=(i.salePrice||0)-bpf;
  const promoCost=grossInc*(i.promoPercent||0)*1.20;
  const profit=calcGrossProfit(i);
  const roi=calcROI(i);
  const status=i.isReturned?'returned':i.resaleSalePrice?'resold':i.dateSold?'sold':i.condition==='spares'?'spares':'listed';
  const isSold=(i.dateSold||i.resaleSalePrice)&&!i.isReturned;
  const isUnsold=!i.dateSold&&!i.resaleSalePrice&&!i.isReturned;

    :isSold
    ?`<button class="btn btn-s" style="flex:1;justify-content:center;padding:12px" onclick="openReturn('${m}','${id}')">↩ Log Return</button>`
    :'';

  // Compact stat strip
  const statStrip=`
    <div style="display:grid;grid-template-columns:1fr 1fr${profit!==null?' 1fr':''};gap:1px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px">
      <div style="background:var(--surface2);padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:4px">Sale</div>
        <div style="font-size:18px;font-weight:700">${fmt(i.salePrice||0)}</div>
      </div>
      <div style="background:var(--surface2);padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:4px">Cost</div>
        <div style="font-size:18px;font-weight:700">${fmt(i.costPrice||0)}</div>
      </div>
      ${profit!==null?`<div style="background:var(--surface2);padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:4px">Profit</div>
        <div style="font-size:18px;font-weight:700;color:${profit>=0?'var(--green)':'var(--red)'}">${fmt(profit)}</div>
      </div>`:''}
    </div>`;

  // Quick edits — only the fields you realistically change on the fly
  const quickEdit=`
    <div style="margin-bottom:16px">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Quick Edit</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="fg" style="margin-bottom:0">
          <label style="margin-bottom:4px">Location</label>
          <input type="text" id="pd-location" value="${esc(i.location||'')}" placeholder="e.g. Bed, A101" onchange="savePanelQuickEdit('${m}','${id}',true)" onblur="savePanelQuickEdit('${m}','${id}',true)">
        </div>
        ${isUnsold?`<div class="fg" style="margin-bottom:0">
          <label style="margin-bottom:4px">Date listed</label>
          <input type="date" id="pd-date-listed" value="${i.dateListed||''}" onchange="savePanelQuickEdit('${m}','${id}',true)" onblur="savePanelQuickEdit('${m}','${id}',true)">
        </div>`:`<div class="fg" style="margin-bottom:0">
          <label style="margin-bottom:4px">${i.resaleSalePrice?'Resold':'Date sold'}</label>
          <div style="padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-secondary)">${i.resaleSalePrice?(i.resaleDateSold||'—'):(i.dateSold||'—')}</div>
        </div>`}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:right">Auto-saves on change</div>
    </div>`;

  `;

function toggleSelect(id){
  if(SELECTED_ITEMS.has(id)){SELECTED_ITEMS.delete(id);}else{SELECTED_ITEMS.add(id);}
  renderMonth();
}

function toggleSelectionMode(){
  SELECTION_MODE=!SELECTION_MODE;
  if(!SELECTION_MODE)SELECTED_ITEMS.clear();
  renderMonth();
}

function selectAllMonth(){
  // Select all items visible in current filter
  const allItems=(DB[SELECTED_MONTH]||[]);
  let items=allItems;
  if(MONTH_FILTER==='listed')items=allItems.filter(i=>!i.dateSold&&!i.isReturned&&!i.resaleSalePrice);
  else if(MONTH_FILTER==='sold')items=allItems.filter(i=>(i.dateSold||i.resaleSalePrice)&&!i.isReturned);
  else if(MONTH_FILTER==='returned')items=allItems.filter(i=>i.isReturned);
  const allSelected=items.length>0&&items.every(i=>SELECTED_ITEMS.has(i.id));
  if(allSelected){items.forEach(i=>SELECTED_ITEMS.delete(i.id));}
  else{items.forEach(i=>SELECTED_ITEMS.add(i.id));}
  renderMonth();
}

async function bulkAction(action){
  if(action==='sold'){
    SELECTED_ITEMS.forEach(id=>{
      const item=(DB[SELECTED_MONTH]||[]).find(i=>i.id===id);
      if(item && !item.dateSold){
        item.dateSold=new Date().toISOString().split('T')[0];
        item.grossProfit=calcGrossProfit(item);
      }
    });
    saveDB();
    SELECTED_ITEMS.clear();SELECTION_MODE=false;
    toast(`Marked items as sold`);
    renderMonth();
  }else if(action==='delete'){
    const ok=await showConfirm('Delete '+SELECTED_ITEMS.size+' items?','This cannot be undone.',{icon:'🗑️',okLabel:'Delete all'});
    if(!ok)return;
    SELECTED_ITEMS.forEach(id=>{
      const idx=(DB[SELECTED_MONTH]||[]).findIndex(i=>i.id===id);
      if(idx>-1)DB[SELECTED_MONTH].splice(idx,1);
    });
    saveDB();
    SELECTED_ITEMS.clear();SELECTION_MODE=false;
    toast('Items deleted');
    renderMonth();
  }
}

function toggleStockSelect(id){
  if(STOCK_SELECTED.has(id)){STOCK_SELECTED.delete(id);}else{STOCK_SELECTED.add(id);}

}

function selectAllStockVisible(){
  const today=new Date().toISOString().split('T')[0];
  let allListed=[];
  MONTHS.forEach(m=>(DB[m]||[]).forEach(i=>{

function selectAllStock(items){
  const allSel=items.length>0&&items.every(i=>STOCK_SELECTED.has(i.id));

  else{items.forEach(i=>STOCK_SELECTED.add(i.id));}

async function stockBulkAction(action,items){
  if(action==='sold'){
    const today=new Date().toISOString().split('T')[0];
    STOCK_SELECTED.forEach(id=>{
      let found=null;
      MONTHS.forEach(m=>{const x=(DB[m]||[]).find(i=>i.id===id);if(x)found=x;});
      if(found&&!found.dateSold){found.dateSold=today;found.grossProfit=calcGrossProfit(found);}
    });
    saveDB();STOCK_SELECTED.clear();STOCK_SELECTION_MODE=false;toast('Marked as sold');renderStock();
  }else if(action==='delete'){
    const ok=await showConfirm('Delete '+STOCK_SELECTED.size+' items?','This cannot be undone.',{icon:'🗑️',okLabel:'Delete all'});

    STOCK_SELECTED.forEach(id=>{
      MONTHS.forEach(m=>{
        const idx=(DB[m]||[]).findIndex(i=>i.id===id);
        if(idx>-1)DB[m].splice(idx,1);
      });
    });
    saveDB();STOCK_SELECTED.clear();STOCK_SELECTION_MODE=false;toast('Items deleted');renderStock();

}

function renderStockRow(m,i){
  // Temporarily swap globals so renderItemRow uses stock selection state
  const _sm=SELECTION_MODE,_si=SELECTED_ITEMS;

  const html=renderItemRow(m,i)

    .replace(/onclick="toggleSelect\(/g,'onclick="toggleStockSelect(');

  return html;

function renderStock(){
  const today=new Date().toISOString().split('T')[0];
  let allListed=[];
  MONTHS.forEach(m=>(DB[m]||[]).forEach(i=>{
    if(!i.dateSold&&!i.isReturned&&!i.resaleSalePrice)allListed.push({...i,month:m});
  }));

  // Counts
  const cAll=allListed.length;
  const cStale=allListed.filter(i=>daysBetween(i.dateListed,today)>=30).length;

  // Apply filter
  let items=allListed;
  if(STOCK_FILTER==='stale')items=allListed.filter(i=>daysBetween(i.dateListed,today)>=30);

  // Apply sort
  items=[...items].sort((a,b)=>{
    if(STOCK_SORT==='profit')return(calcGrossProfit(b)||0)-(calcGrossProfit(a)||0);
    if(STOCK_SORT==='price')return(b.salePrice||0)-(a.salePrice||0);
    // default: days listed desc (oldest first — most urgent)
    return daysBetween(a.dateListed,today)<daysBetween(b.dateListed,today)?1:-1;
  });

  const totalValue=allListed.reduce((s,i)=>s+(i.salePrice||0),0);
  const potentialProfit=allListed.reduce((s,i)=>s+(calcGrossProfit(i)||0),0);
  const avgAsking=allListed.length?totalValue/allListed.length:0;

  const html=`
    <div class="page-header">
      <div>
        <div class="page-title">Active Stock</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-p" onclick="openQuickAdd()">+ Add Item</button>
      </div>
    </div>

    <div class="kgrid kgrid-3" style="grid-template-columns:repeat(3,1fr);">
      <div class="kcard b">
        <div class="klabel">Stock Value</div>
        <div class="kval">${fmt(totalValue)}</div>
        <div class="ksub">At asking price</div>
      </div>
      <div class="kcard p">
        <div class="klabel">Est. Profit</div>
        <div class="kval">${fmt(potentialProfit)}</div>
        <div class="ksub">If all sell</div>
      </div>
      <div class="kcard">
        <div class="klabel">Avg Asking</div>
        <div class="kval">${fmt(avgAsking)}</div>
        <div class="ksub">Per item</div>
      </div>
    </div>

    ${cAll===0?`
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div class="empty-state-text">No active listings</div>
        <div class="empty-state-sub">Add items via + or import from Excel</div>
      </div>
    `:`


      <div class="filter-row">
        <div class="filter-chips">
          <span class="chip ${STOCK_FILTER==='all'?'active':''}" onclick="setStockFilter('all')">All <span class="chip-count">${cAll}</span></span>
          ${cStale>0?`<span class="chip ${STOCK_FILTER==='stale'?'active':''}" onclick="setStockFilter('stale')">Stale 30d+ <span class="chip-count">${cStale}</span></span>`:''}
        </div>
        <select class="sort-select" onchange="setStockSort(this.value)">
          <option value="days" ${STOCK_SORT==='days'?'selected':''}>Oldest first</option>
          <option value="profit" ${STOCK_SORT==='profit'?'selected':''}>Est. profit</option>
          <option value="price" ${STOCK_SORT==='price'?'selected':''}>Price</option>
        </select>
      </div>

      <div class="list-toolbar">
        ${STOCK_SELECTION_MODE?`
          <button class="sel-check" onclick="${STOCK_SELECTED.size===items.length?'STOCK_SELECTED.clear();renderStock()':'selectAllStockVisible()'}">
            <span class="sel-check-box ${STOCK_SELECTED.size===items.length?'all':STOCK_SELECTED.size>0?'some':''}">
              ${STOCK_SELECTED.size===items.length?'\u2713':STOCK_SELECTED.size>0?'\u2212':''}
            </span>
            <span style="color:${STOCK_SELECTED.size>0?'var(--text)':'var(--text-secondary)'}">${STOCK_SELECTED.size>0?STOCK_SELECTED.size+' selected':'Select all'}</span>
          </button>
          ${STOCK_SELECTED.size>0?`
            <button class="btn btn-s" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px;color:var(--green)" onclick="stockBulkAction('sold')"><svg width="13" height="13" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.5 1.5h4a1 1 0 011 1v4a.5.5 0 01-.15.35l-6 6a1 1 0 01-1.41 0l-4-4a1 1 0 010-1.41l6-6A.5.5 0 018.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="11" cy="4" r="0.8" fill="currentColor"/></svg> Mark Sold</button>
            <button class="btn btn-s danger" style="padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px" onclick="stockBulkAction('delete')"><svg width="13" height="13" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.5 1h4M1 3.5h13M2.5 3.5l1 9a1 1 0 001 .9h6a1 1 0 001-.9l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 6.5v4M9 6.5v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> Delete</button>
          `:''}
          <button class="sel-exit" onclick="toggleStockSelection()">\u2715 Done</button>
        `:`
          <button class="select-toggle" onclick="toggleStockSelection()">Select</button>
        `}
      </div>

      <div class="item-table">
        ${items.map(i=>renderStockRow(i.month,i)).join('')}
      </div>
    `}
  `;
  document.getElementById('p-stock').innerHTML=html;
}

function exportDB(){
  DB._userOwned=true;
  const json=JSON.stringify(DB,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`general007_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Database exported');
}

function importDB(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const imported=JSON.parse(ev.target.result);
      imported._userOwned=true; // stamp immediately so reload after confirm is safe

      // Diff: what would change
      let willAdd=0,willUpdate=0,willRemove=0;
      const addedItems=[],updatedItems=[],removedItems=[];
      const TRACKED=['salePrice','costPrice','dateSold','shippingCost','postage','packagingCost','promoPercent','location','item'];
      MONTHS.forEach(m=>{
        const inc=(imported[m]||[]).filter(i=>(i.item||'').trim().toUpperCase()!=='MONTH END');
        const cur=(DB[m]||[]).filter(i=>(i.item||'').trim().toUpperCase()!=='MONTH END');
        inc.forEach(a=>{
          const b=cur.find(c=>c.id===a.id||(c.item===a.item&&c.dateListed===a.dateListed));
          if(!b){willAdd++;addedItems.push({m,item:a.item,dateListed:a.dateListed});}
          else if(TRACKED.some(f=>String(b[f]??'')!==String(a[f]??''))){willUpdate++;updatedItems.push({m,item:a.item,dateListed:a.dateListed});}
        });
        cur.forEach(b=>{
          if(!inc.find(a=>a.id===b.id||(a.item===b.item&&a.dateListed===b.dateListed))){willRemove++;removedItems.push({m,item:b.item,dateListed:b.dateListed});}
        });
      });

      function diffRows(items,icon){
        if(!items.length)return'';
        const rows=items.slice(0,20).map(r=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${icon} ${esc(r.item)}</span><span style="color:var(--muted);flex-shrink:0;margin-left:8px">${r.m} · ${r.dateListed||'—'}</span></div>`).join('');
        return rows+(items.length>20?`<div style="font-size:11px;color:var(--muted);padding:5px 0">…and ${items.length-20} more</div>`:'');
      }

      // Store imported JSON on window for confirm button to access
      window._pendingImport=imported;

      const html=`
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
          <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--green)">${willAdd}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">New items</div>
          </div>
          <div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--blue)">${willUpdate}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Updated</div>
          </div>
          <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--red)">${willRemove}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Removed</div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px;padding:10px 12px;background:var(--surface2);border-radius:8px;line-height:1.6">
          This will <strong style="color:var(--text)">fully replace</strong> your current database. All returns, notes, and resale data from the imported file are preserved.
          ${willRemove>0?`<br><span style="color:var(--red)">⚠️ ${willRemove} item${willRemove!==1?'s':''} currently in your DB will be removed.</span>`:''}
        </div>
        ${addedItems.length?`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">New items (${addedItems.length})</div><div style="margin-bottom:14px">${diffRows(addedItems,'＋')}</div>`:''}
        ${updatedItems.length?`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Updated (${updatedItems.length})</div><div style="margin-bottom:14px">${diffRows(updatedItems,'↻')}</div>`:''}
        ${removedItems.length?`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Will be removed (${removedItems.length})</div><div style="margin-bottom:14px">${diffRows(removedItems,'−')}</div>`:''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;padding-top:12px;border-top:1px solid var(--border)">
          <button class="btn btn-s" onclick="closePanel()">Cancel</button>
          <button class="btn btn-p" onclick="_confirmJSONImport()">Confirm import</button>
        </div>`;
      openPanel('Review Import',html);
    }catch(err){
      toast('Import failed: Invalid JSON file','err');
    }
  };
  reader.readAsText(file);
}

function _confirmJSONImport(){
  const imported=window._pendingImport;
  if(!imported){toast('No pending import','err');return;}
  DB=imported;
  DB._userOwned=true;
  MONTHS.forEach(m=>(DB[m]||[]).forEach(i=>{i.category=autoCategory(i.item);}));
  saveDB();
  window._pendingImport=null;
  closePanel();
  toast('Database imported successfully');
  goToTab('summary',document.querySelector('[data-tab="summary"]'));
  renderSummary();
}

function importExcel(e){
  const file=e.target.files[0];
  if(!file)return;
  if(!window.XLSX){
    const script=document.createElement('script');
    script.src='https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
    script.onload=function(){processExcelFile(file);};
    script.onerror=function(){toast('Failed to load Excel library','err');};
    document.head.appendChild(script);
  }else{
    processExcelFile(file);
  }
}

function processExcelFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const workbook=XLSX.read(data,{type:'array',cellDates:true,raw:true});
      // Per-month results for summary
      const monthResults={};
      const addedItems=[],updatedItems=[],skippedItems=[];

      function safeFloat(val){
        if(val===null||val===undefined||val==='')return 0;
        if(typeof val==='number')return val;
        if(typeof val==='string'&&val.startsWith('#'))return 0;
        try{return parseFloat(String(val).replace(/[^0-9.-]/g,''))||0;}catch{return 0;}
      }
      function toDateStr(val){
        if(!val)return null;
        if(val instanceof Date){
          if(isNaN(val.getTime()))return null;
          const y=val.getFullYear(),m=String(val.getMonth()+1).padStart(2,'0'),d=String(val.getDate()).padStart(2,'0');
          return `${y}-${m}-${d}`;
        }
        if(typeof val==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(val))return val;
        const serial=parseFloat(val);
        if(!isNaN(serial)&&serial>40000){
          const d=new Date(Math.round((serial-25569)*86400*1000));
          return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
        }
        return null;
      }

      MONTHS.forEach(month=>{
        const sheetName=`${month}-26`;
        if(!workbook.SheetNames.includes(sheetName))return;
        const worksheet=workbook.Sheets[sheetName];
        const jsonData=XLSX.utils.sheet_to_json(worksheet,{header:1,raw:true,defval:''});
        const headerRow=jsonData[2]||[];
        const dataRows=jsonData.slice(3);
        const colMap={};
        headerRow.forEach((h,i)=>{if(h)colMap[String(h).trim()]=i;});
        if(!colMap['Item Name']&&!colMap['Date Listed'])return;

        monthResults[month]={added:0,updated:0,skipped:0};
        if(!DB[month])DB[month]=[];

        dataRows.forEach(row=>{
          if(!row||row.length===0)return;
          const itemName=String(row[colMap['Item Name']]||'').trim();
          const dateListedRaw=row[colMap['Date Listed']];
          if(!itemName||itemName.toUpperCase()==='MONTH END'||!dateListedRaw)return;
          const dateListed=toDateStr(dateListedRaw);
          if(!dateListed)return;

          const incoming={
            dateListed,item:itemName,
            location:String(row[colMap['Location']]||'').trim(),
            costPrice:safeFloat(row[colMap['Item Cost']]),
            salePrice:safeFloat(row[colMap['Sale Price']]),
            postage:safeFloat(row[colMap['Postage Fee']]),
            shippingCost:safeFloat(row[colMap['Shipping Cost']]),
            packagingCost:safeFloat(row[colMap['Packeging Cost']]),
            promoPercent:safeFloat(row[colMap['Promotion %']]),
            dateSold:toDateStr(row[colMap['Date Sold']])||null,
          };

          // Dedup: match on item name + dateListed (best available key from Excel)
          // Also guard against exact duplicates already seen this import session
          const existIdx=DB[month].findIndex(i=>
            i.item===itemName&&i.dateListed===dateListed
          );

          if(existIdx>=0){
            const ex=DB[month][existIdx];
            // Check if anything actually changed
            const FIELDS=['salePrice','costPrice','dateSold','shippingCost','postage','packagingCost','promoPercent','location'];
            const changed=FIELDS.some(f=>String(ex[f]??'')!==String(incoming[f]??''));
            if(!changed){
              monthResults[month].skipped++;
              skippedItems.push({m:month,item:itemName});
              return;
            }
            // Update financial/date fields only — never touch returns, notes, resale, parts
            ex.costPrice=incoming.costPrice;
            ex.salePrice=incoming.salePrice;
            ex.postage=incoming.postage;
            ex.shippingCost=incoming.shippingCost;
            ex.packagingCost=incoming.packagingCost;
            ex.promoPercent=incoming.promoPercent;
            ex.dateSold=incoming.dateSold;
            if(incoming.location)ex.location=incoming.location;
            ex.category=autoCategory(ex.item);
            monthResults[month].updated++;
            updatedItems.push({m:month,item:itemName,dateListed});
          }else{
            // Truly new item — assign ID and GID
            DB[month].push({
              id:'xl_'+Date.now()+'_'+Math.random().toString(36).substr(2,6),
              gid:'G007-'+String(getNextGID()).padStart(4,'0'),
              source:'',category:autoCategory(itemName),notes:'',parts:[],
              returnData:null,returnHistory:[],isReturned:false,
              ...incoming
            });
            monthResults[month].added++;
            addedItems.push({m:month,item:itemName,dateListed});
          }
        });
      });

      DB._userOwned=true;
      saveDB();

      // Build summary panel
      const totalAdded=addedItems.length,totalUpdated=updatedItems.length,totalSkipped=skippedItems.length;
      function rows(items,icon){
        if(!items.length)return'<div style="font-size:12px;color:var(--muted);padding:6px 0">None</div>';
        return items.slice(0,25).map(r=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${icon} ${esc(r.item)}</span><span style="color:var(--muted);flex-shrink:0;margin-left:8px">${r.m}</span></div>`).join('')+(items.length>25?`<div style="font-size:11px;color:var(--muted);padding:5px 0">…and ${items.length-25} more</div>`:'');
      }
      const monthSummaryRows=Object.entries(monthResults).filter(([,v])=>v.added||v.updated||v.skipped).map(([m,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="font-weight:600">${m}</span><span style="color:var(--muted)">${v.added} new · ${v.updated} updated · ${v.skipped} unchanged</span></div>`).join('');

      const html=`
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
          <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--green)">${totalAdded}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">New items</div>
          </div>
          <div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--blue)">${totalUpdated}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Updated</div>
          </div>
          <div style="background:rgba(100,116,139,0.1);border:1px solid rgba(100,116,139,0.3);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:var(--muted)">${totalSkipped}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">Unchanged</div>
          </div>
        </div>
        ${monthSummaryRows?`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">By month</div><div style="margin-bottom:16px">${monthSummaryRows}</div>`:''}
        ${totalAdded?`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">New items (${totalAdded})</div><div style="margin-bottom:14px">${rows(addedItems,'＋')}</div>`:''}
        ${totalUpdated?`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Updated (${totalUpdated})</div><div style="margin-bottom:14px">${rows(updatedItems,'↻')}</div>`:''}
        <div style="font-size:11px;color:var(--muted);padding:10px 12px;background:var(--surface2);border-radius:8px;line-height:1.6;margin-bottom:12px">
          Returns, notes, resale data and parts were not affected. Excel import never removes existing items.
        </div>
        <button class="btn btn-p" style="width:100%" onclick="closePanel();goToTab('summary',document.querySelector('[data-tab=\\'summary\\']'));renderSummary()">Done — view summary</button>`;

      openPanel('Import Complete',html);
    }catch(err){
      console.error('Import error:',err);
      toast('Import failed: '+err.message,'err');
    }
  };
  reader.readAsArrayBuffer(file);
}

async function clearAllData(){
  const ok=await showConfirm('Clear all data?','This will permanently delete every item and expense. There is no undo.',{icon:'💥',okLabel:'Yes, clear everything'});
  if(!ok)return;
  DB={};
  MONTHS.forEach(m=>DB[m]=[]);
  DB.trips=[];
  DB.expenses=[];
  saveDB();
  toast('All data cleared');
  renderSummary();
}

function saveEdit(m,id){

  item.source=document.getElementById('edit-source').value;
  item.category=document.getElementById('edit-category').value;
  item.location=document.getElementById('edit-location').value;

  item.salePrice=parseFloat(document.getElementById('edit-price').value)||0;
  item.postage=parseFloat(document.getElementById('edit-postage').value)||0;
  item.shippingCost=parseFloat(document.getElementById('edit-shipping').value)||0;
  item.packagingCost=parseFloat(document.getElementById('edit-packaging').value)||0;

  if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else if(cur==='p-item')renderItemPage(m,id);

}

function savePanelQuickEdit(m,id,silent){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  // Only read fields that are currently in the DOM (panel may have changed)
  const fListed=document.getElementById('pd-date-listed');
  const fLocation=document.getElementById('pd-location');
  const fSource=document.getElementById('pd-source');
  const fCat=document.getElementById('pd-category');
  const fCost=document.getElementById('pd-cost');
  const fPrice=document.getElementById('pd-price');
  // Guard: if location field isn't present, the panel has been replaced - abort
  if(!fLocation)return;
  if(fListed)item.dateListed=fListed.value||new Date().toISOString().split('T')[0];
  if(fLocation)item.location=fLocation.value.trim();
  if(fSource&&fSource.value)item.source=fSource.value;
  if(fCat&&fCat.value)item.category=fCat.value;
  // Only overwrite numeric fields if the value is a valid non-empty number
  if(fCost&&fCost.value!==''){const v=parseFloat(fCost.value);if(!isNaN(v))item.costPrice=v;}
  if(fPrice&&fPrice.value!==''){const v=parseFloat(fPrice.value);if(!isNaN(v))item.salePrice=v;}
  if(item.dateSold)item.grossProfit=calcGrossProfit(item);
  saveDB();
  if(!silent)toast('Quick edits saved');
  const cur=document.querySelector('.page.on').id;
  if(cur==='p-summary')renderSummary();
  else if(cur==='p-monthly')renderMonth();
  else if(cur==='p-stock')renderStock();
  else if(cur==='p-item')renderItemPage(m,id);
}

function markSold(m,id){
  const item=(DB[m]||[]).find(i=>i.id===id);
  if(!item)return;
  const hasFullReturn=(item.returnHistory||[]).some(r=>r.type==='full_seller'||r.type==='full_ebay');
  const today=new Date().toISOString().split('T')[0];

  if(hasFullReturn){
    // Resale flow — price/shipping/promo already set during relist, just need date
    MODAL_CALLBACK=function(date,price){
      item.resaleDateSold=date;
      item.resaleSalePrice=price||item.salePrice||0;
      item.resaleShippingCost=item.shippingCost||0;
      item.resalePromoPercent=item.promoPercent||0;
      item.isReturned=false;
      item.grossProfit=calcGrossProfit(item);
      saveDB();
      toast('Re-sold logged');
      const cur=document.querySelector('.page.on').id;
      if(cur==='p-item'){renderItemPage(m,id);return;}
      if(cur==='p-monthly')renderMonth();
      else if(cur==='p-stock')renderStock();
      if(document.getElementById('slide-panel').classList.contains('on')){openItemDetail(m,id);}
    };

  } else {

      item.isReturned=false;

async function deleteItem(m,id){
